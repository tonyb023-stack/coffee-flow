<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee | Kiosk</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        :root {
            --space-bg: #030712;
            --nebulous-blue: #1e3a8a;
            --electric-indigo: #6366f1;
            --surface: #111827;
            --text-main: #f9fafb;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--space-bg); 
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; 
        }

        .cosmic-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .btn-nebula {
            background: linear-gradient(135deg, var(--nebulous-blue) 0%, var(--electric-indigo) 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.3);
        }

        .input-nebula {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 1.5rem;
        }

        .input-nebula:focus {
            border-color: var(--electric-indigo);
            outline: none;
            background: rgba(255, 255, 255, 0.07);
        }

        #exit-zone { position: fixed; top: 0; right: 0; width: 100px; height: 100px; z-index: 10000; background: transparent; }
        
        .animate-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-white italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const toggleShift = () => {
                if (shiftStatus.active) setShowShiftModal(true);
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                return { revenue, topDrink, count: activeOrders.length, avgWait };
            }, [history, shiftStatus]);

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = history;
                if (timeFrame === 'shift') filtered = history.filter(o => o.completedAt > shiftStatus.startTime);
                else if (timeFrame === '24h') filtered = history.filter(o => o.completedAt > (now - 86400000));
                
                let csv = "Customer,Flavor,Temp,Milk,Price,WaitTime,Date\n";
                filtered.forEach(o => { 
                    csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `neb_export_${timeFrame}.csv`);
                a.click();
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-slate-900 p-2 rounded-3xl border border-white/5">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-4">
                                    {orders.map(o => (
                                        <div key={o.id} className={`cosmic-card p-6 flex justify-between items-center border-l-[8px] ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div>
                                                <h3 className="text-2xl font-black uppercase text-white">{o.customer}</h3>
                                                <div className="flex gap-2 items-center mt-1">
                                                    <p className="text-slate-400 font-bold uppercase text-sm">{o.flavor} • {o.milk}</p>
                                                </div>
                                                {o.note && <p className="text-indigo-400 text-xs mt-2 italic">"{o.note}"</p>}
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-14 h-14 btn-nebula rounded-2xl font-bold text-xl active:scale-90 transition-all">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="space-y-6">
                                    <div className="cosmic-card p-10 text-center">
                                        <button onClick={toggleShift} className={`mb-8 px-10 py-4 rounded-full font-bold text-xs uppercase ${shiftStatus.active ? 'bg-red-500' : 'bg-emerald-500'}`}>
                                            {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                        </button>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><p className="text-xs text-slate-500 uppercase">Drinks</p><p className="text-4xl font-black">{shiftStats.count}</p></div>
                                            <div><p className="text-xs text-slate-500 uppercase">Revenue</p><p className="text-4xl font-black">${shiftStats.revenue.toFixed(2)}</p></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => exportCSV('shift')} className="input-nebula p-4 text-xs font-bold uppercase">Export Shift CSV</button>
                                        <button onClick={() => exportCSV('24h')} className="input-nebula p-4 text-xs font-bold uppercase">Export 24h CSV</button>
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-6">
                                    <div className="cosmic-card p-6">
                                        <h3 className="font-bold uppercase mb-4">Inventory Management</h3>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                                                    <span className="text-sm font-bold">{d.name}</span>
                                                    <button onClick={() => {
                                                        const n = [...menuDrinks]; n[i].soldOut = !n[i].soldOut;
                                                        db.ref('menu').set(n);
                                                    }} className={`px-4 py-2 rounded-lg text-[10px] font-bold ${d.soldOut ? 'bg-red-500' : 'bg-slate-700'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full btn-nebula p-8 rounded-[2rem] font-black uppercase tracking-widest">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="pt-10 pb-24 text-center px-4">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className="text-5xl md:text-7xl font-black text-white tracking-tighter uppercase italic mb-12">NEBULOUS</h1>
                            
                            <input 
                                type="text" 
                                placeholder="Enter Name" 
                                className="w-full max-w-xl input-nebula p-6 md:p-8 text-2xl md:text-3xl font-bold text-center mb-10" 
                                value={customerName} 
                                onChange={(e) => setCustomerName(e.target.value)} 
                            />

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-5xl mx-auto">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="cosmic-card p-6 flex flex-col justify-between">
                                        <div className="flex justify-between mb-8">
                                            <h3 className="text-2xl font-bold text-white uppercase text-left leading-none">{drink.name}</h3>
                                            <span className="text-indigo-400 font-mono">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="flex-1 py-5 rounded-2xl border border-red-500/30 text-red-400 font-bold text-xs uppercase">Hot</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="flex-1 py-5 rounded-2xl btn-nebula font-bold text-xs uppercase">Iced</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl z-[100] flex items-center justify-center p-6">
                            <div className="max-w-lg w-full text-center">
                                <h2 className="text-5xl font-black uppercase text-white mb-2">{pendingOrder.name}</h2>
                                <p className="text-indigo-400 font-bold uppercase tracking-widest text-xs mb-10">{pendingOrder.temp} EDITION</p>

                                <div className="space-y-4 mb-10">
                                    {milks.filter(m => !m.soldOut).map(m => (
                                        <button key={m.name} onClick={() => setSelectedMilk(m.name)} 
                                            className={`w-full py-6 rounded-2xl text-lg font-bold uppercase border transition-all ${selectedMilk === m.name ? 'border-indigo-500 bg-indigo-500/20 text-white' : 'border-white/5 bg-white/5 text-slate-500'}`}>
                                            {m.name}
                                        </button>
                                    ))}
                                </div>
                                
                                {selectedMilk && (
                                    <div className="space-y-6 animate-in">
                                        <input type="text" placeholder="Special Requests?" className="w-full input-nebula p-6 text-center" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                        <button onClick={finalizeOrder} className="w-full btn-nebula py-8 rounded-[2rem] font-black text-2xl">Confirm</button>
                                    </div>
                                )}
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); }} className="mt-8 text-slate-500 uppercase text-xs font-bold">Go Back</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-indigo-600 z-[200] flex flex-col items-center justify-center p-8 text-center">
                            <h1 className="text-6xl font-black text-white uppercase italic tracking-tighter mb-4">CONFIRMED</h1>
                            <p className="text-indigo-200 font-bold uppercase tracking-widest text-xs">Ready soon</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
