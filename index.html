<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease; background-color: #fcfdfe; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; }
        #loader { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: 900; letter-spacing: -0.05em; color: #0f172a; font-style: italic; font-size: 2rem; }
    </style>
</head>
<body>
    <div id="root">
        <div id="loader">NEBULOUS...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const THEME = {
            bgMain: "#fcfdfe",
            cardBg: "bg-white",
            accent: "bg-slate-900",
            accentText: "text-white",
            radius: "rounded-[2.5rem]",
            inputRadius: "rounded-2xl",
            shadow: "shadow-2xl shadow-slate-200/50",
            fontPrimary: "text-slate-900",
            fontSecondary: "text-slate-400",
            instructionStyle: "underline decoration-2 underline-offset-8" 
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className={`text-xl font-black ${THEME.fontPrimary} uppercase italic leading-none`}>{elapsed}m</span>
                    <p className={`text-[9px] ${THEME.fontSecondary} font-bold uppercase tracking-widest`}>WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime: Math.round((completedAt - order.startTime) / 60000), status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const updateItem = (path, index, field, value) => {
                const data = path === 'menu' ? [...menuDrinks] : [...milks];
                data[index][field] = value;
                db.ref(path).set(data);
            };

            const deleteItem = (path, index) => {
                if (confirm("Delete this item?")) {
                    const data = path === 'menu' ? [...menuDrinks] : [...milks];
                    db.ref(path).set(data.filter((_, i) => i !== index));
                }
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista'); setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                }
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                return { revenue, count: activeOrders.length };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className={`grid grid-cols-4 gap-2 mb-8 ${THEME.cardBg} p-2 ${THEME.inputRadius} shadow-sm border border-slate-100`}>
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 ${THEME.inputRadius} font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? `${THEME.accent} ${THEME.accentText}` : THEME.fontSecondary}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="grid grid-cols-1 gap-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`${THEME.cardBg} p-8 ${THEME.radius} border-l-[12px] ${THEME.shadow} flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className={`text-3xl font-black uppercase italic tracking-tighter ${THEME.fontPrimary}`}>{o.customer}</h3>
                                                <p className={`${THEME.fontSecondary} font-bold uppercase text-lg tracking-widest`}>{o.flavor} • {o.milk}</p>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className={`w-20 h-20 ${THEME.accent} ${THEME.accentText} rounded-3xl font-black text-3xl shadow-xl active:scale-95`}>✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <p className="text-center py-20 text-slate-200 font-black italic text-2xl uppercase">All Caught Up</p>}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8 pb-20">
                                    <div className={`${THEME.cardBg} p-8 ${THEME.radius} ${THEME.shadow}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className={`font-black uppercase italic ${THEME.fontPrimary}`}>Menu</h3>
                                            <button onClick={() => db.ref('menu').set([...menuDrinks, { name: "NEW DRINK", price: 5, soldOut: false }])} className={`${THEME.accent} ${THEME.accentText} px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-widest`}>+ Add</button>
                                        </div>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-2 bg-slate-50 p-2 rounded-2xl items-center">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs" value={d.name} onChange={e => updateItem('menu', i, 'name', e.target.value)} />
                                                    <input className="w-12 bg-white p-3 rounded-xl font-bold text-xs" type="number" value={d.price} onChange={e => updateItem('menu', i, 'price', e.target.value)} />
                                                    <button onClick={() => updateItem('menu', i, 'soldOut', !d.soldOut)} className={`px-4 py-3 rounded-xl text-[9px] font-black uppercase ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => deleteItem('menu', i)} className="p-2 text-red-400">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className={`${THEME.cardBg} p-8 ${THEME.radius} ${THEME.shadow}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className={`font-black uppercase italic ${THEME.fontPrimary}`}>Milks</h3>
                                            <button onClick={() => db.ref('milks').set([...milks, { name: "NEW MILK", soldOut: false }])} className={`${THEME.accent} ${THEME.accentText} px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-widest`}>+ Add</button>
                                        </div>
                                        <div className="space-y-3">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-2 bg-slate-50 p-2 rounded-2xl items-center">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs" value={m.name} onChange={e => updateItem('milks', i, 'name', e.target.value)} />
                                                    <button onClick={() => updateItem('milks', i, 'soldOut', !m.soldOut)} className={`px-4 py-3 rounded-xl text-[9px] font-black uppercase ${m.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => deleteItem('milks', i)} className="p-2 text-red-400">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className={`w-full ${THEME.accent} ${THEME.accentText} p-10 ${THEME.radius} font-black uppercase text-2xl shadow-xl`}>Launch Kiosk</button>
                                </div>
                            )}

                            {view === 'history' && (
                                <div className={`${THEME.cardBg} ${THEME.radius} p-10 ${THEME.shadow}`}>
                                    <h2 className={`font-black uppercase italic text-2xl mb-10 ${THEME.fontPrimary}`}>Order History</h2>
                                    <div className="space-y-4">
                                        {history.slice(0, 15).map(o => (
                                            <div key={o.id} className="flex justify-between items-center bg-slate-50 p-6 rounded-3xl">
                                                <div>
                                                    <span className={`font-black uppercase italic text-lg ${THEME.fontPrimary}`}>{o.customer}</span>
                                                    <p className={`text-sm font-bold ${THEME.fontSecondary} uppercase`}>{o.flavor} • {o.milk}</p>
                                                </div>
                                                <span className={`text-xs font-black ${THEME.fontPrimary}`}>{o.waitTime}m</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className={`${THEME.cardBg} p-10 ${THEME.radius} ${THEME.shadow} text-center`}>
                                    <p className="text-5xl font-black italic tracking-tighter">${shiftStats.revenue.toFixed(2)}</p>
                                    <p className="text-[10px] font-bold uppercase text-slate-300">Revenue Since Start</p>
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-12 text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className={`text-7xl font-black ${THEME.fontPrimary} uppercase italic mb-12 tracking-tighter`}>NEBULOUS</h1>
                            <div className={`${THEME.cardBg} p-6 ${THEME.radius} ${THEME.shadow} max-w-2xl mx-auto mb-12`}>
                                <input type="text" placeholder="YOUR NAME?" className="w-full bg-slate-50 p-6 rounded-3xl text-3xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto px-4">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className={`${THEME.cardBg} ${THEME.radius} ${THEME.shadow} p-8`}>
                                        <div className="flex justify-between items-start mb-8">
                                            <h3 className={`text-2xl font-black ${THEME.fontPrimary} uppercase italic`}>{drink.name}</h3>
                                            <span className="text-sm font-bold bg-slate-100 px-4 py-1 rounded-full">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-6 rounded-3xl text-white font-black text-xl shadow-lg">HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-6 rounded-3xl text-white font-black text-xl shadow-lg">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                            <div className="max-w-xl w-full animate-in text-center py-16">
                                <h2 className="text-6xl font-black uppercase italic mb-12">{pendingOrder.name}</h2>
                                <div className="space-y-6 mb-12">
                                    <p className={`font-black uppercase text-xl tracking-widest ${THEME.fontPrimary} ${THEME.instructionStyle}`}>
                                        SELECT YOUR MILK
                                    </p>
                                    <div className="grid grid-cols-1 gap-3 pt-4">
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 ${THEME.inputRadius} text-3xl font-black uppercase italic border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900 scale-105' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                </div>
                                {selectedMilk && (
                                    <button onClick={finalizeOrder} className="w-full bg-emerald-500 text-white py-10 rounded-full font-black uppercase text-4xl shadow-2xl">Confirm</button>
                                )}
                                <button onClick={() => setPendingOrder(null)} className="mt-10 text-slate-400 font-black uppercase">Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in text-center">
                            <div className="bg-emerald-500 w-32 h-32 rounded-full flex items-center justify-center mb-8">
                                <span className="text-white text-6xl font-black">✓</span>
                            </div>
                            <h1 className="text-5xl font-black uppercase italic tracking-tighter">SUCCESS!</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
