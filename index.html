<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anu Day Coffee Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-in { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-user-select: none; touch-action: manipulation; }
        input { -webkit-user-select: text; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [orders, setOrders] = useState(() => JSON.parse(localStorage.getItem('coffee-orders')) || []);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('coffee-history')) || []);
            const [wasteLog, setWasteLog] = useState(() => JSON.parse(localStorage.getItem('coffee-waste')) || []);
            
            const [menuDrinks, setMenuDrinks] = useState(() => JSON.parse(localStorage.getItem('coffee-menu')) || [
                { name: 'Vanilla Latte', price: 5.50 },
                { name: 'Caramel Macchiato', price: 6.00 },
                { name: 'Mocha', price: 5.75 },
                { name: 'Matcha', price: 5.50 }
            ]);
            const [milks, setMilks] = useState(() => JSON.parse(localStorage.getItem('coffee-milks')) || ['Whole', 'Oat', 'Almond', 'Half & Half']);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [now, setNow] = useState(Date.now());

            useEffect(() => {
                localStorage.setItem('coffee-orders', JSON.stringify(orders));
                localStorage.setItem('coffee-history', JSON.stringify(history));
                localStorage.setItem('coffee-waste', JSON.stringify(wasteLog));
                localStorage.setItem('coffee-menu', JSON.stringify(menuDrinks));
                localStorage.setItem('coffee-milks', JSON.stringify(milks));
            }, [orders, history, wasteLog, menuDrinks, milks]);

            useEffect(() => {
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, []);

            const addOrder = (drink, temp) => {
                if (!customerName.trim()) return alert("Enter Customer Name First");
                setPendingOrder({ flavor: drink.name, price: drink.price, temp, customer: customerName });
            };

            const finalizeOrder = (milk) => {
                const newOrder = {
                    id: Date.now(),
                    customer: customerName,
                    flavor: pendingOrder.flavor,
                    price: pendingOrder.price || 0,
                    temp: pendingOrder.temp,
                    milk: milk,
                    startTime: Date.now(),
                    timeLabel: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setOrders([newOrder, ...orders]);
                setPendingOrder(null);
                setCustomerName('');
            };

            const markDone = (id) => {
                const order = orders.find(o => o.id === id);
                if (order) {
                    const waitTime = Math.floor((Date.now() - order.startTime) / 1000);
                    setHistory([{ ...order, waitTime, status: 'Sold' }, ...history]);
                    setOrders(orders.filter(o => o.id !== id));
                }
            };

            const markWaste = (id) => {
                const reason = prompt("Reason for waste? (e.g., Messed up milk, Customer changed mind)");
                if (reason === null) return;
                const order = orders.find(o => o.id === id);
                if (order) {
                    setWasteLog([{ ...order, status: 'Wasted', reason: reason || 'Unspecified', wastedAt: Date.now() }, ...wasteLog]);
                    setOrders(orders.filter(o => o.id !== id));
                }
            };

            const getStats = () => {
                const totalRev = history.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);
                const totalLoss = wasteLog.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);
                const counts = {};
                history.forEach(o => counts[o.flavor] = (counts[o.flavor] || 0) + 1);
                const leaderboard = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                return { totalRev, totalLoss, leaderboard };
            };

            const exportToCSV = () => {
                const headers = ["Time", "Customer", "Drink", "Price", "Milk", "Status", "Reason"];
                const allData = [...history, ...wasteLog].sort((a,b) => b.id - a.id);
                const rows = allData.map(o => [o.timeLabel, o.customer, o.flavor, o.price, o.milk, o.status, o.reason || 'N/A']);
                const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `AnuDay_Report.csv`;
                link.click();
            };

            const { totalRev, totalLoss, leaderboard } = getStats();

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 pb-24 font-sans">
                    <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-[2rem] shadow-sm border border-slate-200">
                        {['queue', 'history', 'stats', 'settings'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-400'}`}>
                                {v}
                            </button>
                        ))}
                    </nav>

                    {view === 'queue' && (
                        <div className="animate-in">
                            <input type="text" placeholder="Customer Name..." className="w-full p-6 text-3xl rounded-[2.5rem] shadow-xl mb-8 outline-none focus:ring-4 focus:ring-orange-200 bg-white" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                                {menuDrinks.map((drink) => (
                                    <div key={drink.name} className="bg-white p-6 rounded-[3rem] shadow-md border border-slate-100 flex flex-col items-center">
                                        <h3 className="text-2xl font-black text-slate-700">{drink.name}</h3>
                                        <p className="text-slate-400 font-bold mb-4">${drink.price.toFixed(2)}</p>
                                        <div className="flex gap-4 w-full">
                                            <button onClick={() => addOrder(drink, 'Hot')} className="flex-1 bg-orange-100 text-orange-700 py-8 rounded-[2rem] font-black text-2xl active:scale-95 transition">HOT</button>
                                            <button onClick={() => addOrder(drink, 'Iced')} className="flex-1 bg-blue-100 text-blue-700 py-8 rounded-[2rem] font-black text-2xl active:scale-95 transition">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="space-y-4">
                                {orders.map(order => {
                                    const sec = Math.floor((now - order.startTime) / 1000);
                                    return (
                                        <div key={order.id} className={`flex justify-between items-center p-8 rounded-[3.5rem] bg-white shadow-xl border-l-[20px] ${order.temp === 'Hot' ? 'border-orange-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-4">
                                                    <h2 className="text-4xl font-black">{order.customer}</h2>
                                                    <span className={`px-4 py-1 rounded-full font-mono font-bold text-lg ${sec > 180 ? 'bg-red-500 text-white animate-pulse' : 'bg-slate-100 text-slate-500'}`}>
                                                        {Math.floor(sec/60)}:{(sec%60).toString().padStart(2,'0')}
                                                    </span>
                                                </div>
                                                <p className="text-slate-500 font-extrabold text-lg uppercase">{order.temp} {order.flavor} • {order.milk}</p>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => markWaste(order.id)} className="bg-red-50 text-red-400 w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-2xl">🗑️</button>
                                                <button onClick={() => markDone(order.id)} className="bg-emerald-500 text-white w-24 h-24 rounded-[2.5rem] font-black text-5xl flex items-center justify-center">✓</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'stats' && (
                        <div className="animate-in space-y-6">
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-lg flex justify-between items-center border border-slate-100">
                                <div>
                                    <p className="font-bold uppercase text-[10px] text-slate-400">Net Sales</p>
                                    <p className="text-6xl font-black text-emerald-500">${totalRev.toFixed(2)}</p>
                                </div>
                                <div className="text-right border-l pl-8">
                                    <p className="font-bold uppercase text-[10px] text-slate-400">Total Waste</p>
                                    <p className="text-4xl font-black text-red-400">-${totalLoss.toFixed(2)}</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm">
                                    <p className="text-slate-400 font-bold uppercase text-[10px]">Avg Wait Time</p>
                                    <p className="text-4xl font-black text-slate-800">{history.length > 0 ? Math.floor(history.reduce((a,b)=>a+b.waitTime,0)/history.length) : 0}s</p>
                                </div>
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm">
                                    <p className="text-slate-400 font-bold uppercase text-[10px]">Avg Order</p>
                                    <p className="text-4xl font-black text-slate-800">${history.length > 0 ? (totalRev / history.length).toFixed(2) : '0.00'}</p>
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black uppercase tracking-widest text-slate-400">Best Sellers</h3>
                                    <button onClick={exportToCSV} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Download CSV</button>
                                </div>
                                {leaderboard.map(([name, count]) => (
                                    <div key={name} className="flex justify-between py-3 border-b border-slate-50 last:border-0 font-bold text-lg">
                                        <span className="text-slate-600 uppercase text-sm">{name}</span>
                                        <span className="text-orange-500 font-black">{count} SOLD</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'history' && (
                        <div className="animate-in space-y-6">
                            <div>
                                <h2 className="text-2xl font-black uppercase tracking-tighter mb-4 text-slate-300">Completed</h2>
                                <div className="space-y-3">
                                    {history.slice(0, 15).map(o => (
                                        <div key={o.id} className="bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm">
                                            <p className="font-black text-slate-700">{o.customer} <span className="text-xs text-slate-300 ml-2">{o.flavor}</span></p>
                                            <button onClick={() => {setOrders([...orders, o]); setHistory(history.filter(h => h.id !== o.id))}} className="text-[10px] font-bold text-indigo-400">RE-OPEN</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {wasteLog.length > 0 && (
                                <div>
                                    <h2 className="text-2xl font-black uppercase tracking-tighter mb-4 text-red-300">Waste Log</h2>
                                    <div className="space-y-3">
                                        {wasteLog.slice(0, 15).map(o => (
                                            <div key={o.id} className="bg-red-50 p-5 rounded-[2rem] border border-red-100 flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-red-900">{o.customer}</p>
                                                    <p className="text-[10px] text-red-400 font-bold uppercase">{o.flavor} • {o.reason}</p>
                                                </div>
                                                <button onClick={() => setWasteLog(wasteLog.filter(h => h.id !== o.id))} className="text-red-300 text-lg">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="animate-in space-y-8">
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-md border border-slate-100">
                                <h2 className="text-2xl font-black mb-8 uppercase tracking-tighter">Menu Management</h2>
                                {menuDrinks.map((d, i) => (
                                    <div key={i} className="flex gap-2 mb-4">
                                        <div className="flex-1 bg-slate-50 p-4 rounded-2xl font-black text-slate-700 text-sm uppercase">{d.name}</div>
                                        <div className="relative">
                                            <span className="absolute left-3 top-4 text-slate-300 font-bold">$</span>
                                            <input type="number" step="0.01" className="w-24 bg-slate-50 p-4 pl-7 rounded-2xl font-mono font-bold text-center" value={d.price} onChange={(e) => {
                                                const n = [...menuDrinks]; n[i].price = parseFloat(e.target.value) || 0; setMenuDrinks(n);
                                            }} />
                                        </div>
                                        <button onClick={() => {if(confirm("Delete?")){const n = [...menuDrinks]; n.splice(i,1); setMenuDrinks(n);}}} className="bg-red-50 text-red-400 px-4 rounded-2xl">✕</button>
                                    </div>
                                ))}
                                <button onClick={() => {
                                    const n = prompt("Drink Name:"); const p = prompt("Price:");
                                    if(n && p) setMenuDrinks([...menuDrinks, {name: n, price: parseFloat(p)}]);
                                }} className="w-full mt-4 bg-slate-800 text-white p-5 rounded-3xl font-black uppercase tracking-widest text-xs">Add New Menu Item</button>
                            </div>
                        </div>
                    )}
                    
                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-6 z-[100]">
                            <div className="bg-white w-full max-w-md rounded-[4rem] p-12 shadow-2xl animate-in text-center">
                                <h2 className="text-3xl font-black mb-10 uppercase italic tracking-widest text-slate-300 underline decoration-orange-500 decoration-4 underline-offset-8">Milk Choice</h2>
                                <div className="grid grid-cols-1 gap-4">
                                    {milks.map(m => (
                                        <button key={m} onClick={() => finalizeOrder(m)} className="bg-slate-50 hover:bg-orange-50 p-8 rounded-[2.5rem] text-3xl font-black border-2 border-slate-100 text-slate-800 active:scale-95 transition">
                                            {m}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setPendingOrder(null)} className="mt-8 font-black text-slate-300 uppercase text-xs tracking-widest">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
