<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nebulous Coffee Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: Bebas Neue (display) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════════
       STYLE SECTION — Safe to edit freely. All visual rules live here.
       ═══════════════════════════════════════════════════════════════ */

    :root {
      /* Light mode (barista) */
      --bg:           #f8f7f4;
      --surface:      #ffffff;
      --surface-2:    #f3f2ef;
      --border:       #ebebeb;
      --ink:          #0f0f0f;
      --ink-mid:      #6b6b6b;
      --ink-faint:    #c8c8c8;
      --red:          #e84040;
      --blue:         #3b82f6;
      --green:        #22c55e;
      --amber:        #f59e0b;

      /* Dark mode (barista dark toggle) */
      --bg-dark:      #0c0c0c;
      --surface-dark: #181818;
      --surface-2-dark:#242424;
      --border-dark:  #2e2e2e;
      --ink-dark:     #f0f0f0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s ease;
    }

    body.dark {
      background: var(--bg-dark);
    }

    /* ── Typography ─────────────────────────────────── */
    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }

    /* ── Animations ─────────────────────────────────── */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    @keyframes fadeIn {
      from { opacity:0; } to { opacity:1; }
    }
    @keyframes popIn {
      0%   { opacity:0; transform:scale(0.88); }
      70%  { transform:scale(1.04); }
      100% { opacity:1; transform:scale(1); }
    }
    @keyframes pulse-ring {
      0%   { box-shadow:0 0 0 0 rgba(34,197,94,0.35); }
      70%  { box-shadow:0 0 0 14px rgba(34,197,94,0); }
      100% { box-shadow:0 0 0 0 rgba(34,197,94,0); }
    }
    @keyframes name-pulse {
      0%,100% { border-color:rgba(15,15,15,0.9);  box-shadow:0 0 0 0px   rgba(15,15,15,0.08); }
      50%      { border-color:rgba(15,15,15,0.3);  box-shadow:0 0 0 10px  rgba(15,15,15,0.04); }
    }
    @keyframes shimmer {
      0%   { background-position:-400px 0; }
      100% { background-position:400px 0; }
    }
    @keyframes undo-shrink {
      from { width:100%; } to { width:0%; }
    }
    @keyframes attract-float {
      0%,100% { transform:translateY(0px);  }
      50%      { transform:translateY(-10px); }
    }
    @keyframes spin-slow {
      from { transform:rotate(0deg); } to { transform:rotate(360deg); }
    }

    .animate-in  { animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
    .animate-pop { animation: popIn  0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .animate-fade{ animation: fadeIn 0.25s ease forwards; }

    /* ── Shadows ────────────────────────────────────── */
    .shadow-soft { box-shadow:0 2px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04); }
    .shadow-card { box-shadow:0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04); }
    .shadow-lift { box-shadow:0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06); }

    /* ── Kiosk name field ───────────────────────────── */
    .name-pulse { border:2.5px solid #0f0f0f; animation:name-pulse 3s infinite ease-in-out; }

    /* ── Confirm button ─────────────────────────────── */
    .btn-confirm {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 12px 32px -4px rgba(34,197,94,0.45);
    }
    .btn-confirm:active { transform:scale(0.97); }

    /* ── Connection dot ─────────────────────────────── */
    .conn-online  { background:#22c55e; animation:pulse-ring 2s infinite; }
    .conn-offline { background:#e84040; }

    /* ── Undo bar ────────────────────────────────────── */
    .undo-bar { animation: undo-shrink 5s linear forwards; }

    /* ── Attract screen ──────────────────────────────── */
    .attract-cup { animation: attract-float 3s ease-in-out infinite; }
    .attract-bg {
      background: radial-gradient(ellipse at 50% 60%, rgba(34,197,94,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
                  #0f0f0f;
    }

    /* ── Dark mode surface overrides ────────────────── */
    body.dark .ds  { background:var(--surface-dark) !important; border-color:var(--border-dark) !important; }
    body.dark .ds2 { background:var(--surface-2-dark) !important; }
    body.dark .dt  { color:var(--ink-dark) !important; }
    body.dark .dt-mid { color:#9a9a9a !important; }
    body.dark .dt-faint { color:#444 !important; }

    /* ── PIN pad ─────────────────────────────────────── */
    .pin-dot-filled { background:#0f0f0f; transform:scale(1.1); }
    body.dark .pin-dot-filled { background:#f0f0f0; }

    /* ── Grain overlay for kiosk ─────────────────────── */
    .grain::after {
      content:'';
      position:fixed; inset:0; pointer-events:none; z-index:0;
      opacity:0.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px;
    }

    /* ── Overflow queue warning ──────────────────────── */
    .queue-warning { background:linear-gradient(135deg,#f59e0b,#d97706); }

    /* Hide scrollbar on PIN screen */
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* Order card ready state */
    .order-ready { border-color:#22c55e !important; background:#f0fdf4 !important; }
    body.dark .order-ready { background:#052e16 !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;


/* ═══════════════════════════════════════════════════════════════════
   SECTION 1 — APP CONSTANTS
   Tweak thresholds, timing, and labels without touching any logic.
   ═══════════════════════════════════════════════════════════════════ */
const DEFAULTS = {
  APP_NAME:           'NEBULOUS',
  KIOSK_EXIT_TAPS:    3,
  KIOSK_EXIT_MS:      800,
  SUCCESS_MS:         2800,
  IDLE_TIMEOUT_MS:    45_000,
  ORDER_LATE_MINS:    5,
  HISTORY_PAGE_SIZE:  30,
  UNDO_MS:            5_000,
  QUEUE_WARN_COUNT:   6,
  DEFAULT_PIN:        '1234',
  QUICK_REQUESTS:     ['Half Sweet','Less Ice'],
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 2 — FIREBASE SERVICE LAYER
   All DB operations live ONLY here. Swap backend by editing this
   section exclusively — nothing else in the file changes.
   ═══════════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA',
  authDomain:        'coffee-order-tracker.firebaseapp.com',
  databaseURL:       'https://coffee-order-tracker-default-rtdb.firebaseio.com',
  projectId:         'coffee-order-tracker',
  storageBucket:     'coffee-order-tracker.firebasestorage.app',
  messagingSenderId: '650691026035',
  appId:             '1:650691026035:web:96e8bee8d3a5bb5d205e06',
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const DB = firebase.database();

const DbService = {

  /* ── Connection ─────────────────────────────────── */
  subscribeConnection(cb) {
    const ref = DB.ref('.info/connected');
    ref.on('value', s => cb(s.val() === true));
    return () => ref.off();
  },

  /* ── Settings (event name, PIN, guest count, dark mode, warn threshold) */
  subscribeSettings(cb) {
    const ref = DB.ref('settings');
    ref.on('value', s => cb(s.val() || {}));
    return () => ref.off();
  },
  setSettings: (data) => DB.ref('settings').update(data),

  /* ── Orders ─────────────────────────────────────── */
  subscribeOrders(cb) {
    const ref = DB.ref('orders');
    ref.on('value', s => {
      const raw = s.val() || {};
      const list = Object.entries(raw)
        .map(([key, v]) => ({ ...v, _key: key }))
        .sort((a, b) => a.startTime - b.startTime);
      cb(list);
    });
    return () => ref.off();
  },

  async placeOrder(data) {
    const res = await DB.ref('orderCounter').transaction(n => (n || 0) + 1);
    const num = res.snapshot.val();
    const ref = DB.ref('orders').push();
    await ref.set({ ...data, _key: ref.key, orderNumber: num, startTime: Date.now(), status: 'Active', ready: false });
    return num;
  },

  markReady(order) {
    DB.ref(`orders/${order._key}/ready`).set(true);
  },

  completeOrder(order) {
    const completedAt = Date.now();
    const waitTime = Math.round((completedAt - order.startTime) / 60000);
    DB.ref(`history/${order._key}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
    DB.ref(`orders/${order._key}`).remove();
  },

  undoComplete(order) {
    // Restore back to active queue
    DB.ref(`orders/${order._key}`).set({ ...order, status: 'Active', ready: false, completedAt: undefined, waitTime: undefined });
    DB.ref(`history/${order._key}`).remove();
  },

  addBaristaNote(orderKey, note) {
    DB.ref(`history/${orderKey}/baristaNote`).set(note);
  },

  /* ── History ─────────────────────────────────────── */
  subscribeHistory(cb) {
    const ref = DB.ref('history');
    ref.on('value', s => {
      const raw = s.val() || {};
      cb(Object.values(raw).sort((a, b) => b.completedAt - a.completedAt));
    });
    return () => ref.off();
  },
  clearHistory: () => DB.ref('history').remove(),

  /* ── Menu ────────────────────────────────────────── */
  subscribeMenu(cb) {
    const ref = DB.ref('menu');
    ref.on('value', s => cb(s.val() || []));
    return () => ref.off();
  },
  setMenu: (m) => DB.ref('menu').set(m),

  /* ── Milks ───────────────────────────────────────── */
  subscribeMilks(cb) {
    const ref = DB.ref('milks');
    ref.on('value', s => cb(s.val() || []));
    return () => ref.off();
  },
  setMilks: (m) => DB.ref('milks').set(m),

  /* ── Shift ───────────────────────────────────────── */
  subscribeShift(cb) {
    const ref = DB.ref('shift');
    ref.on('value', s => cb(s.val() || { active: false, startTime: 0 }));
    return () => ref.off();
  },
  startShift: () => DB.ref('shift').set({ active: true, startTime: Date.now() }),
  endShift:   () => DB.ref('shift').set({ active: false, startTime: 0 }),
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 3 — DATA & LOGIC HOOK  (useAppData)
   All state + business logic. Zero JSX. Zero styling.
   ═══════════════════════════════════════════════════════════════════ */
const useAppData = () => {
  const [online,      setOnline]      = useState(true);
  const [settings,    setSettingsState]= useState({ eventName:'', pin: DEFAULTS.DEFAULT_PIN, guestCount:0, darkMode:false, warnAt: DEFAULTS.QUEUE_WARN_COUNT });
  const [orders,      setOrders]      = useState([]);
  const [history,     setHistory]     = useState([]);
  const [menu,        setMenu]        = useState([]);
  const [milks,       setMilks]       = useState([]);
  const [shift,       setShift]       = useState({ active:false, startTime:0 });
  const [appMode,     setAppMode]     = useState(() => localStorage.getItem('app-mode') || 'barista');

  useEffect(() => {
    const unsubs = [
      DbService.subscribeConnection(setOnline),
      DbService.subscribeSettings(s => setSettingsState(prev => ({ ...DEFAULTS, ...prev, ...s }))),
      DbService.subscribeOrders(setOrders),
      DbService.subscribeHistory(setHistory),
      DbService.subscribeMenu(setMenu),
      DbService.subscribeMilks(setMilks),
      DbService.subscribeShift(setShift),
    ];
    return () => unsubs.forEach(fn => fn());
  }, []);

  // Sync dark mode to body class
  useEffect(() => {
    document.body.classList.toggle('dark', !!settings.darkMode);
  }, [settings.darkMode]);

  const switchMode = useCallback((mode) => {
    setAppMode(mode);
    localStorage.setItem('app-mode', mode);
  }, []);

  const updateSettings = useCallback((patch) => {
    DbService.setSettings(patch);
  }, []);

  // Shift statistics (memoised)
  const shiftStats = useMemo(() => {
    const active = shift.startTime > 0
      ? history.filter(o => o.completedAt > shift.startTime)
      : [];
    const revenue = active.reduce((a, o) => a + Number(o.price || 0), 0);
    const drinkCounts = {}, hourCounts = {};
    let totalWait = 0;
    active.forEach(o => {
      drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
      totalWait += (o.waitTime || 0);
      const h = new Date(o.completedAt).getHours();
      hourCounts[h] = (hourCounts[h] || 0) + 1;
    });
    const kd = Object.keys(drinkCounts), kh = Object.keys(hourCounts);
    const topDrink    = kd.length ? kd.reduce((a,b)=>drinkCounts[a]>drinkCounts[b]?a:b) : 'N/A';
    const avgWait     = active.length ? (totalWait/active.length).toFixed(1) : '0';
    const peakH       = kh.length ? kh.reduce((a,b)=>hourCounts[a]>hourCounts[b]?a:b) : null;
    const busiestHour = peakH !== null ? `${peakH%12||12}${Number(peakH)>=12?'PM':'AM'}` : 'N/A';
    return { revenue, topDrink, count:active.length, avgWait, busiestHour, orders:active };
  }, [history, shift]);

  // CSV export with proper escaping
  const exportCSV = useCallback((frame) => {
    const now = Date.now();
    const cuts = { shift:shift.startTime, '24h':now-86400000, week:now-604800000, month:now-2592000000 };
    const rows = history.filter(o => o.completedAt > (cuts[frame]||0));
    const esc  = v => `"${String(v??'').replace(/"/g,'""')}"`;
    let csv = 'Order#,Customer,Flavor,Temp,Milk,Special Request,Price,Wait,Note,Date\n';
    rows.forEach(o => {
      csv += [o.orderNumber||'',esc(o.customer),esc(o.flavor),o.temp,esc(o.milk),esc(o.note),o.price,`${o.waitTime}m`,esc(o.baristaNote),new Date(o.completedAt).toLocaleString()].join(',') + '\n';
    });
    const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a   = Object.assign(document.createElement('a'),{href:url,download:`neb_${frame}_${Date.now()}.csv`});
    a.click(); URL.revokeObjectURL(url);
  }, [history, shift]);

  // Menu helpers
  const addMenuItem        = ()          => DbService.setMenu([...menu, {name:'',price:5,soldOut:false}]);
  const updateMenuItem     = (i,f,v)    => DbService.setMenu(menu.map((d,idx)=>idx===i?{...d,[f]:v}:d));
  const deleteMenuItem     = (i)        => DbService.setMenu(menu.filter((_,idx)=>idx!==i));
  const toggleDrinkSoldOut = (i)        => updateMenuItem(i,'soldOut',!menu[i].soldOut);

  // Milk helpers
  const addMilkItem        = ()          => DbService.setMilks([...milks, {name:'',soldOut:false}]);
  const updateMilkItem     = (i,f,v)    => DbService.setMilks(milks.map((m,idx)=>idx===i?{...m,[f]:v}:m));
  const deleteMilkItem     = (i)        => DbService.setMilks(milks.filter((_,idx)=>idx!==i));
  const toggleMilkSoldOut  = (i)        => updateMilkItem(i,'soldOut',!milks[i].soldOut);

  // Alert sound (Web Audio API — no external file needed)
  const playChime = useCallback(() => {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const play = (freq, start, dur, vol=0.3) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0,ctx.currentTime+start);
        gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        osc.start(ctx.currentTime+start);
        osc.stop(ctx.currentTime+start+dur+0.05);
      };
      play(880, 0,    0.25);
      play(1100,0.18, 0.25);
      play(1320,0.36, 0.4);
    } catch(_) {}
    try { navigator.vibrate && navigator.vibrate([100,50,100]); } catch(_) {}
  }, []);

  return {
    online, settings, orders, history, menu, milks, shift, appMode, shiftStats,
    switchMode, updateSettings, exportCSV, playChime,
    placeOrder:        DbService.placeOrder,
    markReady:         DbService.markReady,
    completeOrder:     DbService.completeOrder,
    undoComplete:      DbService.undoComplete,
    addBaristaNote:    DbService.addBaristaNote,
    clearHistory:      DbService.clearHistory,
    startShift:        DbService.startShift,
    endShift:          DbService.endShift,
    addMenuItem,    updateMenuItem,    deleteMenuItem,    toggleDrinkSoldOut,
    addMilkItem,    updateMilkItem,    deleteMilkItem,    toggleMilkSoldOut,
  };
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 4 — SHARED UI PRIMITIVES
   Small reusable components used by both modes.
   Safe to restyle. No logic, no DB calls.
   ═══════════════════════════════════════════════════════════════════ */

const ConnectionDot = ({ online }) => (
  <div className="flex items-center gap-1.5">
    <span className={`w-2 h-2 rounded-full block flex-shrink-0 ${online?'conn-online':'conn-offline'}`} />
    <span className="text-[9px] font-bold uppercase tracking-widest" style={{color:'var(--ink-faint)'}}>
      {online ? 'Live' : 'Offline'}
    </span>
  </div>
);

const OrderTimer = ({ startTime }) => {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const calc = () => setElapsed(Math.round((Date.now()-startTime)/60000));
    calc();
    const id = setInterval(calc, 60000);
    return () => clearInterval(id);
  }, [startTime]);
  const late = elapsed >= DEFAULTS.ORDER_LATE_MINS;
  return (
    <div className="text-right flex-shrink-0">
      <span className={`text-2xl display block leading-none ${late?'text-red-500':'dt'}`} style={late?{}:{color:'var(--ink)'}}>
        {elapsed}m
      </span>
      <span className="text-[8px] font-bold uppercase tracking-widest" style={{color:'var(--ink-faint)'}}>WAIT</span>
    </div>
  );
};

const Modal = ({ children, onClose }) => (
  <div className="fixed inset-0 z-[600] flex items-center justify-center p-5"
       style={{background:'rgba(0,0,0,0.55)',backdropFilter:'blur(10px)'}}
       onClick={e => { if(e.target===e.currentTarget && onClose) onClose(); }}>
    <div className="ds bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-lift animate-pop">
      {children}
    </div>
  </div>
);

const Pill = ({ label, color='slate', onClick, active }) => {
  const colors = {
    slate: active ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200',
    red:   'bg-red-500 text-white',
    green: 'bg-emerald-500 text-white',
  };
  return (
    <button onClick={onClick}
      className={`px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all ${colors[color]||colors.slate}`}>
      {label}
    </button>
  );
};

const Badge = ({ count }) => count > 0 ? (
  <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[8px] font-black
                   min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center leading-none z-10">
    {count > 9 ? '9+' : count}
  </span>
) : null;


/* ═══════════════════════════════════════════════════════════════════
   SECTION 5 — BARISTA UI VIEWS
   All barista screens. Safe to restyle.
   Props listed above each component. No Firebase knowledge.
   ═══════════════════════════════════════════════════════════════════ */

/* ── Nav ──────────────────────────────────────────── */
const BaristaNav = ({ view, setView, queueCount, online, darkMode }) => {
  const tabs = ['queue','add','history','stats','settings'];
  return (
    <nav className="ds flex items-center gap-2 p-2 rounded-2xl shadow-soft border mb-6"
         style={{background:'var(--surface)',borderColor:'var(--border)'}}>
      <div className="flex gap-1 flex-1">
        {tabs.map(t => (
          <button key={t} onClick={() => setView(t)}
            className={`relative flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all
              ${view===t ? 'bg-slate-900 text-white' : 'text-slate-400 hover:text-slate-700'}`}>
            {t === 'add' ? 'Add Order' : t}
            {t==='queue' && <Badge count={queueCount} />}
          </button>
        ))}
      </div>
      <div className="pl-2 pr-1">
        <ConnectionDot online={online} />
      </div>
    </nav>
  );
};

/* ── Queue card ───────────────────────────────────── */
const QueueCard = ({ order, onReady, onComplete, onNote }) => {
  const [showNote, setShowNote] = useState(false);
  const [noteVal,  setNoteVal]  = useState(order.baristaNote || '');

  const saveNote = () => {
    onNote(order._key, noteVal);
    setShowNote(false);
  };

  return (
    <div className={`ds rounded-[2rem] border-l-[10px] shadow-soft p-6 transition-all
      ${order.ready ? 'order-ready border-green-500' : order.temp==='HOT' ? 'border-red-400' : 'border-blue-400'}`}

          className="text-[9px] font-bold uppercase tracking-widest mt-3 block"
          style={{color:'var(--ink-faint)'}}>
          {order.baristaNote ? `📝 ${order.baristaNote}` : '+ add note'}
        </button>
      )}

      {/* Action buttons */}
      <div className="flex gap-3 mt-4">
        {!order.ready && (
          <button onClick={() => onReady(order)}
            className="flex-1 py-4 rounded-xl text-sm font-bold uppercase tracking-widest transition-all

            Mark Ready
          </button>

        <button onClick={() => onComplete(order)}
          className={`py-4 rounded-xl font-black text-white text-xl transition-all hover:scale-105 active:scale-95 shadow-md
            ${order.ready ? 'flex-1 bg-green-500' : 'w-16 bg-slate-900'}`}>
          ✓

      </div>
    </div>

};

/* ── Queue view ───────────────────────────────────── */
const QueueView = ({ orders, settings, onReady, onComplete, onNote }) => {
  const warn = settings.warnAt || DEFAULTS.QUEUE_WARN_COUNT;
  return (
    <div className="space-y-4 animate-in">
      {orders.length >= warn && (
        <div className="queue-warning text-white px-6 py-4 rounded-2xl font-bold text-sm text-center shadow-md animate-in">

        <div className="text-center py-24 display text-5xl" style={{color:'var(--ink-faint)'}}>

};

/* ── History view ─────────────────────────────────── */

    <div className="ds rounded-[2.5rem] p-8 shadow-soft border animate-in"
         style={{background:'var(--surface)',borderColor:'var(--border)'}}>
      <div className="flex justify-between items-start mb-8">
        <div>
          <h2 className="display text-3xl dt" style={{color:'var(--ink)'}}>ORDER HISTORY</h2>

            {history.length} total
          </p>
        </div>
        <button onClick={onClear}
          className="text-[10px] font-bold uppercase tracking-widest text-red-400 bg-red-50 px-4 py-2 rounded-full hover:bg-red-500 hover:text-white transition-all">

        </button>

      {history.length === 0 && (
        <p className="text-center py-12 display text-3xl" style={{color:'var(--ink-faint)'}}>NO HISTORY</p>

               style={{background:'var(--surface-2)',borderColor:'var(--border)'}}>
            <div className="flex-1 min-w-0">
              <div className="flex gap-2 items-center mb-1 flex-wrap">
                <span className="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
                  #{o.orderNumber??'—'}
                </span>
              </div>
              <span className="display text-xl dt" style={{color:'var(--ink)'}}>{o.customer}</span>
              <p className="text-xs font-medium truncate mt-0.5" style={{color:'var(--ink-mid)'}}>
                <span className={`text-[8px] font-black px-2 py-0.5 rounded-full mr-1.5 inline-block align-middle
                  ${o.temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                {o.flavor} · {o.milk}
                {o.note && ` · "${o.note}"`}

      )}

  );
};

/* ── Stats view ───────────────────────────────────── */
const StatsView = ({ shift, shiftStats, settings, onStartShift, onEndShiftRequest, exportCSV }) => {
  const pct = settings.guestCount > 0
    ? Math.min(100, Math.round((shiftStats.count / settings.guestCount) * 100))
    : null;

  const cells = [
    { label:'Revenue',   val:`$${shiftStats.revenue.toFixed(2)}` },
    { label:'Top Drink', val:shiftStats.topDrink, italic:true },
    { label:'Avg Wait',  val:`${shiftStats.avgWait}m` },
    { label:'Peak Hour', val:shiftStats.busiestHour, italic:true },
  ];

  return (
    <div className="animate-in space-y-5">
      <div className="ds rounded-[2.5rem] p-8 shadow-soft border text-center"
           style={{background:'var(--surface)',borderColor:'var(--border)'}}>

        <button onClick={shift.active ? onEndShiftRequest : onStartShift}
          className={`px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all shadow-sm mb-4
            ${shift.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
          {shift.active ? '● End Shift' : 'Start Shift'}
        </button>

        {shift.active && (
          <p className="text-[9px] font-bold uppercase tracking-widest mb-6 text-emerald-500">
            Started {new Date(shift.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
          </p>
        )}

        <div className="py-6 border-t border-b" style={{borderColor:'var(--border)'}}>
          <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={{color:'var(--ink-faint)'}}>
            Drinks Served
          </p>
          <p className="display text-8xl dt" style={{color:'var(--ink)'}}>{shiftStats.count}</p>
        </div>

        {/* Guest pacing bar */}
        {pct !== null && (
          <div className="my-6">
            <div className="flex justify-between text-[9px] font-bold uppercase tracking-widest mb-2" style={{color:'var(--ink-faint)'}}>
              <span>Event Pacing</span>
              <span>{shiftStats.count} / {settings.guestCount} guests ({pct}%)</span>
            </div>
            <div className="w-full rounded-full h-2 overflow-hidden" style={{background:'var(--surface-2)'}}>
              <div className="h-full rounded-full bg-emerald-500 transition-all duration-700"
                   style={{width:`${pct}%`}} />
            </div>
          </div>

        <div className="grid grid-cols-2 gap-4 py-6">
          {cells.map(({label,val,italic})=>(
            <div key={label} className="text-center">
              <p className="text-[9px] font-bold uppercase tracking-widest mb-1" style={{color:'var(--ink-faint)'}}>{label}</p>
              <p className={`text-lg font-black dt ${italic?'italic':''}`} style={{color:'var(--ink)'}}>{val}</p>
            </div>
          ))}
        </div>

        {/* CSV export */}
        <div className="pt-6 border-t" style={{borderColor:'var(--border)'}}>
          <p className="text-[9px] font-bold uppercase tracking-widest mb-4" style={{color:'var(--ink-faint)'}}>Export CSV</p>
          <div className="grid grid-cols-4 gap-2">
            {['shift','24h','week','month'].map(t=>(
              <button key={t} onClick={()=>exportCSV(t)}
                className="py-3 rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all"
                style={{background:'var(--surface-2)',color:'var(--ink-mid)'}}>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Quick-add panel (barista walk-up orders) ─────── */
const QuickAddView = ({ menu, milks, onPlace }) => {
  const [step,     setStep]    = useState('drink');  // drink | temp | milk | confirm
  const [name,     setName]    = useState('');
  const [drink,    setDrink]   = useState(null);
  const [temp,     setTemp]    = useState(null);
  const [milk,     setMilk]    = useState(null);
  const [note,     setNote]    = useState('');

  const reset = () => { setStep('drink'); setName(''); setDrink(null); setTemp(null); setMilk(null); setNote(''); };

  const confirm = async () => {
    await onPlace({
      customer: name.trim() || 'Walk-up',
      flavor:   drink.name,
      price:    drink.price || 0,
      temp, milk, note: note.trim(),
    });
    reset();
  };

  const avail = menu.filter(d=>!d.soldOut);
  const availMilks = milks.filter(m=>!m.soldOut);

  return (
    <div className="ds rounded-[2.5rem] p-8 shadow-soft border animate-in"
         style={{background:'var(--surface)',borderColor:'var(--border)'}}>
      <h2 className="display text-3xl dt mb-6" style={{color:'var(--ink)'}}>QUICK ADD</h2>

      {/* Name */}
      <input value={name} onChange={e=>setName(e.target.value)}
        placeholder="Customer name (optional)"
        className="w-full px-5 py-4 rounded-2xl text-sm font-medium mb-6 outline-none border"
        style={{background:'var(--surface-2)',borderColor:'var(--border)',color:'var(--ink)'}} />

      {/* Drink select */}
      <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={{color:'var(--ink-faint)'}}>Drink</p>
      <div className="grid grid-cols-2 gap-2 mb-5">
        {avail.map(d=>(
          <button key={d.name} onClick={()=>setDrink(d)}
            className={`py-4 px-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all text-left
              ${drink?.name===d.name ? 'bg-slate-900 text-white' : 'text-slate-700 hover:bg-slate-100'}`}
            style={drink?.name===d.name?{}:{background:'var(--surface-2)'}}>
            {d.name}
          </button>
        ))}
      </div>

      {/* Temp */}
      {drink && (
        <div className="animate-in mb-5">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={{color:'var(--ink-faint)'}}>Temperature</p>
          <div className="flex gap-3">
            {['HOT','ICED'].map(t=>(
              <button key={t} onClick={()=>setTemp(t)}
                className={`flex-1 py-4 rounded-2xl font-black text-lg transition-all
                  ${temp===t ? (t==='HOT'?'bg-red-500 text-white':'bg-blue-500 text-white')
                              : (t==='HOT'?'bg-red-50 text-red-400':'bg-blue-50 text-blue-400')}`}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Milk */}
      {temp && (
        <div className="animate-in mb-5">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={{color:'var(--ink-faint)'}}>Milk</p>
          <div className="grid grid-cols-2 gap-2">
            {availMilks.map(m=>(
              <button key={m.name} onClick={()=>setMilk(m.name)}
                className={`py-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all
                  ${milk===m.name ? 'bg-slate-900 text-white' : 'text-slate-700 hover:bg-slate-100'}`}
                style={milk===m.name?{}:{background:'var(--surface-2)'}}>
                {m.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Note + confirm */}
      {milk && (
        <div className="animate-in space-y-3">
          <input value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Special request (optional)"
            className="w-full px-5 py-4 rounded-2xl text-sm font-medium outline-none border"
            style={{background:'var(--surface-2)',borderColor:'var(--border)',color:'var(--ink)'}} />
          <button onClick={confirm}
            className="w-full btn-confirm text-white py-5 rounded-2xl font-black text-lg uppercase tracking-widest">
            Place Order — ${Number(drink.price).toFixed(2)}
          </button>
        </div>
      )}

      {(drink||temp||milk) && (
        <button onClick={reset}
          className="w-full mt-3 py-3 text-[10px] font-bold uppercase tracking-widest"
          style={{color:'var(--ink-faint)'}}>
          Clear
        </button>
      )}
    </div>
  );
};

/* ── Milk selection modal ─────────────────────────── */
const MilkSelectView = ({
  pendingOrder, milks,
  selectedMilk, specialRequest,
  onSelectMilk, onSpecialRequest, onConfirm, onCancel,
}) => {
  const available = milks.filter(m=>!m.soldOut);
  const chips     = DEFAULTS.QUICK_REQUESTS;

  const toggleChip = (chip) => {
    const current = specialRequest ? specialRequest.split(', ').filter(Boolean) : [];
    const exists  = current.includes(chip);
    const next    = exists ? current.filter(c=>c!==chip) : [...current, chip];
    onSpecialRequest(next.join(', '));
  };
  const activeChips = specialRequest ? specialRequest.split(', ').filter(Boolean) : [];

  return (
    <div className="fixed inset-0 bg-white z-[100] overflow-y-auto no-scrollbar"
         style={{background:'var(--bg)'}}>
      <div className="max-w-xl mx-auto px-4 py-10 text-center">

        <span className={`inline-block text-sm font-black px-4 py-2 rounded-full mb-4
          ${pendingOrder.temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>
          {pendingOrder.temp}
        </span>

        <h2 className="display text-6xl md:text-8xl mb-10 leading-none" style={{color:'var(--ink)'}}>
          {pendingOrder.name}
        </h2>

        {/* Milk selection */}
        <div className="mb-8">
          <p className="font-black uppercase text-base underline decoration-2 underline-offset-8 mb-5"
             style={{color:'var(--ink)'}}>SELECT YOUR MILK</p>
          <div className="space-y-3">
            {available.map(m=>(
              <button key={m.name} onClick={()=>onSelectMilk(m.name)}
                className={`w-full py-6 rounded-[2rem] display text-3xl transition-all border-4
                  ${selectedMilk===m.name
                    ?'bg-slate-900 text-white border-slate-900 scale-[1.02]'
                    :'bg-white text-slate-900 border-slate-100 hover:border-slate-300'}`}>
                {m.name}
              </button>
            ))}
            {available.length===0 && (
              <p className="py-8 font-bold uppercase text-sm" style={{color:'var(--ink-faint)'}}>No milks available</p>
            )}
          </div>
        </div>

        {/* Special requests — chips + text */}
        {selectedMilk && (
          <div className="space-y-5 animate-in">
            <p className="font-black uppercase text-base underline decoration-2 underline-offset-8"
               style={{color:'var(--ink)'}}>SPECIAL REQUESTS</p>

            {/* Quick chips */}
            <div className="flex flex-wrap gap-2 justify-center">
              {chips.map(c=>(
                <button key={c} onClick={()=>toggleChip(c)}
                  className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all border-2
                    ${activeChips.includes(c)
                      ?'bg-slate-900 text-white border-slate-900'
                      :'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>
                  {c}
                </button>
              ))}
            </div>

            {/* Free-text */}
            <input type="text"
              placeholder="Anything else? (optional)"
              value={specialRequest}
              onChange={e=>onSpecialRequest(e.target.value)}
              className="w-full bg-slate-50 px-6 py-5 rounded-[2rem] text-base font-medium border outline-none text-center"
              style={{borderColor:'var(--border)',color:'var(--ink)'}} />

            {/* Total + confirm */}
            <div className="pt-4">
              <p className="display text-5xl mb-6" style={{color:'var(--ink)'}}>
                TOTAL: ${Number(pendingOrder.price).toFixed(2)}
              </p>
              <button onClick={onConfirm}
                className="w-full btn-confirm text-white py-8 rounded-[2.5rem] display text-4xl shadow-lift">
                CONFIRM ORDER
              </button>
            </div>
          </div>
        )}

        <button onClick={onCancel}
          className="mt-10 font-bold uppercase text-sm transition-all"
          style={{color:'var(--ink-faint)'}}>
          ← Back to menu

      </div>

  );
};

/* ── PIN pad (to exit kiosk) ──────────────────────── */
const PinPad = ({ correctPin, onSuccess, onCancel }) => {
  const [entry, setEntry] = useState('');
  const [shake, setShake] = useState(false);

  const press = (d) => {
    const next = (entry + d).slice(0, 4);
    setEntry(next);
    if (next.length === 4) {
      if (next === String(correctPin || DEFAULTS.DEFAULT_PIN)) {
        onSuccess();
      } else {
        setShake(true);
        setTimeout(() => { setEntry(''); setShake(false); }, 600);
      }
    }
  };

  const digits = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center"
         style={{background:'rgba(0,0,0,0.7)',backdropFilter:'blur(12px)'}}>
      <div className="bg-white rounded-[3rem] p-10 max-w-xs w-full text-center shadow-lift animate-pop"
           style={shake?{animation:'shake 0.4s'}:{}}>
        <h2 className="display text-3xl mb-6" style={{color:'var(--ink)'}}>ENTER PIN</h2>

        {/* Dots */}
        <div className="flex justify-center gap-4 mb-8">
          {[0,1,2,3].map(i=>(
            <div key={i}
              className={`w-4 h-4 rounded-full border-2 transition-all
                ${i < entry.length ? 'pin-dot-filled border-slate-900' : 'border-slate-300'}`} />
          ))}
        </div>

        {/* Grid */}
        <div className="grid grid-cols-3 gap-3">
          {digits.map((d, i) => (
            <button key={i}
              onClick={() => {
                if (d === '⌫') setEntry(e => e.slice(0,-1));
                else if (d !== '') press(String(d));
              }}
              className={`py-5 rounded-2xl font-black text-2xl transition-all
                ${d===''?'pointer-events-none':'hover:scale-105 active:scale-95'}
                ${d==='⌫'?'bg-red-50 text-red-400':'bg-slate-50 text-slate-900'}`}>
              {d}
            </button>
          ))}
        </div>

        <button onClick={onCancel}
          className="mt-6 text-[10px] font-bold uppercase tracking-widest"
          style={{color:'var(--ink-faint)'}}>
          Cancel
        </button>
      </div>

      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════
   SECTION 9 — ROOT APP COMPONENT
   Wires data hook ↔ UI components.
   No styling here. Only connections.
   ═══════════════════════════════════════════════════════════════════ */
const App = () => {
  const data = useAppData();

  /* ── Barista local state ──────────────────── */
  const [baristaView,    setBaristaView]    = useState('queue');
  const [showShiftModal, setShowShiftModal] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [deleteDrinkIdx, setDeleteDrinkIdx] = useState(null);
  const [undoOrder,      setUndoOrder]      = useState(null);
  const undoTimerRef = useRef(null);

  /* ── Kiosk local state ────────────────────── */
  const [pendingOrder,      setPendingOrder]      = useState(null);
  const [selectedMilk,      setSelectedMilk]      = useState(null);
  const [specialRequest,    setSpecialRequest]     = useState('');
  const [customerName,      setCustomerName]       = useState('');
  const [successOrderNum,   setSuccessOrderNum]    = useState(null);
  const [showAttract,       setShowAttract]        = useState(false);
  const [showPinPad,        setShowPinPad]         = useState(false);

  const idleTimerRef = useRef(null);
  const exitTapRef   = useRef({ count:0, last:0 });
  const prevOrderLen = useRef(0);

  /* ── New order chime ──────────────────────── */
  useEffect(() => {
    if (data.appMode === 'barista' && data.orders.length > prevOrderLen.current) {
      data.playChime();
    }
    prevOrderLen.current = data.orders.length;
  }, [data.orders.length, data.appMode]);

  /* ── Idle attract screen ──────────────────── */
  const resetIdle = useCallback(() => {
    clearTimeout(idleTimerRef.current);
    setShowAttract(false);
    if (data.appMode === 'kiosk') {
      idleTimerRef.current = setTimeout(() => setShowAttract(true), DEFAULTS.IDLE_TIMEOUT_MS);
    }
  }, [data.appMode]);

  useEffect(() => {
    if (data.appMode !== 'kiosk') { clearTimeout(idleTimerRef.current); return; }
    resetIdle();
    const events = ['touchstart','mousemove','keydown','click'];
    events.forEach(e => window.addEventListener(e, resetIdle, { passive:true }));
    return () => {
      clearTimeout(idleTimerRef.current);
      events.forEach(e => window.removeEventListener(e, resetIdle));
    };
  }, [data.appMode, resetIdle]);

  /* ── Kiosk handlers ───────────────────────── */
  const handleSelectDrink = (drink, temp) => {
    setPendingOrder({...drink, temp});
    setSelectedMilk(null);
    setSpecialRequest('');
  };

  const handleConfirmOrder = async () => {
    const num = await data.placeOrder({
      customer: customerName.trim() || 'Guest',
      flavor:   pendingOrder.name,
      price:    pendingOrder.price || 0,
      temp:     pendingOrder.temp,
      milk:     selectedMilk,
      note:     specialRequest.trim(),
    });
    setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); setCustomerName('');
    setSuccessOrderNum(num);
    setTimeout(() => { setSuccessOrderNum(null); window.scrollTo({top:0}); }, DEFAULTS.SUCCESS_MS);
  };

  const handleCancelOrder = () => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); };

  // Triple-tap zone → show PIN pad
  const handleExitTap = () => {
    const now = Date.now();
    if (now - exitTapRef.current.last > DEFAULTS.KIOSK_EXIT_MS) exitTapRef.current.count = 0;
    exitTapRef.current.count++;
    exitTapRef.current.last = now;
    if (exitTapRef.current.count >= DEFAULTS.KIOSK_EXIT_TAPS) {
      setShowPinPad(true);
      exitTapRef.current.count = 0;
    }
  };

  const handlePinSuccess = () => {
    setShowPinPad(false);
    data.switchMode('barista');
    setBaristaView('settings');
  };

  /* ── Barista handlers ─────────────────────── */
  const handleComplete = (order) => {
    data.completeOrder(order);
    clearTimeout(undoTimerRef.current);
    setUndoOrder(order);
    undoTimerRef.current = setTimeout(() => setUndoOrder(null), DEFAULTS.UNDO_MS);
  };

  const handleUndo = () => {
    if (undoOrder) {
      data.undoComplete(undoOrder);
      setUndoOrder(null);
      clearTimeout(undoTimerRef.current);
    }
  };

  const handleEndShiftConfirm = () => { data.endShift(); setShowShiftModal(false); };
  const handleClearHistoryConfirm = () => { data.clearHistory(); setShowClearModal(false); };
  const handleDeleteDrinkConfirm = () => {
    if (deleteDrinkIdx !== null) data.deleteMenuItem(deleteDrinkIdx);
    setDeleteDrinkIdx(null);
  };

  // Barista quick-add places order exactly like kiosk
  const handleQuickAdd = (orderData) => data.placeOrder(orderData);

  /* ── Render ───────────────────────────────── */
  return (
    <Fragment>

      {/* ════════════════════════════════════════
          BARISTA MODE
          ════════════════════════════════════════ */}
      {data.appMode === 'barista' && (
        <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen">
          <BaristaNav
            view={baristaView}
            setView={setBaristaView}
            queueCount={data.orders.length}
            online={data.online}
            darkMode={data.settings.darkMode}
          />

          {baristaView === 'queue' && (
            <QueueView
              orders={data.orders}
              settings={data.settings}
              onReady={data.markReady}
              onComplete={handleComplete}
              onNote={data.addBaristaNote}
            />
          )}
          {baristaView === 'add' && (
            <QuickAddView
              menu={data.menu}
              milks={data.milks}
              onPlace={handleQuickAdd}
            />
          )}
          {baristaView === 'history' && (
            <HistoryView
              history={data.history}
              onClear={() => setShowClearModal(true)}
            />
          )}
          {baristaView === 'stats' && (
            <StatsView
              shift={data.shift}
              shiftStats={data.shiftStats}
              settings={data.settings}
              onStartShift={data.startShift}
              onEndShiftRequest={() => setShowShiftModal(true)}
              exportCSV={data.exportCSV}
            />
          )}
          {baristaView === 'settings' && (
            <SettingsView
                menu={data.menu}
                milks={data.milks}
                settings={data.settings}
                onAddDrink={data.addMenuItem}
                onUpdateDrink={data.updateMenuItem}
                onDeleteDrink={i => setDeleteDrinkIdx(i)}
                onToggleDrinkSoldOut={data.toggleDrinkSoldOut}
                onAddMilk={data.addMilkItem}
                onUpdateMilk={data.updateMilkItem}
                onDeleteMilk={data.deleteMilkItem}
                onToggleMilkSoldOut={data.toggleMilkSoldOut}
                onUpdateSettings={data.updateSettings}
                onLaunchKiosk={() => data.switchMode('kiosk')}
              />
          )}

          {/* Barista modals */}
          {showShiftModal && (
            <ShiftEndModal
              stats={data.shiftStats}
              onConfirm={handleEndShiftConfirm}
              onCancel={() => setShowShiftModal(false)}
            />
          )}
          {showClearModal && (
            <ClearHistoryModal
              onConfirm={handleClearHistoryConfirm}
              onCancel={() => setShowClearModal(false)}
            />
          )}
          {deleteDrinkIdx !== null && (
            <DeleteDrinkModal
              name={data.menu[deleteDrinkIdx]?.name}
              onConfirm={handleDeleteDrinkConfirm}
              onCancel={() => setDeleteDrinkIdx(null)}
            />
          )}

          {/* Undo toast */}
          {undoOrder && (
            <UndoToast
              order={undoOrder}
              onUndo={handleUndo}
              onDismiss={() => setUndoOrder(null)}
            />
          )}
        </div>
      )}

      {/* ════════════════════════════════════════
          KIOSK MODE
          ════════════════════════════════════════ */}
      {data.appMode === 'kiosk' && (
        <Fragment>
          {/* Attract / idle screen */}
          {showAttract && !pendingOrder && !successOrderNum && (
            <AttractScreen
              eventName={data.settings.eventName}
              onTap={() => { setShowAttract(false); resetIdle(); }}
            />
          )}

          {/* Main menu */}
          {!pendingOrder && (
            <KioskMenuView
              menu={data.menu}
              customerName={customerName}
              queueCount={data.orders.length}
              settings={data.settings}
              onNameChange={setCustomerName}
              onSelectDrink={handleSelectDrink}
              onExitTap={handleExitTap}
            />
          )}

          {/* Milk + confirm */}
          {pendingOrder && (
            <MilkSelectView
              pendingOrder={pendingOrder}
              milks={data.milks}
              selectedMilk={selectedMilk}
              specialRequest={specialRequest}
              onSelectMilk={setSelectedMilk}
              onSpecialRequest={setSpecialRequest}
              onConfirm={handleConfirmOrder}
              onCancel={handleCancelOrder}
            />
          )}

          {/* Success */}
          {successOrderNum !== null && <SuccessScreen orderNumber={successOrderNum} />}

          {/* PIN pad */}
          {showPinPad && (
            <PinPad
              correctPin={data.settings.pin || DEFAULTS.DEFAULT_PIN}
              onSuccess={handlePinSuccess}
              onCancel={() => setShowPinPad(false)}
            />
          )}
        </Fragment>
      )}

    </Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
