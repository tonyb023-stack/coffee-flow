<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .soft-shadow { box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const addMenuItem = () => db.ref('menu').set([...menuDrinks, { name: "NEW DRINK", price: 5, soldOut: false }]);
            const updateMenuItem = (index, field, value) => {
                const newMenu = [...menuDrinks];
                newMenu[index][field] = value;
                db.ref('menu').set(newMenu);
            };
            const deleteMenuItem = (i) => confirm("Delete?") && db.ref('menu').set(menuDrinks.filter((_, idx) => idx !== i));

            const addMilkItem = () => db.ref('milks').set([...milks, { name: "NEW MILK", soldOut: false }]);
            const updateMilkItem = (index, field, value) => {
                const newMilks = [...milks];
                newMilks[index][field] = value;
                db.ref('milks').set(newMilks);
            };
            const deleteMilkItem = (i) => confirm("Delete?") && db.ref('milks').set(milks.filter((_, idx) => idx !== i));

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const count = activeOrders.length;
                return { revenue, count };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* BARISTA MODE UI */}
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl soft-shadow border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] soft-shadow flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-black uppercase italic tracking-tighter text-slate-900 leading-none mb-2">{o.customer}</h3>
                                                <p className="text-slate-500 font-bold uppercase text-lg tracking-widest">{o.flavor} • {o.milk}</p>
                                                {o.note && <p className="text-emerald-500 font-black text-xs italic uppercase mt-2">"{o.note}"</p>}
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-20 h-20 bg-slate-900 text-white rounded-3xl font-black text-3xl shadow-xl active:scale-95 transition-all">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <p className="text-center py-20 text-slate-200 font-black uppercase text-4xl italic">No Orders</p>}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className="bg-white rounded-[3rem] p-8 soft-shadow border border-slate-50 space-y-4">
                                    {history.slice(0, 20).map(o => (
                                        <div key={o.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                            <div>
                                                <p className="font-black uppercase text-slate-900">{o.customer}</p>
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{o.flavor} • {o.milk}</p>
                                            </div>
                                            <p className="font-black text-emerald-500">${Number(o.price).toFixed(2)}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="bg-white p-10 rounded-[3rem] text-center soft-shadow border border-slate-50">
                                    <button onClick={() => db.ref('shift').set({active: !shiftStatus.active, startTime: Date.now()})} className={`mb-8 px-10 py-4 rounded-full font-black uppercase text-sm ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                        {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                    </button>
                                    <h2 className="text-slate-400 font-black uppercase tracking-widest text-xs mb-2">Revenue</h2>
                                    <p className="text-7xl font-black italic text-slate-900 mb-8">${shiftStats.revenue.toFixed(2)}</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-6 rounded-3xl"><p className="text-xs font-bold text-slate-300 uppercase">Served</p><p className="text-2xl font-black">{shiftStats.count}</p></div>
                                        <div className="bg-slate-50 p-6 rounded-3xl"><p className="text-xs font-bold text-slate-300 uppercase">Avg Wait</p><p className="text-2xl font-black">2.4m</p></div>
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8">
                                    <div className="bg-white p-8 rounded-[3rem] soft-shadow border border-slate-50">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic text-slate-900">Menu</h3>
                                            <button onClick={addMenuItem} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ Add</button>
                                        </div>
                                        <div className="space-y-2">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-2xl">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs" value={d.name} onChange={e => updateMenuItem(i, 'name', e.target.value)} />
                                                    <input className="w-16 bg-white p-3 rounded-xl font-bold text-xs" type="number" value={d.price} onChange={e => updateMenuItem(i, 'price', e.target.value)} />
                                                    <button onClick={() => deleteMenuItem(i)} className="p-3 text-red-500 font-black">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[3rem] soft-shadow border border-slate-50">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic text-slate-900">Milk Options</h3>
                                            <button onClick={addMilkItem} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ Add</button>
                                        </div>
                                        <div className="space-y-2">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-2xl">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs" value={m.name} onChange={e => updateMilkItem(i, 'name', e.target.value)} />
                                                    <button onClick={() => updateMilkItem(i, 'soldOut', !m.soldOut)} className={`px-4 py-3 rounded-xl text-[10px] font-black uppercase ${m.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => deleteMilkItem(i)} className="p-3 text-red-500 font-black">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setAppMode('kiosk')} className="w-full bg-slate-900 text-white p-10 rounded-[3rem] font-black uppercase text-2xl shadow-2xl italic tracking-tighter transition-transform active:scale-95">Launch Kiosk</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* KIOSK MODE UI */}
                    {appMode === 'kiosk' && (
                        <div className="animate-in text-center pt-10">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            {!pendingOrder ? (
                                <>
                                    <h1 className="text-6xl font-black text-slate-900 uppercase italic mb-12 tight-tracking">NEBULOUS</h1>
                                    <div className="max-w-2xl mx-auto mb-12">
                                        <input type="text" placeholder="WHO IS THIS FOR?" className="w-full bg-white p-8 rounded-[2.5rem] text-3xl font-black uppercase text-center card-shadow outline-none" value={customerName} onChange={e => setCustomerName(e.target.value)} />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                            <div key={drink.name} className="bg-white rounded-[2.5rem] p-6 card-shadow flex flex-col gap-6">
                                                <div className="flex justify-between items-center px-2">
                                                    <h3 className="text-2xl font-black uppercase italic text-slate-900 leading-none">{drink.name}</h3>
                                                    <span className="font-bold text-slate-400 italic">${Number(drink.price).toFixed(2)}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95 transition-all">HOT</button>
                                                    <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95 transition-all">ICED</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                                    <div className="max-w-xl w-full animate-in">
                                        <h2 className="text-6xl font-black uppercase italic mb-12 leading-none">{pendingOrder.name}</h2>
                                        
                                        <p className="text-slate-900 font-black uppercase text-xl mb-6 tracking-widest">Select Your Milk Option</p>
                                        <div className="grid gap-3 mb-12">
                                            {milks.filter(m => !m.soldOut).map(m => (
                                                <button key={m.name} onClick={() => setSelectedMilk(m.name)} 
                                                    className={`py-6 rounded-[2rem] text-2xl font-black uppercase border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-50 text-slate-900'}`}>
                                                    {m.name}
                                                </button>
                                            ))}
                                        </div>

                                        {selectedMilk && (
                                            <div className="space-y-6 animate-in">
                                                <div className="space-y-2">
                                                    <p className="text-slate-400 font-black uppercase text-sm tracking-widest">Anything Else?</p>
                                                    <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-6 rounded-3xl text-center font-bold uppercase outline-none" value={specialRequest} onChange={e => setSpecialRequest(e.target.value)} />
                                                </div>
                                                <div className="pt-6">
                                                    <p className="text-black font-black text-4xl mb-4 italic tracking-tighter">TOTAL: ${Number(pendingOrder.price).toFixed(2)}</p>
                                                    <button onClick={finalizeOrder} className="w-full confirm-btn py-10 rounded-[3rem] text-white font-black uppercase text-3xl italic shadow-2xl active:scale-95 transition-all">Confirm Order</button>
                                                </div>
                                                <button onClick={() => {setPendingOrder(null); setSelectedMilk(null);}} className="text-slate-300 font-black uppercase text-sm tracking-widest pt-4">Cancel & Start Over</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* SUCCESS OVERLAY */}
                    {showSuccess && (
                        <div className="fixed inset-0 bg-emerald-500 z-[200] flex flex-col items-center justify-center text-white animate-in">
                            <h1 className="text-7xl font-black uppercase italic mb-4">ORDERED!</h1>
                            <p className="text-emerald-100 font-bold uppercase tracking-[0.3em]">Nebulous Coffee is on the way</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
