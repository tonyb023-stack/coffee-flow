<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); }
        .soft-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        .kiosk-img { width: 100%; height: 280px; object-fit: cover; border-radius: 3rem 3rem 0 0; }
        #exit-zone { position: fixed; top: 0; right: 0; width: 100px; height: 100px; z-index: 10000; cursor: pointer; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };

                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => b.id - a.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));

                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const statsData = useMemo(() => {
                const filtered = shiftStatus.active ? history.filter(o => o.completedAt > shiftStatus.startTime) : [];
                const revenue = filtered.reduce((s, o) => s + (Number(o.price) || 0), 0);
                const counts = filtered.reduce((a, o) => { a[o.flavor] = (a[o.flavor] || 0) + 1; return a; }, {});
                
                let top = "N/A";
                let max = 0;
                Object.entries(counts).forEach(([flavor, count]) => {
                    if (count > max) { max = count; top = flavor; }
                });

                return { revenue, top, count: filtered.length };
            }, [history, shiftStatus]);

            const exportCSV = (days, label) => {
                const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
                const data = history.filter(o => o.completedAt > cutoff);
                const csv = "Customer,Flavor,Temp,Milk,Price,Note,Wait(s)\n" + 
                    data.map(o => `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},"${o.note || ''}",${o.waitTimeSeconds || 0}`).join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `Nebulous_${label}_Report.csv`; a.click();
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const clearHistory = () => {
                if (confirm("Are you sure? This will delete ALL order history.")) {
                    db.ref('history').remove();
                    db.ref('shift').set({ active: false, startTime: 0 });
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* BARISTA UI (Unchanged) */}
                    {appMode === 'barista' && (
                         <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl soft-shadow border border-slate-100">
                            {['queue', 'history', 'stats', 'settings'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                    {v}
                                </button>
                            ))}
                        </nav>
                    )}

                    {appMode === 'barista' && view === 'queue' && (
                        <div className="space-y-4 animate-in">
                            {orders.length === 0 && <p className="text-center py-20 font-black text-slate-300 uppercase italic">All Caught Up</p>}
                            {orders.map(o => (
                                <div key={o.id} className={`flex justify-between items-center p-8 rounded-[3rem] bg-white shadow-lg border-l-[16px] ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                    <div><h2 className="text-3xl font-black text-slate-800 uppercase italic">{o.customer}</h2><p className="text-slate-400 font-bold uppercase">{o.temp} {o.flavor} • {o.milk}</p></div>
                                    <button onClick={() => {
                                        const now = Date.now();
                                        db.ref(`history/${o.id}`).set({...o, status:'Completed', completedAt: now, waitTimeSeconds: Math.floor((now - o.startTime)/1000)});
                                        db.ref(`orders/${o.id}`).remove();
                                    }} className="bg-emerald-500 text-white w-20 h-20 rounded-3xl text-4xl font-black">✓</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {appMode === 'barista' && view === 'settings' && (
                        <div className="space-y-8 animate-in pb-12">
                            <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                                <h2 className="text-2xl font-black mb-6 uppercase italic text-slate-800">Menu & Milks</h2>
                                <p className="text-xs text-slate-400 mb-6 font-bold">Use this panel to manage availability and add new items.</p>
                                {menuDrinks.map((d, i) => (
                                    <div key={i} className="flex items-center gap-3 mb-4 p-4 bg-slate-50 rounded-2xl">
                                        <input className="flex-1 bg-transparent font-black uppercase text-sm" value={d.name} onChange={(e) => { const n = [...menuDrinks]; n[i].name = e.target.value; db.ref('menu').set(n); }} />
                                        <button onClick={() => { const n = [...menuDrinks]; n[i].soldOut = !d.soldOut; db.ref('menu').set(n); }} className={`px-4 py-2 rounded-xl font-black text-[10px] ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full bg-slate-900 text-white p-8 rounded-[3rem] font-black uppercase text-xl shadow-2xl italic tracking-tighter active:scale-95 transition-transform">Launch Kiosk Mode</button>
                        </div>
                    )}

                    {/* KIOSK MODE: HOME */}
                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-12 pb-24">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <header className="text-center mb-16">
                                <h1 className="text-8xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">NEBULOUS</h1>
                            </header>
                            <input type="text" placeholder="WHO IS THIS FOR?" className="w-full bg-transparent border-b-8 border-slate-100 p-6 text-5xl font-black uppercase text-center outline-none mb-16 focus:border-slate-900 transition-colors" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            <div className="grid grid-cols-1 gap-12">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="bg-white rounded-[4rem] overflow-hidden shadow-2xl border border-slate-50">
                                        {drink.image && <img src={drink.image} className="kiosk-img" />}
                                        <div className="p-12">
                                            <div className="flex justify-between items-baseline mb-10">
                                                <h3 className="text-5xl font-black text-slate-900 uppercase italic tracking-tighter">{drink.name}</h3>
                                                <span className="text-2xl font-bold text-slate-400 italic bg-slate-50 px-6 py-2 rounded-full">${Number(drink.price).toFixed(2)}</span>
                                            </div>
                                            <div className="flex gap-6">
                                                <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-10 rounded-[2.5rem] text-white font-black text-3xl shadow-lg">HOT</button>
                                                <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-10 rounded-[2.5rem] text-white font-black text-3xl shadow-lg">ICED</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* KIOSK MODE: CHECKOUT (Pleasant View) */}
                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                            <div className="max-w-xl w-full animate-in text-center py-12">
                                <div className="mb-12">
                                    {/* UPDATED: "Selection" removed */}
                                    <p className="text-slate-400 font-bold uppercase tracking-[0.3em] text-sm mb-1">{pendingOrder.temp}</p>
                                    <h2 className="text-8xl font-black uppercase italic text-slate-900 leading-none tracking-tighter">{pendingOrder.name}</h2>
                                </div>
                                
                                <div className="space-y-10 mb-12">
                                    <div>
                                        <p className="text-xs font-black uppercase text-slate-400 tracking-[0.2em] mb-6">Choose Milk Type</p>
                                        <div className="grid grid-cols-1 gap-4">
                                            {milks.filter(m => !m.soldOut).map(m => (
                                                /* UPDATED: "Available" look (white bg, black text, pleasant aesthetics) */
                                                <button key={m.name} onClick={() => setSelectedMilk(m.name)} 
                                                    className={`py-8 rounded-[2.5rem] text-3xl font-black uppercase italic transition-all duration-300 ${selectedMilk === m.name ? 'bg-slate-900 text-white card-shadow scale-[1.02]' : 'bg-white text-slate-900 border-4 soft-shadow hover:bg-slate-100'}`}>
                                                    {m.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {selectedMilk && (
                                        <div className="space-y-10 animate-in">
                                            <div className="text-center">
                                                <p className="text-xs font-black uppercase text-slate-400 tracking-[0.2em] mb-4">Special Requests?</p>
                                                <input type="text" placeholder="EG: ICE LEVEL, SWEETNESS LEVEL..." 
                                                    className="w-full bg-slate-50 p-7 rounded-[2.5rem] text-xl font-bold uppercase border border-slate-100 outline-none text-center focus:bg-white focus:border-slate-300 transition-all" 
                                                    value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            </div>
                                            
                                            <div className="pt-6">
                                                <p className="text-xl font-black uppercase text-slate-900 mb-6 italic">Total: ${Number(pendingOrder.price).toFixed(2)}</p>
                                                <button onClick={finalizeOrder} className="w-full confirm-btn text-white py-10 rounded-[3rem] font-black uppercase text-4xl active:scale-95 transition-all">Confirm Order</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                {/* UPDATED: Button enlarged */}
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-black uppercase text-2xl tracking-[0.4em] mt-12 hover:text-slate-900 transition-colors">Go Back</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in">
                            <div className="w-32 h-32 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-8 shadow-inner"><span className="text-6xl font-black">✓</span></div>
                            <h1 className="text-5xl font-black uppercase italic tracking-tighter text-slate-900">ORDER PLACED</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
