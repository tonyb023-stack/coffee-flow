<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anu Day Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            color: #0f172a;
        }

        /* Glassmorphism Effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
        }

        .obsidian-btn {
            background: #0f172a;
            color: white;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Responsive Squircles */
        .squircle-lg { border-radius: 2.5rem; }
        @media (max-width: 768px) { .squircle-lg { border-radius: 1.5rem; } }

        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        #exit-zone { position: fixed; top: 0; right: 0; width: 80px; height: 80px; z-index: 10000; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active) setShowShiftModal(true);
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const confirmEndShift = () => {
                db.ref('shift').set({ active: false, startTime: 0 });
                setShowShiftModal(false);
            };

            const clearHistory = () => { if(confirm("Clear all history?")) db.ref('history').remove(); };

            const addMenuItem = () => {
                const newMenu = [...menuDrinks, { name: "NEW DRINK", price: 5, soldOut: false }];
                db.ref('menu').set(newMenu);
            };

            const updateMenuItem = (index, field, value) => {
                const newMenu = [...menuDrinks];
                newMenu[index][field] = value;
                db.ref('menu').set(newMenu);
            };

            const deleteMenuItem = (index) => {
                if (confirm("Delete this drink from the menu?")) {
                    const newMenu = menuDrinks.filter((_, i) => i !== index);
                    db.ref('menu').set(newMenu);
                }
            };

            const addMilkItem = () => {
                const newMilks = [...milks, { name: "NEW MILK", soldOut: false }];
                db.ref('milks').set(newMilks);
            };

            const updateMilkItem = (index, field, value) => {
                const newMilks = [...milks];
                newMilks[index][field] = value;
                db.ref('milks').set(newMilks);
            };

            const deleteMilkItem = (index) => {
                if (confirm("Delete this milk option?")) {
                    const newMilks = milks.filter((_, i) => i !== index);
                    db.ref('milks').set(newMilks);
                }
            };

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = [];
                if (timeFrame === 'shift') filtered = history.filter(o => o.completedAt > shiftStatus.startTime);
                else if (timeFrame === '24h') filtered = history.filter(o => o.completedAt > (now - 86400000));
                else if (timeFrame === 'week') filtered = history.filter(o => o.completedAt > (now - 604800000));
                else if (timeFrame === 'month') filtered = history.filter(o => o.completedAt > (now - 2592000000));

                let csv = "Customer,Flavor,Temp,Milk,Price,Wait Time,Date\n";
                filtered.forEach(o => { 
                    csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `anu_export_${timeFrame}_${new Date().toLocaleDateString()}.csv`);
                a.click();
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                activeOrders.forEach(o => drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1);
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (activeOrders.reduce((a,b) => a + b.waitTime, 0) / activeOrders.length).toFixed(1) : 0;
                return { revenue, topDrink, count: activeOrders.length, avgWait };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <>
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl shadow-sm border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="grid grid-cols-1 gap-4 animate-in">
                                    {orders.map(o => (
                                        <div key={o.id} className="bg-white p-6 rounded-[2rem] shadow-sm flex justify-between items-center border border-slate-50">
                                            <div className="flex-1">
                                                <h3 className="text-2xl font-black uppercase text-slate-900 leading-tight">{o.customer}</h3>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-400 font-bold uppercase text-sm">{o.flavor} • {o.milk}</p>
                                                </div>
                                                {o.note && <p className="mt-2 text-emerald-600 font-medium text-xs italic">"{o.note}"</p>}
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-14 h-14 bg-slate-900 text-white rounded-2xl font-bold text-xl hover:scale-105 active:scale-95 transition-all">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm animate-in border border-slate-50">
                                    <div className="flex justify-between mb-8 items-center">
                                        <h2 className="font-bold uppercase text-lg text-slate-900">History</h2>
                                        <button onClick={clearHistory} className="text-[10px] font-bold text-red-500 uppercase">Clear</button>
                                    </div>
                                    <div className="space-y-4">
                                        {history.slice(0, 20).map(o => (
                                            <div key={o.id} className="flex justify-between items-center p-4 border-b border-slate-50">
                                                <div>
                                                    <p className="font-bold text-slate-900 uppercase">{o.customer}</p>
                                                    <p className="text-xs text-slate-400 uppercase">{o.flavor} • {o.waitTime}m wait</p>
                                                </div>
                                                <p className="font-bold text-emerald-500">${Number(o.price).toFixed(2)}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-sm text-center border border-slate-50">
                                        <button onClick={toggleShift} className={`mb-8 px-10 py-4 rounded-full font-bold uppercase text-xs tracking-widest ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                            {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                        </button>
                                        <div className="grid grid-cols-2 gap-8">
                                            <div><p className="text-[10px] text-slate-300 font-bold uppercase mb-1">Total Drinks</p><p className="text-4xl font-black text-slate-900">{shiftStats.count}</p></div>
                                            <div><p className="text-[10px] text-slate-300 font-bold uppercase mb-1">Revenue</p><p className="text-4xl font-black text-slate-900">${shiftStats.revenue.toFixed(2)}</p></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-4 gap-2">
                                        {['shift', '24h', 'week', 'month'].map(t => (
                                            <button key={t} onClick={() => exportCSV(t)} className="bg-white p-4 rounded-2xl font-bold text-[9px] uppercase border border-slate-50">CSV {t}</button>
                                        ))}
                                    </div>
                                    {showShiftModal && (
                                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
                                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center">
                                                <h2 className="text-xl font-bold mb-6">End Shift?</h2>
                                                <button onClick={confirmEndShift} className="w-full bg-red-500 text-white py-4 rounded-xl font-bold mb-2">Yes, End</button>
                                                <button onClick={() => setShowShiftModal(false)} className="w-full text-slate-400 font-bold py-4">Cancel</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold uppercase text-slate-900">Menu</h3>
                                            <button onClick={addMenuItem} className="text-[10px] font-bold bg-slate-900 text-white px-4 py-2 rounded-full">+ Add</button>
                                        </div>
                                        <div className="space-y-2">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-xl">
                                                    <input className="flex-1 bg-white p-2 rounded-lg text-xs font-bold" value={d.name} onChange={e => updateMenuItem(i, 'name', e.target.value)} />
                                                    <input className="w-12 bg-white p-2 rounded-lg text-xs font-bold" type="number" value={d.price} onChange={e => updateMenuItem(i, 'price', e.target.value)} />
                                                    <button onClick={() => updateMenuItem(i, 'soldOut', !d.soldOut)} className={`px-3 py-2 rounded-lg text-[9px] font-bold ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-500'}`}>OUT</button>
                                                    <button onClick={() => deleteMenuItem(i)} className="p-2 text-red-500">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full obsidian-btn p-8 rounded-[2rem] font-bold uppercase tracking-[0.2em] shadow-xl">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-6 md:pt-12 pb-24 text-center px-4">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            
                            <div className="mb-12">
                                <h1 className="text-4xl md:text-6xl font-black text-slate-900 tracking-tighter uppercase italic mb-2">ANU DAY</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] ml-1">Specialty Coffee</p>
                            </div>
                            
                            <div className="max-w-xl mx-auto mb-10">
                                <input 
                                    type="text" 
                                    placeholder="Order For..." 
                                    className="w-full glass-card p-6 md:p-8 squircle-lg text-2xl md:text-3xl font-bold text-center outline-none placeholder:text-slate-200 text-slate-900 transition-all border-none focus:ring-2 focus:ring-slate-900/5" 
                                    value={customerName} 
                                    onChange={(e) => setCustomerName(e.target.value)} 
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="glass-card squircle-lg p-6 flex flex-col justify-between group">
                                        <div className="flex justify-between items-start mb-6">
                                            <h3 className="text-xl md:text-2xl font-bold text-slate-900 uppercase tracking-tight text-left pr-4 leading-tight">{drink.name}</h3>
                                            <span className="text-xs font-medium text-slate-400 font-mono tracking-widest">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="flex-1 py-5 rounded-[1.2rem] border-2 border-slate-900 text-slate-900 font-bold text-sm tracking-widest hover:bg-slate-900 hover:text-white transition-all">HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="flex-1 py-5 rounded-[1.2rem] obsidian-btn font-bold text-sm tracking-widest active:scale-95">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] flex items-center justify-center p-6 overflow-y-auto">
                            <div className="max-w-lg w-full animate-in text-center py-12">
                                <div className="mb-12">
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-4 block">Selection</span>
                                    <h2 className="text-5xl md:text-6xl font-black uppercase text-slate-900 tracking-tighter mb-2">{pendingOrder.name}</h2>
                                    <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">{pendingOrder.temp} EDITION</p>
                                </div>

                                <div className="space-y-12">
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Milk Options</p>
                                        <div className="grid grid-cols-1 gap-3">
                                            {milks.filter(m => !m.soldOut).map(m => (
                                                <button key={m.name} onClick={() => setSelectedMilk(m.name)} 
                                                    className={`py-6 rounded-2xl text-lg font-bold uppercase transition-all border-2 ${selectedMilk === m.name ? 'border-slate-900 bg-slate-900 text-white shadow-lg' : 'border-slate-50 bg-white text-slate-400'}`}>
                                                    {m.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {selectedMilk && (
                                        <div className="space-y-12 animate-in">
                                            <input type="text" placeholder="Notes or Requests?" className="w-full bg-slate-50 p-6 rounded-2xl text-lg font-medium border-none outline-none text-center placeholder:text-slate-300" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <button onClick={finalizeOrder} className="w-full obsidian-btn py-8 rounded-[2rem] font-bold uppercase text-2xl tracking-widest shadow-2xl active:scale-95">Confirm Order</button>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-bold uppercase text-xs tracking-widest mt-12 hover:text-slate-900 transition-colors underline underline-offset-8">Go Back</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-slate-900 z-[200] flex flex-col items-center justify-center animate-in p-8 text-center">
                            <div className="w-20 h-20 border-2 border-white/20 rounded-full flex items-center justify-center mb-8">
                                <span className="text-white text-4xl">✓</span>
                            </div>
                            <h1 className="text-5xl font-black text-white uppercase italic tracking-tighter mb-4">Confirmed</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-[0.3em] text-xs">We are preparing your {pendingOrder?.name || 'Drink'}</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
