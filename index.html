<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-in { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-user-select: none; touch-action: manipulation; }
        input { -webkit-user-select: text; }
        .hidden-trigger { position: fixed; top: 0; right: 0; width: 80px; height: 80px; z-index: 999; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const getOrderColor = (temp) => {
            if (temp === 'Hot') return 'border-red-500';
            if (temp === 'Iced') return 'border-blue-500';
            return 'border-slate-300';
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [history, setHistory] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: null });
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);
            const [secretTaps, setSecretTaps] = useState(0);
            const [note, setNote] = useState('');

            useEffect(() => {
                db.ref('orders').on('value', snap => {
                    const data = snap.val() || {};
                    setOrders(Object.values(data).sort((a,b) => b.id - a.id));
                });
                db.ref('menu').on('value', snap => setMenuDrinks(snap.val() || []));
                db.ref('milks').on('value', snap => setMilks(snap.val() || []));
                db.ref('history').on('value', snap => {
                    const data = snap.val() || {};
                    setHistory(Object.values(data).sort((a,b) => b.completedAt - a.completedAt));
                });
                db.ref('shift').on('value', snap => setShiftStatus(snap.val() || { active: false }));
            }, []);

            const stats = useMemo(() => {
                const now = new Date();
                const startOfDay = new Date().setHours(0,0,0,0);
                const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay())).setHours(0,0,0,0);

                // Filter history based on current shift if active, else just today
                const activeShiftOrders = shiftStatus.active 
                    ? history.filter(o => o.completedAt > shiftStatus.startTime)
                    : [];

                const todaysOrders = history.filter(o => o.completedAt > startOfDay);
                const weeklyOrders = history.filter(o => o.completedAt > startOfWeek);
                
                const totalRevenue = activeShiftOrders.reduce((sum, o) => sum + (Number(o.price) || 0), 0);
                const drinkCounts = activeShiftOrders.reduce((acc, o) => {
                    acc[o.flavor] = (acc[o.flavor] || 0) + 1;
                    return acc;
                }, {});
                const topDrink = Object.entries(drinkCounts).sort((a,b) => b[1] - a[1])[0];

                return { 
                    count: activeShiftOrders.length, 
                    revenue: totalRevenue, 
                    popular: topDrink ? topDrink[0] : 'N/A', 
                    activeShiftOrders,
                    todaysOrders,
                    weeklyOrders
                };
            }, [history, shiftStatus]);

            const toggleShift = () => {
                if (!shiftStatus.active) {
                    db.ref('shift').set({ active: true, startTime: Date.now() });
                } else {
                    if (confirm(`End Shift? Total Revenue: $${stats.revenue.toFixed(2)}`)) {
                        db.ref('shift').set({ active: false, startTime: null });
                        alert("Shift Ended. Live history cleared for next shift.");
                    }
                }
            };

            const exportToCSV = (data, filename) => {
                if (data.length === 0) return alert("No data for this period!");
                const headers = ["ID", "Customer", "Drink", "Temp", "Milk", "Price", "Note", "Ordered At", "Completed At", "Wait Time (Sec)"];
                const rows = data.map(o => [
                    o.id,
                    o.customer,
                    o.flavor,
                    o.temp,
                    o.milk,
                    o.price,
                    o.note || "",
                    new Date(o.startTime).toLocaleString(),
                    new Date(o.completedAt).toLocaleString(),
                    o.waitTime || 0
                ]);
                
                const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `${filename}_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const finalizeOrder = (milkName) => {
                const newOrder = {
                    id: Date.now(),
                    customer: customerName,
                    flavor: pendingOrder.flavor,
                    price: pendingOrder.price || 0,
                    temp: pendingOrder.temp,
                    milk: milkName,
                    note: note,
                    startTime: Date.now(),
                    status: 'Active'
                };
                db.ref('orders/' + newOrder.id).set(newOrder);
                setPendingOrder(null);
                setCustomerName('');
                setNote('');
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 3000);
            };

            const markDone = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.floor((completedAt - order.startTime) / 1000);
                const completedOrder = { ...order, status: 'Completed', completedAt, waitTime };
                db.ref('history/' + order.id).set(completedOrder);
                db.ref('orders/' + order.id).remove();
            };

            const handleSecretTap = () => {
                setSecretTaps(prev => {
                    if (prev + 1 >= 3) {
                        setAppMode('barista');
                        localStorage.setItem('app-mode', 'barista');
                        setView('settings');
                        return 0;
                    }
                    return prev + 1;
                });
                setTimeout(() => setSecretTaps(0), 2000);
            };

            if (showSuccess) return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-900 text-white animate-in text-center p-6">
                    <h1 className="text-6xl font-black mb-4 uppercase italic tracking-tighter">Nebulous Coffee</h1>
                    <div className="h-1 w-32 bg-orange-500 mb-6"></div>
                    <p className="text-2xl font-bold opacity-90 uppercase tracking-widest">Order Sent!</p>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 pb-24">
                    {appMode === 'kiosk' && <div className="hidden-trigger" onClick={handleSecretTap}></div>}

                    {appMode === 'barista' && (
                        <div className="flex flex-col gap-4 mb-8">
                            <nav className="grid grid-cols-4 gap-2 bg-white p-2 rounded-[2rem] shadow-sm border border-slate-200">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>
                            <button onClick={toggleShift} className={`w-full p-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-sm transition ${shiftStatus.active ? 'bg-red-100 text-red-600' : 'bg-emerald-500 text-white'}`}>
                                {shiftStatus.active ? '● End Current Shift' : '▶ Start New Shift'}
                            </button>
                        </div>
                    )}

                    {appMode === 'kiosk' && (
                        <div className="animate-in pt-10">
                            <h1 className="text-5xl text-center mb-10 font-black text-slate-900 uppercase italic tracking-tighter">Nebulous Coffee</h1>
                            {!shiftStatus.active ? (
                                <div className="text-center p-20 bg-white rounded-[4rem] shadow-xl">
                                    <p className="text-2xl font-black text-slate-300 uppercase tracking-widest italic">Currently Closed</p>
                                </div>
                            ) : (
                                <>
                                    <input type="text" placeholder="ENTER YOUR NAME..." className="w-full p-8 text-4xl rounded-[3rem] shadow-xl mb-10 border-none bg-white outline-none text-center font-black uppercase" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        {(menuDrinks || []).filter(d => !d.soldOut).map((drink) => (
                                            <div key={drink.name} className="bg-white p-8 rounded-[4rem] shadow-md border border-slate-100 flex flex-col items-center">
                                                <div className="flex justify-between w-full mb-4 px-4">
                                                    <h3 className="text-2xl font-black text-slate-700 uppercase tracking-tight">{drink.name}</h3>
                                                    <span className="text-xl font-black text-orange-500">${Number(drink.price || 0).toFixed(2)}</span>
                                                </div>
                                                <div className="flex gap-4 w-full">
                                                    <button onClick={() => setPendingOrder({ flavor: drink.name, price: drink.price, temp: 'Hot', customer: customerName })} className="flex-1 bg-red-100 text-red-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">HOT</button>
                                                    <button onClick={() => setPendingOrder({ flavor: drink.name, price: drink.price, temp: 'Iced', customer: customerName })} className="flex-1 bg-blue-100 text-blue-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">ICED</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {view === 'queue' && appMode === 'barista' && (
                        <div className="animate-in space-y-6">
                            <h2 className="text-2xl font-black text-slate-300 uppercase italic px-4">Active Queue</h2>
                            {orders.map(order => (
                                <div key={order.id} className={`flex justify-between items-center p-8 rounded-[3.5rem] bg-white shadow-xl border-l-[20px] ${getOrderColor(order.temp)}`}>
                                    <div className="flex-1">
                                        <h2 className="text-4xl font-black text-slate-800">{order.customer}</h2>
                                        <p className="text-slate-500 font-extrabold text-lg uppercase">{order.temp} {order.flavor} • {order.milk}</p>
                                        {order.note && <p className="mt-2 text-orange-600 font-black uppercase italic text-sm">Note: {order.note}</p>}
                                    </div>
                                    <button onClick={() => markDone(order)} className="bg-emerald-500 text-white w-24 h-24 rounded-[2.5rem] font-black text-5xl flex items-center justify-center shadow-lg active:scale-90 transition">✓</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'history' && appMode === 'barista' && (
                        <div className="animate-in space-y-4">
                            <h2 className="text-2xl font-black text-slate-300 uppercase italic px-4">Shift History</h2>
                            {stats.activeShiftOrders.map(order => (
                                <div key={order.id} className="flex justify-between items-center p-6 rounded-[2.5rem] bg-white shadow-sm opacity-60">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800">{order.customer}</h3>
                                        <p className="text-slate-400 font-bold text-xs uppercase">{order.flavor} • {order.waitTime || 0}s wait</p>
                                    </div>
                                    <span className="font-black text-slate-300">${Number(order.price || 0).toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'stats' && appMode === 'barista' && (
                        <div className="animate-in space-y-6">
                            <h2 className="text-2xl font-black text-slate-300 uppercase italic px-4">Shift Stats</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm text-center">
                                    <p className="text-slate-400 font-black uppercase text-xs mb-2">Shift Drinks</p>
                                    <p className="text-5xl font-black text-slate-800">{stats.count}</p>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-[3rem] shadow-lg text-center text-white">
                                    <p className="opacity-70 font-black uppercase text-xs mb-2">Shift Revenue</p>
                                    <p className="text-5xl font-black">${stats.revenue.toFixed(2)}</p>
                                </div>
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm text-center">
                                    <p className="text-slate-400 font-black uppercase text-xs mb-2">Shift Best Seller</p>
                                    <p className="text-2xl font-black text-slate-800 uppercase">{stats.popular}</p>
                                </div>
                            </div>

                            <div className="bg-white p-10 rounded-[3.5rem] shadow-md mt-8">
                                <h2 className="text-xl font-black mb-6 uppercase text-slate-800 text-center">Data Exports</h2>
                                <div className="grid grid-cols-1 gap-4">
                                    <button onClick={() => exportToCSV(stats.activeShiftOrders, "Current_Shift")} className="bg-orange-500 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest shadow-lg">
                                        Export Active Shift
                                    </button>
                                    <button onClick={() => exportToCSV(stats.weeklyOrders, "Weekly_Sales")} className="bg-blue-500 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest shadow-lg">
                                        Export Last 7 Days
                                    </button>
                                    <button onClick={() => exportToCSV(history, "Master_History")} className="bg-slate-800 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest shadow-md">
                                        Export Master History
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'settings' && appMode === 'barista' && (
                        <div className="animate-in space-y-8">
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-md">
                                <h2 className="text-2xl font-black mb-8 uppercase text-slate-800">Menu</h2>
                                <div className="space-y-4">
                                    {(menuDrinks || []).map((d, i) => (
                                        <div key={i} className="flex items-center gap-3 p-2 bg-slate-50 rounded-3xl">
                                            <input className="flex-1 bg-transparent p-4 font-black text-slate-700 uppercase outline-none" value={d.name} onChange={(e) => {
                                                const n = [...menuDrinks]; n[i].name = e.target.value; db.ref('menu').set(n);
                                            }} />
                                            <input type="number" className="w-16 p-3 font-bold bg-white rounded-xl border" value={d.price} onChange={(e) => {
                                                const n = [...menuDrinks]; n[i].price = e.target.value; db.ref('menu').set(n);
                                            }} />
                                            <button onClick={() => {
                                                const n = [...menuDrinks]; n[i].soldOut = !n[i].soldOut; db.ref('menu').set(n);
                                            }} className={`px-4 py-4 rounded-2xl font-black text-[10px] uppercase ${d.soldOut ? 'bg-red-500 text-white' : 'bg-emerald-100 text-emerald-700'}`}>
                                                {d.soldOut ? 'OUT' : 'IN'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-6 z-[100]">
                            <div className={`bg-white w-full max-w-lg rounded-[4rem] p-10 text-center animate-in shadow-2xl border-l-[30px] ${getOrderColor(pendingOrder.temp)} overflow-y-auto max-h-[90vh]`}>
                                <div className="mb-4 text-center">
                                    <p className="text-slate-400 font-black uppercase text-xs tracking-widest">Nebulous Coffee</p>
                                    <h2 className="text-3xl font-black text-slate-800 uppercase italic">{pendingOrder.customer}</h2>
                                </div>
                                <input type="text" placeholder="NOTES..." className="w-full p-4 bg-slate-100 rounded-2xl mb-6 font-bold uppercase text-center outline-none" value={note} onChange={(e) => setNote(e.target.value)} />
                                <div className="grid grid-cols-1 gap-3">
                                    {(milks || []).filter(m => !m.soldOut).map(m => (
                                        <button key={m.name} onClick={() => finalizeOrder(m.name)} className="bg-white p-6 rounded-[2rem] text-2xl font-black border-2 border-slate-100 text-slate-800 active:scale-95 transition uppercase italic">
                                            {m.name}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => {setPendingOrder(null); setNote('');}} className="mt-6 font-black text-slate-300 uppercase text-xs tracking-widest">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
