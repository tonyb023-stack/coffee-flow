<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const THEME = {
            card: "bg-white border border-slate-50 shadow-2xl shadow-slate-200/50",
            radius: "rounded-[2.5rem]",
            innerRadius: "rounded-2xl",
            stepBadge: "bg-slate-900 text-white text-xs font-black uppercase px-5 py-2 rounded-full tracking-widest",
            kioskInputContainer: "bg-white border-4 border-slate-900 shadow-2xl transition-all duration-500",
            inputPulse: "ring-8 ring-slate-200 animate-pulse" 
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });
            const lastMenuRef = useRef(null);
            const lastMilkRef = useRef(null);

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime: Math.round((completedAt - order.startTime) / 60000), status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active && confirm("End your shift?")) db.ref('shift').set({ active: false, startTime: 0 });
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            // RESTORED: Menu & Milk Management Logic [cite: 31, 32, 34, 35]
            const addMenuItem = () => {
                const newMenu = [...menuDrinks, { name: "", price: 5, soldOut: false }];
                db.ref('menu').set(newMenu);
                setTimeout(() => lastMenuRef.current?.focus(), 100);
            };

            const addMilkItem = () => {
                const newMilks = [...milks, { name: "", soldOut: false }];
                db.ref('milks').set(newMilks);
                setTimeout(() => lastMilkRef.current?.focus(), 100);
            };

            const updateItem = (path, index, field, value) => {
                const data = path === 'menu' ? [...menuDrinks] : [...milks];
                data[index][field] = value;
                db.ref(path).set(data);
            };

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = history.filter(o => {
                    if (timeFrame === 'shift') return o.completedAt > shiftStatus.startTime;
                    if (timeFrame === '24h') return o.completedAt > (now - 86400000);
                    if (timeFrame === 'week') return o.completedAt > (now - 604800000);
                    return true;
                });
                let csv = "Customer,Flavor,Temp,Milk,Price,Wait Time\n";
                filtered.forEach(o => { csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m\n`; });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url); a.setAttribute('download', `neb_export_${timeFrame}.csv`); a.click();
            };

            // RESTORED: Full Shift Statistics [cite: 51, 52, 53, 54, 55, 56]
            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price || 0), 0);
                const drinkCounts = {};
                const hourCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                    const hour = new Date(o.completedAt).getHours();
                    hourCounts[hour] = (hourCounts[hour] || 0) + 1;
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                const peakRaw = Object.keys(hourCounts).reduce((a, b) => hourCounts[a] > hourCounts[b] ? a : b, null);
                const peak = peakRaw !== null ? `${peakRaw % 12 || 12}${peakRaw >= 12 ? 'PM' : 'AM'}` : "N/A";
                return { revenue, topDrink, count: activeOrders.length, avgWait, peak };
            }, [history, shiftStatus]);

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista'); setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className={`grid grid-cols-4 gap-2 mb-8 bg-white p-2 ${THEME.innerRadius} shadow-sm border border-slate-100`}>
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 ${THEME.innerRadius} font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 ${THEME.radius} border-l-[12px] flex justify-between items-center shadow-sm ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-black uppercase italic text-slate-900 leading-none mb-1">{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-400 font-bold uppercase text-lg tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-20 h-20 bg-slate-900 text-white rounded-3xl font-black text-3xl shadow-xl">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className={`bg-white ${THEME.radius} p-10 shadow-sm border border-slate-50 space-y-6`}>
                                    <h2 className="font-black uppercase italic text-2xl">Order History</h2>
                                    {history.slice(0, 20).map(o => (
                                        <div key={o.id} className="flex justify-between items-center bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                            <div className="flex-1">
                                                <span className="font-black uppercase italic text-lg text-slate-900">{o.customer}</span>
                                                <div className="flex gap-2 mt-1">
                                                    {/* RESTORED: Hot/Iced Labels in History [cite: 77, 78] */}
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-xs font-black italic">{o.waitTime}m</span>
                                                <p className="text-[8px] text-slate-300 font-bold uppercase">WAIT</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className={`bg-white p-10 ${THEME.radius} shadow-sm text-center border border-slate-50`}>
                                    <button onClick={toggleShift} className={`mb-10 px-12 py-5 rounded-full font-black uppercase text-sm ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                        {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                    </button>
                                    {/* RESTORED: Extended Stats [cite: 88, 90, 91] */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8 py-8 border-y border-slate-50">
                                        <div><p className="text-[10px] text-slate-300 font-black uppercase">Served</p><p className="text-4xl font-black italic">{shiftStats.count}</p></div>
                                        <div><p className="text-[10px] text-slate-300 font-black uppercase">Revenue</p><p className="text-4xl font-black italic">${shiftStats.revenue.toFixed(2)}</p></div>
                                        <div><p className="text-[10px] text-slate-300 font-black uppercase">Avg Wait</p><p className="text-4xl font-black italic">{shiftStats.avgWait}m</p></div>
                                        <div><p className="text-[10px] text-slate-300 font-black uppercase">Peak</p><p className="text-4xl font-black italic">{shiftStats.peak}</p></div>
                                    </div>
                                    <div className="mt-8 pt-8 flex justify-center gap-4">
                                        {['shift', '24h', 'week'].map(t => (
                                            <button key={t} onClick={() => exportCSV(t)} className="text-[9px] font-black uppercase bg-slate-100 px-6 py-4 rounded-xl hover:bg-slate-900 hover:text-white transition-all">Export {t}</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8 pb-20">
                                    {/* RESTORED: Full Menu Management with Dollar Signs [cite: 104, 105, 107, 108, 109] */}
                                    <div className={`bg-white p-8 ${THEME.radius} shadow-sm border border-slate-50`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic">Menu Management</h3>
                                            <button onClick={addMenuItem} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">+ Add Drink</button>
                                        </div>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                    <input ref={i === menuDrinks.length - 1 ? lastMenuRef : null} className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs border border-slate-100" value={d.name} onChange={e => updateItem('menu', i, 'name', e.target.value)} placeholder="Drink Name" />
                                                    <div className="flex items-center bg-white px-3 rounded-xl border border-slate-100">
                                                        <span className="text-slate-300 font-bold text-xs">$</span>
                                                        <input className="w-16 p-3 bg-transparent font-bold text-xs outline-none" type="number" value={d.price} onChange={e => updateItem('menu', i, 'price', e.target.value)} />
                                                    </div>
                                                    <button onClick={() => updateItem('menu', i, 'soldOut', !d.soldOut)} className={`px-4 rounded-xl text-[10px] font-black uppercase ${d.soldOut ? 'bg-red-500 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => { if(confirm("Delete?")) db.ref('menu').set(menuDrinks.filter((_, idx) => idx !== i)) }} className="p-3 text-red-400 hover:bg-red-50 rounded-xl transition-all">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* RESTORED: Milk Options Section [cite: 114, 115, 116, 118] */}
                                    <div className={`bg-white p-8 ${THEME.radius} shadow-sm border border-slate-50`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic">Milk Options</h3>
                                            <button onClick={addMilkItem} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">+ Add Milk</button>
                                        </div>
                                        <div className="space-y-3">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                    <input ref={i === milks.length - 1 ? lastMilkRef : null} className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs border border-slate-100" value={m.name} onChange={e => updateItem('milks', i, 'name', e.target.value)} placeholder="Milk Name" />
                                                    <button onClick={() => updateItem('milks', i, 'soldOut', !m.soldOut)} className={`px-4 rounded-xl text-[10px] font-black uppercase ${m.soldOut ? 'bg-red-500 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => { if(confirm("Delete?")) db.ref('milks').set(milks.filter((_, idx) => idx !== i)) }} className="p-3 text-red-400 hover:bg-red-50 rounded-xl transition-all">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full bg-slate-900 text-white p-10 rounded-[3rem] font-black uppercase text-2xl italic shadow-2xl tracking-tighter transition-transform active:scale-95">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-12 text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className="text-7xl font-black text-slate-900 uppercase italic mb-12 tracking-tighter leading-none">NEBULOUS</h1>
                            <div className="max-w-2xl mx-auto mb-16 px-4">
                                <div className="flex flex-col items-center gap-4">
                                    <span className={THEME.stepBadge}>Step 1: Start Here</span>
                                    <div className={`w-full p-2 rounded-[2.5rem] ${THEME.kioskInputContainer} ${!customerName ? THEME.inputPulse : 'ring-0'}`}>
                                        <input type="text" placeholder="ENTER YOUR NAME" className="w-full bg-slate-50 p-6 rounded-[2rem] text-3xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                                    </div>
                                </div>
                            </div>
                            <div className={`transition-all duration-700 ${customerName ? 'opacity-100' : 'opacity-40 grayscale pointer-events-none'}`}>
                                <div className="flex flex-col items-center gap-4 mb-8">
                                    <span className={THEME.stepBadge}>Step 2: Choose Your Drink</span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto px-2 pb-24">
                                    {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                        <div key={drink.name} className="bg-white rounded-[2.5rem] p-6 flex flex-col justify-between shadow-sm border border-slate-50">
                                            <div className="flex justify-between items-start mb-6">
                                                <h3 className="text-2xl font-black text-slate-900 uppercase italic leading-tight text-left">{drink.name}</h3>
                                                <span className="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full shrink-0">${Number(drink.price).toFixed(2)}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-md">HOT</button>
                                                <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-md">ICED</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                            <div className="max-w-xl w-full text-center py-8">
                                <h2 className="text-7xl font-black uppercase italic mb-12 tracking-tighter leading-none">{pendingOrder.name}</h2>
                                <div className="space-y-12">
                                    <div className="grid grid-cols-1 gap-3">
                                        <p className="text-slate-900 font-black uppercase text-xl underline decoration-2 underline-offset-8">SELECT YOUR MILK</p>
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-8 rounded-[2.8rem] text-3xl font-black uppercase italic border-4 ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                    {selectedMilk && (
                                        <div className="space-y-8 animate-in">
                                            <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-8 rounded-[2.8rem] text-xl font-bold uppercase text-center outline-none" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <button onClick={finalizeOrder} className="w-full confirm-btn text-white py-11 rounded-[3rem] font-black uppercase text-4xl shadow-xl">Confirm Order</button>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-black uppercase text-lg mt-8">Cancel & Start Over</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center text-center animate-in">
                            <div className="w-32 h-32 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-xl">
                                <span className="text-white text-6xl font-black">✓</span>
                            </div>
                            <h1 className="text-6xl font-black uppercase italic text-slate-900 tracking-tighter leading-none">ORDER PLACED</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
