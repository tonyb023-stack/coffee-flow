<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /**
         * 🎨 THE SKIN ENGINE
         * Change these values to update the look without touching the logic below.
         */
        const THEME = {
            pageBg: "#fcfdfe",
            card: "bg-white border border-slate-50 shadow-xl shadow-slate-200/50",
            radius: "rounded-[2.5rem]",
            innerRadius: "rounded-2xl",
            accentBg: "bg-slate-900",
            accentText: "text-white",
            textMain: "text-slate-900",
            textMuted: "text-slate-400",
            hotBtn: "bg-red-500 text-white",
            coldBtn: "bg-blue-500 text-white",
            confirmBtn: "bg-emerald-500 text-white shadow-emerald-200 shadow-lg",
            instructionUnderline: "underline decoration-2 underline-offset-8"
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Logic Components (The "Engine") ---

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className={`text-xl font-black ${THEME.textMain} uppercase italic leading-none`}>{elapsed}m</span>
                    <p className={`text-[9px] ${THEME.textMuted} font-bold uppercase tracking-widest`}>WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                document.body.style.backgroundColor = THEME.pageBg;
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime: Math.round((completedAt - order.startTime) / 60000), status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista'); setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className={`grid grid-cols-4 gap-2 mb-8 ${THEME.card} p-2 ${THEME.innerRadius}`}>
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 ${THEME.innerRadius} font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? `${THEME.accentBg} ${THEME.accentText}` : THEME.textMuted}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`${THEME.card} p-8 ${THEME.radius} border-l-[12px] flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div>
                                                <h3 className={`text-3xl font-black uppercase italic tracking-tighter ${THEME.textMain}`}>{o.customer}</h3>
                                                <p className={`${THEME.textMuted} font-bold uppercase text-lg`}>{o.flavor} • {o.milk}</p>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className={`w-16 h-16 ${THEME.accentBg} ${THEME.accentText} rounded-2xl font-black text-2xl`}>✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-6">
                                    <div className={`${THEME.card} p-8 ${THEME.radius}`}>
                                        <h3 className={`font-black uppercase mb-4 ${THEME.textMain}`}>Barista Tools</h3>
                                        <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className={`w-full ${THEME.accentBg} ${THEME.accentText} p-6 ${THEME.innerRadius} font-black uppercase`}>Launch Kiosk Mode</button>
                                    </div>
                                    {/* Additional menu management would go here */}
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in text-center pt-12">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className={`text-7xl font-black ${THEME.textMain} uppercase italic mb-12 tracking-tighter`}>NEBULOUS</h1>
                            <div className={`${THEME.card} p-6 ${THEME.radius} max-w-2xl mx-auto mb-12`}>
                                <input type="text" placeholder="YOUR NAME?" className="w-full bg-slate-50 p-6 rounded-3xl text-3xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className={`${THEME.card} p-8 ${THEME.radius} text-left`}>
                                        <h3 className="text-2xl font-black mb-6 uppercase italic">{drink.name}</h3>
                                        <div className="flex gap-4">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className={`flex-1 py-6 ${THEME.innerRadius} font-black text-xl ${THEME.hotBtn}`}>HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className={`flex-1 py-6 ${THEME.innerRadius} font-black text-xl ${THEME.coldBtn}`}>ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8">
                            <div className="max-w-xl w-full text-center">
                                <h2 className="text-6xl font-black uppercase italic mb-12">{pendingOrder.name}</h2>
                                <p className={`font-black uppercase text-xl mb-8 ${THEME.textMain} ${THEME.instructionUnderline}`}>SELECT YOUR MILK</p>
                                <div className="grid grid-cols-1 gap-4 mb-12">
                                    {milks.filter(m => !m.soldOut).map(m => (
                                        <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 ${THEME.radius} text-2xl font-black uppercase italic border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-50'}`}>{m.name}</button>
                                    ))}
                                </div>
                                {selectedMilk && <button onClick={finalizeOrder} className={`w-full py-10 ${THEME.radius} font-black uppercase text-4xl ${THEME.confirmBtn}`}>Confirm</button>}
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex items-center justify-center">
                            <h1 className="text-6xl font-black uppercase italic">ORDERED!</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
