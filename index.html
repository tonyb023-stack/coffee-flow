                                </div>
                            </div>
                            <div className={`grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto px-4 transition-all duration-700 ${customerName ? [cite_start]'opacity-100' : 'opacity-40 grayscale pointer-events-none'}`}> [cite: 127]
                                {menuDrinks.filter(d => !d.soldOut).map(drink => ( [cite: 128]
                                    <div key={drink.name} className="bg-white rounded-[2rem] md:rounded-[2.5rem] shadow-xl border border-slate-50 p-4 md:p-6 flex flex-col justify-between transition-all"> [cite: 128]

                                        </div> [cite: 130]
                                        <div className="flex gap-2 md:gap-3"> [cite: 130]
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-4 md:py-6 rounded-[1.2rem] md:rounded-[1.5rem] text-white font-black text-lg md:text-xl shadow-md">HOT</button> [cite: 131]

                                        </div> [cite: 132]
                                    </div> [cite: 133]
                                ))} [cite: 133]
                            </div>
                        </div>
                    )}

                    {pendingOrder && ( [cite: 134]
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4 md:p-8 overflow-y-auto"> [cite: 134]

                                <div className="space-y-8"> [cite: 136]
                                    <div className="grid grid-cols-1 gap-3"> [cite: 137]
                                        <p className="text-slate-900 font-black uppercase text-xl underline decoration-2 underline-offset-8">SELECT YOUR MILK</p> [cite: 137]

                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-4 md:py-8 rounded-[1.5rem] md:rounded-[2.8rem] text-xl md:text-3xl font-black uppercase italic duration-300 border-2 md:border-4 ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900 scale-[1.03]' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button> [cite: 138, 139]
                                        ))} [cite: 139]
                                    </div> [cite: 139]
                                    {selectedMilk && ( [cite: 139]
                                        <div className="space-y-8 animate-in"> [cite: 140]
                                            <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.8rem] text-lg md:text-xl font-bold uppercase border border-slate-100 outline-none text-center" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} /> [cite: 140]

                                            </div> [cite: 143]
                                        </div> [cite: 143]

                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-black uppercase text-lg mt-8">Cancel & Start Over</button> [cite: 144, 145]
