          {menu.length===0&&<p className="text-center py-4 text-[10px] font-bold uppercase tracking-widest" style={S.faint}>No drinks — add one above</p>}
        </div>
      </div>

      {/* Milks */}
      <div className={card} style={S.surf}>
        <div className="flex justify-between items-center mb-5">
          <div>
            <h3 className="display text-2xl" style={S.ink}>MILK OPTIONS</h3>
            <p className="text-[9px] font-bold uppercase tracking-widest mt-0.5" style={S.faint}>{milks.length} option{milks.length!==1?'s':''}</p>
          </div>
          <button onClick={onAddMilk} className="text-[10px] font-bold uppercase tracking-widest px-4 py-2 rounded-full" style={{background:'var(--ink)',color:'var(--bg)'}}>+ Milk</button>
        </div>
        <div className="space-y-2">
          {milks.map((m,i)=>(
            <div key={m._key} className="flex gap-2 items-center p-3 rounded-2xl" style={S.surf2}>
              <div className="flex flex-col gap-0.5">
                <button onClick={()=>onMoveMilkUp(m,i)} disabled={i===0} className="text-[10px] leading-none disabled:opacity-20 hover:opacity-60" style={S.faint}>▲</button>
                <button onClick={()=>onMoveMilkDown(m,i)} disabled={i===milks.length-1} className="text-[10px] leading-none disabled:opacity-20 hover:opacity-60" style={S.faint}>▼</button>
              </div>
              <input placeholder="Milk name" value={m.name} onChange={e=>onUpdateMilk(m._key,{name:e.target.value})}
                className="flex-1 px-3 py-2.5 rounded-xl text-xs font-bold uppercase outline-none border" style={{background:'var(--surface)',borderColor:'var(--border)',color:'var(--ink)'}}/>
              <button onClick={()=>onToggleMilkSoldOut(m)}
                className={`px-3 py-2.5 rounded-xl text-[9px] font-black uppercase transition-all ${m.soldOut?'bg-red-500 text-white':''}`}
                style={m.soldOut?{}:{background:'var(--surface-2)',color:'var(--ink-mid)'}}>
                {m.soldOut?'OUT':'IN'}</button>
              <button onClick={()=>setDelMilk(m)} className="p-2.5 rounded-xl bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition-all text-sm">✕</button>
            </div>
          ))}
          {milks.length===0&&<p className="text-center py-4 text-[10px] font-bold uppercase tracking-widest" style={S.faint}>No milks — add one above</p>}
        </div>
      </div>

      <div className="rounded-2xl px-5 py-3 text-center" style={S.surf2}>
        <p className="text-[9px] font-bold uppercase tracking-widest" style={S.faint}>💡 Triple-tap top-right corner on kiosk screen then enter PIN to exit</p>
      </div>

      {/* Danger Zone */}
      <div className={card} style={{...S.surf,border:'1px solid rgba(232,64,64,.25)'}}>
        <h3 className="display text-2xl mb-1" style={{color:'#e84040'}}>DANGER ZONE</h3>
        <p className="text-[10px] font-bold uppercase tracking-widest mb-4" style={S.faint}>Irreversible actions</p>
        <button className="w-full py-3.5 rounded-2xl font-bold text-sm border border-red-200 text-red-400 hover:bg-red-500 hover:text-white hover:border-red-500 transition-all" onClick={()=>setShowClearConfirm(true)}>
          🗑 Clear All Order History
        </button>
      </div>

      <button onClick={onLaunchKiosk} className="w-full py-8 rounded-[2.5rem] display text-3xl shadow-lift transition-all active:scale-[.98] hover:opacity-90"
        style={{background:'var(--ink)',color:'var(--bg)',letterSpacing:'.08em'}}>
        LAUNCH KIOSK →
      </button>

      {delDrink&&<ConfirmDeleteModal name={delDrink.name} type="DRINK" onConfirm={()=>{onDeleteDrink(delDrink._key);setDelDrink(null);}} onCancel={()=>setDelDrink(null)}/>}
      {delMilk &&<ConfirmDeleteModal name={delMilk.name}  type="MILK"  onConfirm={()=>{onDeleteMilk(delMilk._key); setDelMilk(null);}}  onCancel={()=>setDelMilk(null)}/>}
      {showClearConfirm&&<ClearHistoryModal onConfirm={()=>{onClearHistory();setShowClearConfirm(false);}} onCancel={()=>setShowClearConfirm(false)}/>}
    </div>
  );
};

const ShiftEndModal=({stats,onConfirm,onCancel,activeOrders=0,shiftStats})=>(
  <Modal onClose={onCancel}>
    <h2 className="display text-4xl mb-2" style={S.ink}>END SHIFT?</h2>
    {activeOrders>0&&<div className="mb-4 px-4 py-3 rounded-2xl text-sm font-bold text-center" style={{background:'rgba(245,158,11,.12)',color:'#d97706'}}>⚠️ {activeOrders} order{activeOrders!==1?'s':''} still in queue</div>}

      <p className="text-sm font-bold" style={S.mid}>🍵 {stats.count} drinks{(stats.hotCount||0)>0?` · 🔥${stats.hotCount||0} hot / 🧊${stats.icedCount||0} iced`:''}</p>

      <p className="text-sm font-bold" style={S.mid}>⏱ {fmtMins(stats.avgWait)}{stats.minWait!==null&&stats.maxWait!==null&&stats.count>1?` (${fmtMins(stats.minWait)}–${fmtMins(stats.maxWait)})`:''} avg wait</p>
      {stats.perHour&&stats.perHour!=='—'&&<p className="text-sm font-bold" style={S.mid}>⚡ {stats.perHour} drinks/hr</p>}
      {stats.avgRevenue&&stats.avgRevenue!=='—'&&stats.count>0&&<p className="text-sm font-bold" style={S.mid}>💰 ${stats.avgRevenue} avg per drink</p>}
      {stats.durationStr&&stats.durationStr!=='—'&&<p className="text-sm font-bold" style={S.mid}>🕐 {stats.durationStr} shift duration</p>}
      {stats.topDrink&&stats.topDrink!=='—'&&<p className="text-sm font-bold" style={S.mid}>⭐ {stats.topDrink} was most popular</p>}

const MilkSelectView = ({pendingOrder,milks,selectedMilk,specialRequest,onSelectMilk,onSpecialRequest,onConfirm,onCancel,settings,estWait}) => {
  const [submitting,setSubmitting] = useState(false);
  const handleConfirm = ()=>{ if(submitting) return; setSubmitting(true); try{navigator.vibrate&&navigator.vibrate(50);}catch(_){} onConfirm(); };
  const c       = kc(settings.kioskDark);
  const dark    = settings.kioskDark;
  const available = milks.filter(m=>!m.soldOut);
  /* Auto-select when exactly one milk is available (single-milk events skip the milk screen) */
  useEffect(()=>{ if(available.length===1&&!selectedMilk) onSelectMilk(available[0].name); },[available.length]);
  const chips     = (settings.customChips||'').trim() ? settings.customChips.split(',').map(s=>s.trim()).filter(Boolean) : DEFAULTS.QUICK_REQUESTS;
  const active    = specialRequest?specialRequest.split(', ').filter(Boolean):[];
  const toggle    = chip=>{ const n=active.includes(chip)?active.filter(x=>x!==chip):[...active,chip]; onSpecialRequest(n.join(', ')); };
  const customiseRef = useRef(null);
  useEffect(()=>{ if(selectedMilk&&customiseRef.current) setTimeout(()=>customiseRef.current.scrollIntoView({behavior:'smooth',block:'nearest'}),120); },[selectedMilk]);
  const isHot     = pendingOrder.temp==='HOT';

  /* very subtle tint behind drink title — low opacity so it doesn't bleed */
  const tintBg = isHot
    ? (dark?'rgba(232,64,64,.07)':'rgba(232,64,64,.05)')
    : (dark?'rgba(59,130,246,.07)':'rgba(59,130,246,.05)');

  return (

      <div className="rounded-[2rem] px-7 py-4 mt-5 max-w-xs w-full"
           style={{background:temp==='HOT'

             :(settings.kioskDark?'rgba(59,130,246,.1)':'rgba(59,130,246,.05)'),

/* PIN pad — uses CSS vars, dark mode safe */
const PinPad = ({correctPin,onSuccess,onCancel}) => {
  const [entry,setEntry]=useState(''); const [shake,setShake]=useState(false);
  const [attempts,setAttempts]=useState(0); const [locked,setLocked]=useState(false);
  useEffect(()=>{ const fn=e=>{if(e.key==='Escape')onCancel();}; window.addEventListener('keydown',fn); return()=>window.removeEventListener('keydown',fn); },[onCancel]);
  const press=d=>{
    if(locked) return;
    const n=(entry+d).slice(0,4); setEntry(n);
    if(n.length===4){
      if(n===String(correctPin||DEFAULTS.DEFAULT_PIN)){onSuccess();}
      else{
        const next=attempts+1; setAttempts(next); setShake(true);
        if(next>=5){ setLocked(true); setTimeout(()=>{setLocked(false);setAttempts(0);},15000); }
        setTimeout(()=>{setEntry('');setShake(false);},600);
      }
    }
  };
  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center" style={{background:'rgba(0,0,0,.72)',backdropFilter:'blur(14px)'}}>
      <div className={`rounded-[3rem] p-10 max-w-xs w-full text-center shadow-lift animate-pop border ${shake?'animate-shake':''}`} style={S.surf}>
        <h2 className="display text-4xl mb-6" style={S.ink}>{locked?'LOCKED':'ENTER PIN'}</h2>
        {locked&&<p className="text-sm font-bold mb-4 text-red-500">Too many attempts — wait 15 seconds</p>}
        <div className="flex justify-center gap-4 mb-8">
          {[0,1,2,3].map(i=>(
            <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${i<entry.length?'pin-filled':''}`} style={i<entry.length?{}:{borderColor:'var(--ink-faint)'}}/>
          ))}
        </div>
        <div className="grid grid-cols-3 gap-3">
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=>(
            <button key={i}
              onClick={()=>{if(d==='⌫')setEntry(e=>e.slice(0,-1));else if(d!=='')press(String(d));}}
              className={`py-5 rounded-2xl font-black text-2xl transition-all ${d===''?'pointer-events-none opacity-0':'hover:scale-105 active:scale-95'}`}
              style={{background:d===''?'transparent':'var(--surface-2)',color:d==='⌫'?'#e84040':'var(--ink)'}}>
              {d}
            </button>
          ))}
        </div>
        <button onClick={onCancel} className="mt-6 text-[10px] font-bold uppercase tracking-widest" style={S.faint}>Cancel</button>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════
   SECTION 7 — ROOT APP
   ═══════════════════════════════════════════════════════════════════ */
const App = () => {
  const data = useAppData();

  const [baristaView,    setBaristaView]    = useState('queue');
  const [showShiftModal, setShowShiftModal] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [undoOrder,      setUndoOrder]      = useState(null);
  const undoRef = useRef(null);

  const [pendingOrder,   setPendingOrder]   = useState(null);
  const [selectedMilk,   setSelectedMilk]   = useState(null);
  const [specialRequest, setSpecialRequest] = useState('');
  const [customerName,   setCustomerName]   = useState('');
  const [successData,    setSuccessData]    = useState(null);
  const [showAttract,    setShowAttract]    = useState(false);
  const [showPinPad,     setShowPinPad]     = useState(false);
  const [orderError,     setOrderError]     = useState(null);
  const idleRef = useRef(null);
  const exitRef = useRef({count:0,last:0});
  const successTimerRef = useRef(null);

  /* Keyboard shortcuts — barista mode only, ignores inputs */
  useEffect(()=>{
    if(data.appMode!=='barista') return;
    const fn=e=>{
      const tag=document.activeElement?.tagName;
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
      if(e.key==='q') setBaristaView('queue');
      if(e.key==='n') setBaristaView('add');
      if(e.key==='h') setBaristaView('history');
      if(e.key==='s'&&!e.shiftKey) setBaristaView('stats');
      if(e.key==='e') setBaristaView('settings');
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[data.appMode, data.settings.idleSecs]);

  /* New order chime + document title update */
  const prevLen = useRef(-1);
  useEffect(()=>{
    // Update browser tab title with queue count
    if (data.appMode === 'barista') {
      const evtName=data.settings.eventName||'Nebulous Coffee';
      const pendingN=data.orders.filter(o=>!o.ready).length;
      document.title = pendingN>0 ? `(${pendingN}) ${evtName}` : evtName;
    } else {
      document.title = data.settings.eventName||'Nebulous Coffee';
    }
    if(prevLen.current===-1){ prevLen.current=data.orders.length; return; }
    if(data.appMode==='barista'&&data.orders.length>prevLen.current) data.playChime();
    prevLen.current=data.orders.length;
  },[data.orders.length,data.appMode]);

  /* Idle attract screen */
  const resetIdle=useCallback(()=>{
    clearTimeout(idleRef.current); setShowAttract(false);
    if(data.appMode==='kiosk') idleRef.current=setTimeout(()=>setShowAttract(true),(data.settings.idleSecs||45)*1000);
  },[data.appMode,data.settings.idleSecs]);
  useEffect(()=>{
    if(data.appMode!=='kiosk'){clearTimeout(idleRef.current);return;}
    resetIdle();
    const evs=['touchstart','mousemove','keydown','click'];
    evs.forEach(e=>window.addEventListener(e,resetIdle,{passive:true}));
    return()=>{clearTimeout(idleRef.current);evs.forEach(e=>window.removeEventListener(e,resetIdle));};
  },[data.appMode,resetIdle]);

  /* Kiosk handlers */
  const handleSelectDrink=(drink,temp)=>{ setPendingOrder({...drink,temp}); setSelectedMilk(null); setSpecialRequest(''); };
  const handleConfirmOrder=async()=>{
    window.scrollTo({top:0,behavior:'instant'});
    try {
      const queuePos=data.orders.filter(o=>!o.ready).length+1;
      const rawN=customerName.trim(); const fmtN=rawN?rawN.replace(/\b\w/g,c=>c.toUpperCase()):'Guest';
      const to8s=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),8000));
      const num=await Promise.race([data.placeOrder({customer:fmtN,flavor:pendingOrder.name,price:pendingOrder.price||0,temp:pendingOrder.temp,milk:selectedMilk,note:specialRequest.trim()}),to8s]);
      setSuccessData({orderNumber:num,customer:fmtN,flavor:pendingOrder.name,milk:selectedMilk,temp:pendingOrder.temp,price:pendingOrder.price||0,queuePos});
      setPendingOrder(null);setSelectedMilk(null);setSpecialRequest('');setCustomerName('');
      clearTimeout(successTimerRef.current);
      successTimerRef.current=setTimeout(()=>setSuccessData(null),DEFAULTS.SUCCESS_MS);
    } catch(e) {
      console.error('Order placement failed:', e);
      setOrderError('Something went wrong — please try again.');
      setTimeout(()=>setOrderError(null), 6000);
      setPendingOrder(null);setSelectedMilk(null);setSpecialRequest('');
    }
  };
  const handleCancelOrder=()=>{ setPendingOrder(null);setSelectedMilk(null);setSpecialRequest(''); };
  const handleExitTap=()=>{
    const now=Date.now();
    if(now-exitRef.current.last>DEFAULTS.EXIT_MS) exitRef.current.count=0;
    exitRef.current.count++; exitRef.current.last=now;
    if(exitRef.current.count>=DEFAULTS.EXIT_TAPS){setShowPinPad(true);exitRef.current.count=0;}
  };
  const handlePinSuccess=()=>{ setShowPinPad(false); data.switchMode('barista'); setBaristaView('settings'); };

  /* Barista handlers */
  const handleComplete=order=>{ data.completeOrder(order); clearTimeout(undoRef.current); setUndoOrder(order); undoRef.current=setTimeout(()=>setUndoOrder(null),DEFAULTS.UNDO_MS); };
  const handleUndo=()=>{ if(undoOrder){data.undoComplete(undoOrder);setUndoOrder(null);clearTimeout(undoRef.current);} };
  const handleReady=useCallback(order=>{data.markReady(order);data.playReadyChime();},[data.markReady,data.playReadyChime]);
  const handleEndShift=()=>{ data.endShift(); setShowShiftModal(false); };
  const handleClearHistory=()=>{ data.clearHistory(); setShowClearModal(false); };

  /* PNG summary card */
  const handleSummaryCard=useCallback(()=>{
    const s=data.shiftStats,name=data.settings.eventName||DEFAULTS.APP_NAME;
    const date=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const cells=[['Drinks Served',s.count],['Revenue',s.revenue>0?`$${s.revenue.toFixed(2)}`:'—'],['Top Drink',s.topDrink],['Avg Wait',fmtMins(s.avgWait)],['Peak Hour',s.busiestHour],['Shift Time',s.durationStr||'—']];
    const card=document.getElementById('share-card');
    card.innerHTML=`<div style="background:#0c0c0c;color:#f0f0f0;padding:56px;font-family:'DM Sans',sans-serif;border-radius:24px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:68px;letter-spacing:.04em;line-height:1;margin-bottom:4px;">${name}</div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:#444;margin-bottom:44px;">${date}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:36px;">
        ${cells.map(([l,v])=>`<div style="background:#181818;border-radius:14px;padding:18px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:#444;margin-bottom:8px;">${l}</div><div style="font-size:26px;font-weight:900;font-style:italic;">${v}</div></div>`).join('')}
      </div>
      <div style="border-top:1px solid #222;padding-top:18px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#333;">Powered by Nebulous Coffee Pro</div>
    </div>`;
    if(window.html2canvas){
      window.html2canvas(card.firstElementChild,{backgroundColor:null,scale:2}).then(canvas=>{
        Object.assign(document.createElement('a'),{href:canvas.toDataURL('image/png'),download:`nebulous_${Date.now()}.png`}).click();
      });
    } else {
      const w=window.open('','_blank');
      w.document.write(`<!DOCTYPE html><html><head><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"><style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style></head><body>${card.innerHTML}<script>window.onload=()=>window.print()<\/script></body></html>`);
    }
  },[data.shiftStats,data.settings]);

  return (
    <Fragment>
      {data.dbError&&<DbErrorBanner message={data.dbError}/>}

      {/* ═══ BARISTA MODE ═══ */}
      {data.appMode==='barista'&&(
        <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen">
          <BaristaNav view={baristaView} setView={v=>{setBaristaView(v);window.scrollTo({top:0,behavior:'smooth'});}} queueCount={data.orders.filter(o=>!o.ready).length} online={data.online} paused={data.pause.active} accentColor={data.settings.accentColor} drinksServed={data.shiftStats.count}/>

          {baristaView==='queue'&&<QueueView orders={data.orders} settings={data.settings} milks={data.milks} menu={data.menu} estWait={data.estWait} shiftActive={data.shift.active} onReady={handleReady} onComplete={handleComplete} onNote={data.addNote} onEdit={(o,p)=>data.updateOrder(o,p)}/>}
          {baristaView==='add'&&<QuickAddView menu={data.menu} milks={data.milks} onPlace={data.placeOrder} accentColor={data.settings.accentColor}/>}
          {baristaView==='history'&&<HistoryView history={data.history} onClear={()=>setShowClearModal(true)} onSaveNote={data.addHistoryNote} onRequeue={o=>{ data.placeOrder({customer:o.customer,flavor:o.flavor,price:o.price||0,temp:o.temp,milk:o.milk,note:o.note||''}); setBaristaView('queue'); }}/>}
          {baristaView==='stats'&&<StatsView shift={data.shift} shiftStats={data.shiftStats} settings={data.settings} onStartShift={data.startShift} onEndShiftRequest={()=>setShowShiftModal(true)} exportCSV={data.exportCSV} onGenerateSummaryCard={handleSummaryCard} queueDepth={data.orders.filter(o=>!o.ready).length}/>}
          {baristaView==='settings'&&(
            <div className="space-y-5">
              <ChecklistView settings={data.settings} shift={data.shift} menu={data.menu} milks={data.milks}/>
              <SettingsView
                menu={data.menu} milks={data.milks} settings={data.settings} shift={data.shift} pause={data.pause}
                onAddDrink={data.addMenuItem} onUpdateDrink={data.updateMenuItem} onDeleteDrink={data.deleteMenuItem}
                onToggleDrinkSoldOut={data.toggleDrinkSoldOut} onToggleFeatured={data.toggleFeatured}
                onMoveMenuUp={data.moveMenuUp} onMoveMenuDown={data.moveMenuDown}
                onAddMilk={data.addMilkItem} onUpdateMilk={data.updateMilkItem} onDeleteMilk={data.deleteMilkItem}
                onToggleMilkSoldOut={data.toggleMilkSoldOut} onMoveMilkUp={data.moveMilkUp} onMoveMilkDown={data.moveMilkDown}
                onResetSoldOut={data.resetSoldOut} onUpdateSettings={data.updateSettings}
                onLaunchKiosk={()=>data.switchMode('kiosk')} onSetPause={data.setPause} onClearPause={data.clearPause}
                onTestSound={data.testSound} onClearHistory={()=>{ data.clearHistory(); }}/>
            </div>
          )}

          {showShiftModal&&<ShiftEndModal stats={data.shiftStats} shiftStats={data.shiftStats} activeOrders={data.orders.filter(o=>!o.ready).length} onConfirm={handleEndShift} onCancel={()=>setShowShiftModal(false)}/>}
          {showClearModal&&<ClearHistoryModal onConfirm={handleClearHistory} onCancel={()=>setShowClearModal(false)}/>}
          {undoOrder&&<UndoToast order={undoOrder} onUndo={handleUndo}/>}
        </div>
      )}

      {/* ═══ KIOSK MODE ═══ */}
      {data.appMode==='kiosk'&&(
        <Fragment>
          {data.pause.active&&<PauseScreen message={data.pause.message} onExitTap={handleExitTap}/>}
          {showAttract&&!pendingOrder&&!successData&&!data.pause.active&&(
            <AttractScreen eventName={data.settings.eventName} tagline={data.settings.tagline} accent={data.settings.accentColor} queueCount={data.orders.filter(o=>!o.ready).length} estWait={data.estWait} onTap={()=>{setShowAttract(false);resetIdle();}}/>
          )}
          {!pendingOrder&&!data.pause.active&&!successData&&(
            <KioskMenuView menu={data.menu} customerName={customerName} queueCount={data.orders.filter(o=>!o.ready).length} settings={data.settings} estWait={data.estWait} onNameChange={setCustomerName} onSelectDrink={handleSelectDrink} onExitTap={handleExitTap}/>
          )}
          {pendingOrder&&!data.pause.active&&(
            <MilkSelectView pendingOrder={pendingOrder} milks={data.milks} selectedMilk={selectedMilk} specialRequest={specialRequest} onSelectMilk={setSelectedMilk} onSpecialRequest={setSpecialRequest} onConfirm={handleConfirmOrder} onCancel={handleCancelOrder} settings={data.settings} estWait={data.estWait}/>
          )}
          {orderError&&(
            <div className="fixed bottom-8 left-1/2 z-[900] animate-in" style={{transform:'translateX(-50%)',maxWidth:'90vw'}}>
              <div className="bg-red-500 text-white px-6 py-4 rounded-2xl text-base font-bold shadow-lift text-center" style={{animation:'softPulse 1.5s ease-in-out 2'}}>⚠️ {orderError}</div>
            </div>
          )}
          {successData&&<SuccessScreen {...successData} settings={data.settings} estWait={data.estWait} onDismiss={()=>{clearTimeout(successTimerRef.current);setSuccessData(null);}}/>}
          {showPinPad&&<PinPad correctPin={data.settings.pin||DEFAULTS.DEFAULT_PIN} onSuccess={handlePinSuccess} onCancel={()=>setShowPinPad(false)}/>}
        </Fragment>
      )}
    </Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
