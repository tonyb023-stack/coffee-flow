<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const THEME = {
            pageBg: "#fcfdfe",
            card: "bg-white border border-slate-50 shadow-2xl shadow-slate-200/50",
            radius: "rounded-[2.5rem]",
            innerRadius: "rounded-2xl",
            accentBg: "bg-slate-900",
            accentText: "text-white",
            textMain: "text-slate-900",
            textMuted: "text-slate-400",
            hotBtn: "bg-red-500 text-white shadow-lg shadow-red-100",
            coldBtn: "bg-blue-500 text-white shadow-lg shadow-blue-100",
            confirmBtn: "bg-emerald-500 text-white shadow-xl shadow-emerald-100",
            instructionUnderline: "underline decoration-2 underline-offset-8"
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TempBadge = ({ temp, size = "small" }) => {
            const isHot = temp === 'HOT';
            const styles = isHot ? "bg-red-100 text-red-500" : "bg-blue-100 text-blue-500";
            const padding = size === "small" ? "px-2 py-0.5 text-[8px]" : "px-4 py-1 text-[10px]";
            return (
                <span className={`${styles} ${padding} rounded-full font-black uppercase tracking-widest leading-none`}>
                    {temp}
                </span>
            );
        };

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className={`text-xl font-black ${THEME.textMain} uppercase italic leading-none`}>{elapsed}m</span>
                    <p className={`text-[9px] ${THEME.textMuted} font-bold uppercase tracking-widest`}>WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });
            const inputRefs = useRef({});

            useEffect(() => {
                document.body.style.backgroundColor = THEME.pageBg;
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime: Math.round((completedAt - order.startTime) / 60000), status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active && confirm("End your shift?")) db.ref('shift').set({ active: false, startTime: 0 });
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const updateItem = (path, index, field, value) => {
                const data = path === 'menu' ? [...menuDrinks] : [...milks];
                data[index][field] = value;
                db.ref(path).set(data);
            };

            const addItem = (path) => {
                const data = path === 'menu' ? [...menuDrinks] : [...milks];
                const newItem = path === 'menu' ? { name: "", price: "", soldOut: false } : { name: "", soldOut: false };
                const newIndex = data.length;
                db.ref(path).set([...data, newItem]).then(() => {
                    setTimeout(() => {
                        const key = `${path}-${newIndex}`;
                        if (inputRefs.current[key]) inputRefs.current[key].focus();
                    }, 100);
                });
            };

            const deleteItem = (path, index) => {
                if (!confirm("Delete this item?")) return;
                const data = path === 'menu' ? [...menuDrinks] : [...milks];
                db.ref(path).set(data.filter((_, i) => i !== index));
            };

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = history.filter(o => {
                    if (timeFrame === 'shift') return o.completedAt > shiftStatus.startTime;
                    if (timeFrame === '24h') return o.completedAt > (now - 86400000);
                    if (timeFrame === 'week') return o.completedAt > (now - 604800000);
                    return o.completedAt > (now - 2592000000);
                });
                let csv = "Customer,Flavor,Temp,Milk,Price,Wait Time,Date\n";
                filtered.forEach(o => { csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`; });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `export_${timeFrame}.csv`);
                a.click();
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista'); setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                }
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                const hourCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                    const hour = new Date(o.completedAt).getHours();
                    hourCounts[hour] = (hourCounts[hour] || 0) + 1;
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                const busiestHourRaw = Object.keys(hourCounts).reduce((a, b) => hourCounts[a] > hourCounts[b] ? a : b, null);
                const busiestHour = busiestHourRaw !== null ? `${busiestHourRaw % 12 || 12}${busiestHourRaw >= 12 ? 'PM' : 'AM'}` : "N/A";
                return { revenue, topDrink, count: activeOrders.length, avgWait, busiestHour };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className={`grid grid-cols-4 gap-2 mb-8 ${THEME.card} p-2 ${THEME.innerRadius}`}>
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 ${THEME.innerRadius} font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? `${THEME.accentBg} ${THEME.accentText}` : THEME.textMuted}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`${THEME.card} p-8 ${THEME.radius} border-l-[12px] flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className={`text-3xl font-black uppercase italic tracking-tighter ${THEME.textMain} leading-none mb-1`}>{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <TempBadge temp={o.temp} />
                                                    <p className={`${THEME.textMuted} font-bold uppercase text-lg tracking-widest leading-none`}>{o.flavor} • {o.milk}</p>
                                                </div>
                                                {o.note && <p className="mt-3 text-emerald-500 font-black text-xs italic uppercase leading-none">"{o.note}"</p>}
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className={`w-20 h-20 ${THEME.accentBg} ${THEME.accentText} rounded-3xl font-black text-3xl shadow-xl active:scale-95 transition-transform`}>✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <p className="text-center py-20 text-slate-200 font-black italic text-4xl uppercase">No Orders</p>}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className={`${THEME.card} ${THEME.radius} p-10 animate-in`}>
                                    <div className="flex justify-between items-center mb-10">
                                        <h2 className={`font-black uppercase italic text-2xl ${THEME.textMain}`}>Order History</h2>
                                        <button onClick={() => {if(confirm("Clear history?")) db.ref('history').remove();}} className="text-[10px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-5 py-2 rounded-full">Clear History</button>
                                    </div>
                                    <div className="space-y-4">
                                        {history.slice(0, 15).map(o => (
                                            <div key={o.id} className="flex justify-between items-center bg-slate-50 p-6 rounded-3xl">
                                                <div className="flex-1">
                                                    <span className={`font-black uppercase italic text-lg ${THEME.textMain} leading-none`}>{o.customer}</span>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <TempBadge temp={o.temp} />
                                                        <p className={`text-sm font-bold ${THEME.textMuted} uppercase`}>{o.flavor} • {o.milk}</p>
                                                    </div>
                                                </div>
                                                <span className={`text-xs font-black ${THEME.textMain}`}>{o.waitTime}m</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className={`${THEME.card} p-10 ${THEME.radius} text-center animate-in`}>
                                    <button onClick={toggleShift} className={`mb-10 px-12 py-5 rounded-full font-black uppercase tracking-widest text-sm transition-all ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                        {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                    </button>
                                    <div className="grid grid-cols-1 gap-8">
                                        <div>
                                            <p className="text-[10px] text-slate-300 font-black uppercase mb-2">Total Served</p>
                                            <p className="text-8xl font-black italic tracking-tighter text-slate-900">{shiftStats.count}</p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 py-8 border-t border-slate-50">
                                            <div><p className="text-[9px] text-slate-300 font-bold uppercase">Revenue</p><p className="text-lg font-black">${shiftStats.revenue.toFixed(2)}</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-bold uppercase">Top Drink</p><p className="text-lg font-black uppercase italic">{shiftStats.topDrink}</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-bold uppercase">Avg Wait</p><p className="text-lg font-black">{shiftStats.avgWait}m</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-bold uppercase">Peak</p><p className="text-lg font-black uppercase italic">{shiftStats.busiestHour}</p></div>
                                        </div>
                                        <div className="pt-8 border-t border-slate-50 flex flex-wrap justify-center gap-2">
                                            {['shift', '24h', 'week', 'month'].map(t => (
                                                <button key={t} onClick={() => exportCSV(t)} className="bg-slate-50 text-slate-400 px-6 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all">Export {t}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8 animate-in pb-20">
                                    <div className={`${THEME.card} p-8 ${THEME.radius}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic">Menu Editor</h3>
                                            <button onClick={() => addItem('menu')} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ Add Drink</button>
                                        </div>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-2 bg-slate-50 p-2 rounded-2xl items-center">
                                                    <input ref={el => inputRefs.current[`menu-${i}`] = el} className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs outline-none" placeholder="DRINK NAME" value={d.name} onChange={e => updateItem('menu', i, 'name', e.target.value)} />
                                                    <div className="flex items-center bg-white rounded-xl px-3 h-full">
                                                        <span className="text-slate-400 font-black text-xs mr-1">$</span>
                                                        <input className="w-14 p-3 bg-transparent font-bold text-xs outline-none" type="number" placeholder="0.00" value={d.price} onChange={e => updateItem('menu', i, 'price', e.target.value)} />
                                                    </div>
                                                    <button onClick={() => updateItem('menu', i, 'soldOut', !d.soldOut)} className={`px-4 py-3 rounded-xl text-[9px] font-black uppercase ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => deleteItem('menu', i)} className="p-2 text-red-400">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className={`${THEME.card} p-8 ${THEME.radius}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic">Milk Editor</h3>
                                            <button onClick={() => addItem('milks')} className="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">+ Add Milk</button>
                                        </div>
                                        <div className="space-y-3">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-2 bg-slate-50 p-2 rounded-2xl items-center">
                                                    <input ref={el => inputRefs.current[`milks-${i}`] = el} className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs outline-none" placeholder="MILK NAME" value={m.name} onChange={e => updateItem('milks', i, 'name', e.target.value)} />
                                                    <button onClick={() => updateItem('milks', i, 'soldOut', !m.soldOut)} className={`px-4 py-3 rounded-xl text-[9px] font-black uppercase ${m.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => deleteItem('milks', i)} className="p-2 text-red-400">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full bg-slate-900 text-white p-10 rounded-[3rem] font-black uppercase text-2xl shadow-2xl italic tracking-tighter">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in text-center pt-12">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className={`text-7xl font-black ${THEME.textMain} uppercase italic mb-12 tracking-tighter leading-none`}>NEBULOUS</h1>
                            <div className={`${THEME.card} p-6 ${THEME.radius} max-w-2xl mx-auto mb-12`}>
                                <input type="text" placeholder="WHO IS THIS FOR?" className="w-full bg-slate-50 p-6 rounded-3xl text-3xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto px-4">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className={`${THEME.card} p-8 ${THEME.radius} text-left flex flex-col justify-between`}>
                                        <div className="flex justify-between items-start mb-6">
                                            <h3 className="text-2xl font-black uppercase italic leading-tight">{drink.name}</h3>
                                            <span className="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className={`flex-1 py-6 ${THEME.innerRadius} font-black text-xl ${THEME.hotBtn}`}>HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className={`flex-1 py-6 ${THEME.innerRadius} font-black text-xl ${THEME.coldBtn}`}>ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                            <div className="max-w-xl w-full text-center py-12 animate-in">
                                <div className="mb-4">
                                    <TempBadge temp={pendingOrder.temp} size="large" />
                                </div>
                                <h2 className="text-6xl font-black uppercase italic mb-12 leading-none">{pendingOrder.name}</h2>
                                <div className="space-y-12">
                                    <div className="grid grid-cols-1 gap-3">
                                        <p className={`font-black uppercase text-xl ${THEME.textMain} ${THEME.instructionUnderline}`}>SELECT YOUR MILK</p>
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 ${THEME.radius} text-3xl font-black uppercase italic border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900 scale-[1.03]' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                    {selectedMilk && (
                                        <div className="space-y-8 animate-in">
                                            <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-8 rounded-[2.5rem] text-xl font-bold uppercase text-center outline-none border border-slate-100" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <button onClick={finalizeOrder} className={`w-full py-10 ${THEME.radius} font-black uppercase text-4xl ${THEME.confirmBtn}`}>Confirm Order</button>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => {setPendingOrder(null); setSelectedMilk(null); setSpecialRequest('');}} className="mt-10 text-slate-300 font-black uppercase text-sm">Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in text-center">
                            <div className="bg-emerald-500 w-32 h-32 rounded-full flex items-center justify-center mb-8 shadow-2xl">
                                <span className="text-white text-6xl font-black">✓</span>
                            </div>
                            <h1 className="text-5xl font-black uppercase italic tracking-tighter text-slate-900 leading-none">ORDER PLACED</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
