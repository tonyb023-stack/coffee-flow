<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee | Kiosk</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        :root {
            --space-bg: #030712;
            --nebulous-blue: #1e3a8a;
            --electric-indigo: #6366f1;
            --surface: #111827;
            --text-main: #f9fafb;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--space-bg); 
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; 
        }

        /* Cosmic Cards */
        .cosmic-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .cosmic-card:active { transform: scale(0.97); }

        .btn-nebula {
            background: linear-gradient(135deg, var(--nebulous-blue) 0%, var(--electric-indigo) 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.3);
        }

        .input-nebula {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 1.5rem;
        }

        .input-nebula:focus {
            border-color: var(--electric-indigo);
            outline: none;
            background: rgba(255, 255, 255, 0.07);
        }

        .animate-nebula { animation: nebulaPulse 4s infinite alternate; }
        @keyframes nebulaPulse {
            from { text-shadow: 0 0 10px rgba(99, 102, 241, 0); }
            to { text-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        }

        #exit-zone { position: fixed; top: 0; right: 0; width: 80px; height: 80px; z-index: 10000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-white italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <div className="animate-in">
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-slate-900 p-2 rounded-3xl border border-white/5">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-4">
                                    {orders.map(o => (
                                        <div key={o.id} className="cosmic-card p-6 flex justify-between items-center">
                                            <div>
                                                <h3 className="text-2xl font-black uppercase text-white">{o.customer}</h3>
                                                <div className="flex gap-2 items-center mt-1">
                                                    <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-900 text-red-200' : 'bg-blue-900 text-blue-200'}`}>{o.temp}</span>
                                                    <p className="text-slate-400 font-bold uppercase text-sm">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-14 h-14 btn-nebula rounded-2xl font-bold text-xl active:scale-90 transition-all">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {/* Barista Sub-views (History, Stats, Settings) remain functional here... */}
                            {view === 'settings' && (
                                <div className="space-y-4">
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full btn-nebula p-8 rounded-[2rem] font-black uppercase tracking-widest shadow-xl">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="pt-10 pb-24 text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            
                            <div className="mb-12">
                                <h1 className="text-5xl md:text-7xl font-black text-white tracking-tighter uppercase italic animate-nebula">NEBULOUS</h1>
                                <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.6em]">Specialty Coffee Roasters</p>
                            </div>
                            
                            <div className="max-w-xl mx-auto mb-10 px-4">
                                <input 
                                    type="text" 
                                    placeholder="Enter Name" 
                                    className="w-full input-nebula p-6 md:p-8 text-2xl md:text-3xl font-bold text-center" 
                                    value={customerName} 
                                    onChange={(e) => setCustomerName(e.target.value)} 
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-5xl mx-auto px-4">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="cosmic-card p-6 flex flex-col justify-between border-t border-white/10">
                                        <div className="flex justify-between items-start mb-8">
                                            <h3 className="text-2xl font-bold text-white uppercase tracking-tight text-left leading-none">{drink.name}</h3>
                                            <span className="text-sm font-bold text-indigo-400 font-mono">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="flex-1 py-5 rounded-2xl border border-red-500/30 text-red-400 font-bold text-xs tracking-widest uppercase hover:bg-red-500/10 transition-all">Hot</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="flex-1 py-5 rounded-2xl btn-nebula font-bold text-xs tracking-widest uppercase active:scale-95">Iced</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl z-[100] flex items-center justify-center p-6">
                            <div className="max-w-lg w-full text-center">
                                <h2 className="text-5xl md:text-6xl font-black uppercase text-white tracking-tighter mb-4">{pendingOrder.name}</h2>
                                <p className="text-indigo-400 font-bold uppercase tracking-[0.4em] text-xs mb-12">{pendingOrder.temp} EDITION</p>

                                <div className="space-y-10">
                                    <div className="grid grid-cols-1 gap-3">
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} 
                                                className={`py-6 rounded-2xl text-lg font-bold uppercase transition-all border ${selectedMilk === m.name ? 'border-indigo-500 bg-indigo-500/20 text-white shadow-[0_0_20px_rgba(99,102,241,0.3)]' : 'border-white/5 bg-white/5 text-slate-500'}`}>
                                                {m.name}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    {selectedMilk && (
                                        <div className="space-y-8 animate-in">
                                            <input type="text" placeholder="Special Requests?" className="w-full input-nebula p-6 text-center" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <button onClick={finalizeOrder} className="w-full btn-nebula py-8 rounded-[2rem] font-black text-2xl tracking-widest shadow-2xl active:scale-95">Confirm</button>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-600 font-bold uppercase text-xs tracking-widest mt-12 hover:text-white transition-colors">Cancel Order</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-indigo-600 z-[200] flex flex-col items-center justify-center p-8 text-center animate-pulse">
                            <h1 className="text-6xl font-black text-white uppercase italic tracking-tighter mb-4">LOCKED IN</h1>
                            <p className="text-indigo-200 font-bold uppercase tracking-[0.3em] text-xs">Your order is being transmitted</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
