<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nebulous Coffee Pro</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- FIX #16 dark-mode flash prevention: applied synchronously before first paint -->
  <script>
    (function() {
      try { if (localStorage.getItem('neb-dark') === 'true') document.documentElement.classList.add('dark-pending'); } catch(e) {}
    })();
  </script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       STYLE SECTION — safe to edit. All visual rules live here.
       ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg:        #f8f7f4;
      --surface:   #ffffff;
      --surface-2: #f3f2ef;
      --border:    #ebebeb;
      --ink:       #0f0f0f;
      --ink-mid:   #6b6b6b;
      --ink-faint: #c4c4c4;
    }
    html.dark-pending body, body.dark {
      --bg:        #0c0c0c;
      --surface:   #181818;
      --surface-2: #242424;
      --border:    #2e2e2e;
      --ink:       #f0f0f0;
      --ink-mid:   #9a9a9a;
      --ink-faint: #444444;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: background .3s, color .3s;
    }
    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: .03em; }

    @keyframes slideUp    { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
    @keyframes popIn      { 0%{opacity:0;transform:scale(.88)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes pulseRing  { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.35)} 70%{box-shadow:0 0 0 14px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    @keyframes namePulse  { 0%,100%{border-color:rgba(15,15,15,.9);box-shadow:0 0 0 0 rgba(15,15,15,.08)} 50%{border-color:rgba(15,15,15,.3);box-shadow:0 0 0 10px rgba(15,15,15,.04)} }
    @keyframes undoShrink { from{width:100%} to{width:0%} }
    @keyframes shake      { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    @keyframes checkPop   { 0%{transform:scale(0) rotate(-20deg)} 60%{transform:scale(1.2) rotate(4deg)} 100%{transform:scale(1) rotate(0)} }
    /* FIX #15: staggered success animation keyframes */
    @keyframes successFade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .animate-in    { animation: slideUp  .4s cubic-bezier(.16,1,.3,1) forwards; }
    .animate-pop   { animation: popIn   .35s cubic-bezier(.16,1,.3,1) forwards; }
    .animate-fade  { animation: fadeIn  .25s ease forwards; }
    .animate-shake { animation: shake   .4s ease forwards; }

    .shadow-soft { box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04); }
    .shadow-card { box-shadow:0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04); }
    .shadow-lift { box-shadow:0 20px 60px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06); }

    .btn-confirm {
      background: linear-gradient(135deg,#22c55e,#16a34a);
      box-shadow: 0 12px 32px -4px rgba(34,197,94,.45);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-confirm:active { transform:scale(.97); box-shadow:none; }

    .name-pulse { border:2.5px solid var(--ink); animation:namePulse 3s infinite ease-in-out; }
    .conn-online  { background:#22c55e; animation:pulseRing 2s infinite; }
    .conn-offline { background:#e84040; }
    .undo-bar { animation:undoShrink 5s linear forwards; }

    .attract-bg {
      background: radial-gradient(ellipse at 50% 55%,rgba(34,197,94,.14) 0%,transparent 65%),
                  radial-gradient(ellipse at 15% 15%,rgba(59,130,246,.09) 0%,transparent 55%), #0c0c0c;
    }
    .pause-bg {
      background: radial-gradient(ellipse at 50% 50%,rgba(245,158,11,.12) 0%,transparent 70%), #0c0c0c;
    }

    /* Queue card: left tab colour ALWAYS from card-hot/card-iced.
       Priority ring comes from card-warn/card-late/card-ready box-shadow only. */
    .card-hot  { border-left-color: #e84040 !important; }
    .card-iced { border-left-color: #3b82f6 !important; }
    .card-warn  { box-shadow: 0 0 0 2px #f59e0b, 0 2px 12px rgba(0,0,0,.06); }
    .card-late  { box-shadow: 0 0 0 2px #e84040, 0 2px 12px rgba(0,0,0,.06); }
    .card-ready { box-shadow: 0 0 0 2px #22c55e, 0 2px 12px rgba(0,0,0,.06); }

    .stat-bar { transition: width .8s cubic-bezier(.16,1,.3,1); }
    .check-pop { animation: checkPop .3s cubic-bezier(.16,1,.3,1) forwards; }
    .no-scroll::-webkit-scrollbar { display:none; }
    .no-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    .pin-filled { background:var(--ink); transform:scale(1.15); transition:all .15s; }

    #share-card {
      position:fixed; left:-9999px; top:0;
      width:640px; padding:56px;
      background:#0c0c0c; color:#f0f0f0;
      font-family:'DM Sans',sans-serif;
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="share-card"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

/* ═══════════════════════════════════════════════════════════════════
   SECTION 1 — CONSTANTS
   ═══════════════════════════════════════════════════════════════════ */
const DEFAULTS = {
  APP_NAME:         'NEBULOUS',
  TAGLINE:          'Specialty Coffee',
  KIOSK_EXIT_TAPS:  3,
  KIOSK_EXIT_MS:    800,
  SUCCESS_MS:       3000,
  IDLE_TIMEOUT_MS:  45_000,
  ORDER_WARN_MINS:  8,
  ORDER_LATE_MINS:  12,
  HISTORY_PAGE:     30,
  UNDO_MS:          5_000,
  QUEUE_WARN:       6,
  DEFAULT_PIN:      '1234',
  QUICK_REQUESTS:   ['Half Sweet', 'Less Ice'],
  HISTORY_TTL_DAYS: 30,
  QUICK_ADD_SUCCESS_MS: 2500,           // FIX #7
  CHECKLIST_LS_KEY: 'neb-checklist-v1', // FIX #10
  CHECKLIST: [
    { id:'menu',    label:'Menu drinks are set & priced' },
    { id:'milks',   label:'Milk options are set' },
    { id:'soldout', label:'Sold-out items reviewed' },
    { id:'pin',     label:'Exit PIN is configured' },
    { id:'guests',  label:'Expected guest count entered' },
    { id:'shift',   label:'Shift has been started' },
  ],
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 2 — FIREBASE SERVICE LAYER
   ═══════════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA',
  authDomain:        'coffee-order-tracker.firebaseapp.com',
  databaseURL:       'https://coffee-order-tracker-default-rtdb.firebaseio.com',
  projectId:         'coffee-order-tracker',
  storageBucket:     'coffee-order-tracker.firebasestorage.app',
  messagingSenderId: '650691026035',
  appId:             '1:650691026035:web:96e8bee8d3a5bb5d205e06',
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const DB   = firebase.database();
const AUTH = firebase.auth();

const DbService = {

  signInAnonymously: () => AUTH.signInAnonymously().catch(() => {}),

  /* FIX #17: every subscription now accepts an onError handler */
  subscribeConnection(cb, onErr) {
    const ref = DB.ref('.info/connected');
    ref.on('value', s => cb(s.val() === true), onErr || console.error);
    return () => ref.off();
  },

  subscribeSettings(cb, onErr) {
    const ref = DB.ref('settings');
    ref.on('value', s => cb(s.val() || {}), onErr || console.error);
    return () => ref.off();
  },
  setSettings: patch => DB.ref('settings').update(patch),

  subscribeOrders(cb, onErr) {
    const ref = DB.ref('orders');
    ref.on('value', s => {
      const raw = s.val() || {};
      cb(Object.entries(raw).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.startTime-b.startTime));
    }, onErr || console.error);
    return () => ref.off();
  },

  async placeOrder(data) {
    const res = await DB.ref('orderCounter').transaction(n => (n||0)+1);
    const num = res.snapshot.val();
    const ref = DB.ref('orders').push();
    await ref.set({ ...data, _key:ref.key, orderNumber:num, startTime:Date.now(), status:'Active', ready:false });
    return num;
  },

  resetOrderCounter: () => DB.ref('orderCounter').set(0),
  markReady:    order   => DB.ref(`orders/${order._key}/ready`).set(true),
  updateOrder:  (o, p)  => DB.ref(`orders/${o._key}`).update(p),

  completeOrder(order) {
    const completedAt = Date.now();
    const waitTime    = Math.round((completedAt - order.startTime) / 60000);
    DB.ref(`history/${order._key}`).set({ ...order, completedAt, waitTime, status:'Completed' });
    DB.ref(`orders/${order._key}`).remove();
  },

  undoComplete(order) {
    const { completedAt, waitTime, status, ...active } = order;
    DB.ref(`orders/${order._key}`).set({ ...active, status:'Active', ready:false });
    DB.ref(`history/${order._key}`).remove();
  },

  addBaristaNote: (key, note) => DB.ref(`history/${key}/baristaNote`).set(note),

  subscribeHistory(cb, onErr) {
    const ref = DB.ref('history');
    ref.on('value', s => {
      const raw = s.val() || {};
      cb(Object.values(raw).sort((a,b) => b.completedAt - a.completedAt));
    }, onErr || console.error);
    return () => ref.off();
  },

  clearHistory: () => DB.ref('history').remove(),

  pruneHistory() {
    const cutoff = Date.now() - (DEFAULTS.HISTORY_TTL_DAYS * 86_400_000);
    DB.ref('history').orderByChild('completedAt').endAt(cutoff).once('value', snap => {
      const updates = {};
      snap.forEach(c => { updates[c.key] = null; });
      if (Object.keys(updates).length) DB.ref('history').update(updates);
    });
  },

  /* FIX #18: menu stored as keyed objects with sortOrder field */
  subscribeMenu(cb, onErr) {
    const ref = DB.ref('menu');
    ref.on('value', s => {
      const raw = s.val() || {};
      if (Array.isArray(raw)) { cb(raw.map((d,i)=>({...d,_key:String(i),sortOrder:i}))); return; }
      cb(Object.entries(raw).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)));
    }, onErr || console.error);
    return () => ref.off();
  },
  addMenuItem:    item     => DB.ref('menu').push({ ...item, sortOrder: Date.now() }),
  updateMenuItem: (key, p) => DB.ref(`menu/${key}`).update(p),
  deleteMenuItem: key      => DB.ref(`menu/${key}`).remove(),

  subscribeMilks(cb, onErr) {
    const ref = DB.ref('milks');
    ref.on('value', s => {
      const raw = s.val() || {};
      if (Array.isArray(raw)) { cb(raw.map((m,i)=>({...m,_key:String(i),sortOrder:i}))); return; }
      cb(Object.entries(raw).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0)));
    }, onErr || console.error);
    return () => ref.off();
  },
  addMilkItem:    item     => DB.ref('milks').push({ ...item, sortOrder: Date.now() }),
  updateMilkItem: (key, p) => DB.ref(`milks/${key}`).update(p),
  deleteMilkItem: key      => DB.ref(`milks/${key}`).remove(),

  subscribeShift(cb, onErr) {
    const ref = DB.ref('shift');
    ref.on('value', s => cb(s.val() || { active:false, startTime:0 }), onErr || console.error);
    return () => ref.off();
  },
  startShift: () => DB.ref('shift').set({ active:true, startTime:Date.now() }),
  endShift:   () => DB.ref('shift').set({ active:false, startTime:0 }),

  subscribePause(cb, onErr) {
    const ref = DB.ref('pause');
    ref.on('value', s => cb(s.val() || { active:false, message:'' }), onErr || console.error);
    return () => ref.off();
  },
  setPause:   msg => DB.ref('pause').set({ active:true,  message: msg || 'Back soon!' }),
  clearPause: ()  => DB.ref('pause').set({ active:false, message:'' }),
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 3 — DATA & LOGIC HOOK
   ═══════════════════════════════════════════════════════════════════ */
const useAppData = () => {
  const [online,   setOnline]   = useState(true);
  const [dbError,  setDbError]  = useState(null);   // FIX #17
  const [settings, setSettings] = useState({
    eventName:'', tagline:'', accentColor:'#22c55e',
    pin:DEFAULTS.DEFAULT_PIN, guestCount:0,
    darkMode:false, warnAt:DEFAULTS.QUEUE_WARN,
  });
  const [orders,  setOrders]  = useState([]);
  const [history, setHistory] = useState([]);
  const [menu,    setMenu]    = useState([]);
  const [milks,   setMilks]   = useState([]);
  const [shift,   setShift]   = useState({ active:false, startTime:0 });
  const [pause,   setPause]   = useState({ active:false, message:'' });
  const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');

  useEffect(() => { DbService.signInAnonymously(); }, []);

  /* FIX #17: shared error handler sets visible error state */
  const onDbErr = useCallback(err => {
    console.error('Firebase error:', err);
    setDbError(err?.message || 'Database connection error');
  }, []);

  useEffect(() => {
    const unsubs = [
      DbService.subscribeConnection(setOnline, onDbErr),
      DbService.subscribeSettings(s => setSettings(p=>({...p,...s})), onDbErr),
      DbService.subscribeOrders(setOrders, onDbErr),
      DbService.subscribeHistory(setHistory, onDbErr),
      DbService.subscribeMenu(setMenu, onDbErr),
      DbService.subscribeMilks(setMilks, onDbErr),
      DbService.subscribeShift(setShift, onDbErr),
      DbService.subscribePause(setPause, onDbErr),
    ];
    DbService.pruneHistory();
    return () => unsubs.forEach(fn => fn());
  }, [onDbErr]);

  useEffect(() => {
    const dark = !!settings.darkMode;
    document.body.classList.toggle('dark', dark);
    document.documentElement.classList.remove('dark-pending');
    try { localStorage.setItem('neb-dark', dark ? 'true' : 'false'); } catch(e) {}
  }, [settings.darkMode]);

  const switchMode     = useCallback(m => { setAppMode(m); localStorage.setItem('app-mode', m); }, []);
  const updateSettings = useCallback(p => DbService.setSettings(p), []);

  const shiftStats = useMemo(() => {
    const active = shift.startTime > 0 ? history.filter(o => o.completedAt > shift.startTime) : [];
    const revenue = active.reduce((a,o) => a + Number(o.price||0), 0);
    const drinkCounts = {}, hourCounts = {};
    let totalWait = 0;
    active.forEach(o => {
      drinkCounts[o.flavor] = (drinkCounts[o.flavor]||0)+1;
      totalWait += (o.waitTime||0);
      const h = new Date(o.completedAt).getHours();
      hourCounts[h] = (hourCounts[h]||0)+1;
    });
    const kd = Object.keys(drinkCounts), kh = Object.keys(hourCounts);
    const topDrink    = kd.length ? kd.reduce((a,b)=>drinkCounts[a]>drinkCounts[b]?a:b) : 'N/A';
    const avgWait     = active.length ? (totalWait/active.length).toFixed(1) : '0';
    const peakH       = kh.length ? kh.reduce((a,b)=>hourCounts[a]>hourCounts[b]?a:b) : null;
    const busiestHour = peakH !== null ? `${Number(peakH)%12||12}${Number(peakH)>=12?'PM':'AM'}` : 'N/A';
    return { revenue, topDrink, count:active.length, avgWait, busiestHour, drinkCounts, hourCounts };
  }, [history, shift]);

  const exportCSV = useCallback(frame => {
    /* FIX #5: warn if shift export chosen but no shift has started */
    if (frame === 'shift' && shift.startTime === 0) {
      alert('No shift has been started yet. Start a shift first, then export.');
      return;
    }
    const now  = Date.now();
    const cuts = { shift:shift.startTime, '24h':now-86400000, week:now-604800000, month:now-2592000000 };
    const rows = history.filter(o => o.completedAt > (cuts[frame]||0));
    const esc  = v => `"${String(v??'').replace(/"/g,'""')}"`;
    let csv = 'Order#,Customer,Flavor,Temp,Milk,Special Request,Price,Wait,Note,Date\n';
    rows.forEach(o => {
      csv += [o.orderNumber||'',esc(o.customer),esc(o.flavor),o.temp,esc(o.milk),
              esc(o.note),o.price,`${o.waitTime}m`,esc(o.baristaNote),
              new Date(o.completedAt).toLocaleString()].join(',')+'\n';
    });
    const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a = Object.assign(document.createElement('a'),{href:url,download:`neb_${frame}_${Date.now()}.csv`});
    a.click(); URL.revokeObjectURL(url);
  }, [history, shift]);

  /* FIX #6: new-order chime (high ascending) */
  const playChime = useCallback(() => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [[880,0,.22],[1100,.17,.22],[1320,.34,.38]].forEach(([f,s,d]) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+s);
        g.gain.linearRampToValueAtTime(.28,ctx.currentTime+s+.02);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+s+d);
        o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+.05);
      });
    } catch(_) {}
    try { navigator.vibrate && navigator.vibrate([80,40,80]); } catch(_) {}
  }, []);

  /* FIX #6: mark-ready chime (low, distinct from new-order) */
  const playReadyChime = useCallback(() => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [[440,0,.3],[550,.25,.35]].forEach(([f,s,d]) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+s);
        g.gain.linearRampToValueAtTime(.22,ctx.currentTime+s+.02);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+s+d);
        o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+.05);
      });
    } catch(_) {}
    try { navigator.vibrate && navigator.vibrate([60]); } catch(_) {}
  }, []);

  const startShift = useCallback(() => {
    DbService.startShift();
    DbService.resetOrderCounter();
  }, []);

  const addMenuItem        = ()        => DbService.addMenuItem({ name:'', price:5, soldOut:false });
  const updateMenuItem     = (key, p)  => DbService.updateMenuItem(key, p);
  const deleteMenuItem     = key       => DbService.deleteMenuItem(key);
  const toggleDrinkSoldOut = item      => DbService.updateMenuItem(item._key, { soldOut:!item.soldOut });

  /* FIX #9/#18: move item up/down by swapping sortOrder values */
  const moveMenuItemUp = useCallback((item, idx) => {
    if (idx === 0) return;
    const prev = menu[idx-1];
    DbService.updateMenuItem(item._key, { sortOrder:prev.sortOrder });
    DbService.updateMenuItem(prev._key, { sortOrder:item.sortOrder });
  }, [menu]);
  const moveMenuItemDown = useCallback((item, idx) => {
    if (idx === menu.length-1) return;
    const next = menu[idx+1];
    DbService.updateMenuItem(item._key, { sortOrder:next.sortOrder });
    DbService.updateMenuItem(next._key, { sortOrder:item.sortOrder });
  }, [menu]);

  const addMilkItem        = ()        => DbService.addMilkItem({ name:'', soldOut:false });
  const updateMilkItem     = (key, p)  => DbService.updateMilkItem(key, p);
  const deleteMilkItem     = key       => DbService.deleteMilkItem(key);
  const toggleMilkSoldOut  = item      => DbService.updateMilkItem(item._key, { soldOut:!item.soldOut });

  const moveMilkUp = useCallback((item, idx) => {
    if (idx === 0) return;
    const prev = milks[idx-1];
    DbService.updateMilkItem(item._key, { sortOrder:prev.sortOrder });
    DbService.updateMilkItem(prev._key, { sortOrder:item.sortOrder });
  }, [milks]);
  const moveMilkDown = useCallback((item, idx) => {
    if (idx === milks.length-1) return;
    const next = milks[idx+1];
    DbService.updateMilkItem(item._key, { sortOrder:next.sortOrder });
    DbService.updateMilkItem(next._key, { sortOrder:item.sortOrder });
  }, [milks]);

  const resetSoldOut = useCallback(() => {
    menu.forEach(d => { if (d.soldOut) DbService.updateMenuItem(d._key, { soldOut:false }); });
    milks.forEach(m => { if (m.soldOut) DbService.updateMilkItem(m._key, { soldOut:false }); });
  }, [menu, milks]);

  return {
    online, dbError, settings, orders, history, menu, milks, shift, pause, appMode, shiftStats,
    switchMode, updateSettings, exportCSV, playChime, playReadyChime, startShift,
    placeOrder:        DbService.placeOrder,
    markReady:         DbService.markReady,
    updateOrder:       DbService.updateOrder,
    completeOrder:     DbService.completeOrder,
    undoComplete:      DbService.undoComplete,
    addBaristaNote:    DbService.addBaristaNote,
    clearHistory:      DbService.clearHistory,
    endShift:          DbService.endShift,
    setPause:          DbService.setPause,
    clearPause:        DbService.clearPause,
    addMenuItem, updateMenuItem, deleteMenuItem, toggleDrinkSoldOut, moveMenuItemUp, moveMenuItemDown,
    addMilkItem, updateMilkItem, deleteMilkItem, toggleMilkSoldOut, moveMilkUp, moveMilkDown,
    resetSoldOut,
  };
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 4 — SHARED UI PRIMITIVES
   FIX #16: All components use CSS variables via inline styles —
   no hardcoded light/dark colours in barista-side components.

/* FIX #20: Error boundary — catches any component crash and shows reload */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError:false, msg:'' }; }
  static getDerivedStateFromError(e) { return { hasError:true, msg:e?.message||'Unknown error' }; }
  componentDidCatch(e, info) { console.error('Nebulous crash:', e, info); }
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                   minHeight:'100vh',padding:'24px',textAlign:'center',background:'var(--bg)'}}>
        <div style={{fontSize:'56px',marginBottom:'16px'}}>☕</div>
        <h1 style={{fontFamily:'Bebas Neue',fontSize:'52px',color:'var(--ink)',marginBottom:'8px',letterSpacing:'.03em'}}>
          SOMETHING WENT WRONG
        </h1>
        <p style={{color:'var(--ink-mid)',fontSize:'14px',marginBottom:'28px',maxWidth:'320px'}}>
          {this.state.msg}
        </p>
        <button onClick={() => window.location.reload()}
          style={{background:'var(--ink)',color:'var(--bg)',padding:'14px 28px',borderRadius:'14px',
                  fontWeight:800,fontSize:'12px',textTransform:'uppercase',letterSpacing:'.1em',
                  cursor:'pointer',border:'none'}}>
          Reload App
        </button>
      </div>
    );
  }
}

/* FIX #1: OrderTimer is kept as a display-only sub-component for the card header */
const OrderTimer = ({ startTime }) => {
  const [elapsed, setElapsed] = useState(() => Math.round((Date.now()-startTime)/60000));
  useEffect(() => {
    const calc = () => setElapsed(Math.round((Date.now()-startTime)/60000));
    const id = setInterval(calc, 60000);
    return () => clearInterval(id);
  }, [startTime]);
  const late = elapsed >= DEFAULTS.ORDER_LATE_MINS;
  const warn = elapsed >= DEFAULTS.ORDER_WARN_MINS;
  return (
    <div className="text-right flex-shrink-0">
      <span className={`display text-2xl block leading-none ${late?'text-red-500':warn?'text-amber-500':''}`}
            style={late||warn ? {} : V.ink}>
        {elapsed}m
      </span>
      <span className="text-[8px] font-bold uppercase tracking-widest" style={V.faint}>WAIT</span>
    </div>
  );
};

/* ── Queue card ──────────────────────────────────────
   FIX #1: live elapsed timer via useState+useEffect
   FIX #2: tempClass always derived from order.temp (separate from stateClass)
   FIX #11: reduced padding for compact view
   ────────────────────────────────────────────────── */
const QueueCard = ({ order, onReady, onComplete, onNote, onEdit }) => {
  const [showNote, setShowNote] = useState(false);
  const [noteVal,  setNoteVal]  = useState(order.baristaNote || '');
  const [showEdit, setShowEdit] = useState(false);

  /* FIX #1: live ticking elapsed time — recalculates every minute */
  const [elapsed, setElapsed] = useState(() => Math.round((Date.now()-order.startTime)/60000));
  useEffect(() => {
    const calc = () => setElapsed(Math.round((Date.now()-order.startTime)/60000));
    const id = setInterval(calc, 60000);
    return () => clearInterval(id);
  }, [order.startTime]);

  /* FIX #2: tempClass always set independently so hot/iced never lost */
  const isLate     = elapsed >= DEFAULTS.ORDER_LATE_MINS;
  const isWarn     = elapsed >= DEFAULTS.ORDER_WARN_MINS && !isLate;
  const tempClass  = order.temp === 'HOT' ? 'card-hot' : 'card-iced';
  const stateClass = order.ready ? 'card-ready' : isLate ? 'card-late' : isWarn ? 'card-warn' : '';

  const saveNote = () => { onNote(order._key, noteVal); setShowNote(false); };

  /* FIX #11: compact padding p-4 instead of p-5, tighter gaps */
  return (
    <div className={`rounded-[2rem] border border-l-[10px] shadow-soft p-4 transition-all ${tempClass} ${stateClass}`}
         style={V.surf}>

      <div className="flex items-start justify-between gap-3 mb-1.5">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            <span className="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
              #{order.orderNumber ?? '—'}
            </span>
            {order.ready && (
              <span className="text-[8px] font-black px-2 py-0.5 rounded-full bg-green-100 text-green-600">READY ✓</span>
            )}
            {isLate && !order.ready && (
              <span className="text-[8px] font-black px-2 py-0.5 rounded-full bg-red-100 text-red-500">LATE</span>
            )}
          </div>
          <h3 className="display text-3xl leading-none" style={V.ink}>{order.customer}</h3>
          <p className="text-sm font-black truncate mt-0.5" style={V.ink}>
            <span className={`text-[8px] font-black px-2 py-0.5 rounded-full mr-1.5 inline-block align-middle
              ${order.temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>
              {order.temp}
            </span>
            {order.flavor} · {order.milk}
          </p>
          {order.note && (
            <span className="inline-block mt-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold
                             uppercase tracking-widest px-3 py-0.5 rounded-full">
              ✎ {order.note}
            </span>
          )}
        </div>
        <OrderTimer startTime={order.startTime} />
      </div>

      {showNote ? (
        <div className="flex gap-2 mt-2 animate-in">
          <input autoFocus value={noteVal} onChange={e=>setNoteVal(e.target.value)}
            placeholder="Add barista note…"
            className="flex-1 px-4 py-2 rounded-xl text-xs font-medium border outline-none"
            style={V.input}
            onKeyDown={e=>e.key==='Enter'&&saveNote()} />
          <button onClick={saveNote} className="bg-slate-900 text-white px-4 rounded-xl text-xs font-bold">Save</button>
          <button onClick={()=>setShowNote(false)} className="px-3 rounded-xl text-xs" style={V.faint}>✕</button>
        </div>
      ) : (
        <button onClick={()=>setShowNote(true)}
          className="text-[9px] font-bold uppercase tracking-widest mt-1 block" style={V.faint}>
          {order.baristaNote ? `📝 ${order.baristaNote}` : '+ add note'}
        </button>
      )}

      <div className="flex gap-2 mt-3">
        <button onClick={() => setShowEdit(true)}
          className="px-3 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest border transition-all hover:opacity-70"
          style={{borderColor:'var(--border)',...V.faint}}>
          Edit
        </button>
        {!order.ready && (
          <button onClick={() => onReady(order)}
            className="flex-1 py-2.5 rounded-xl text-sm font-bold uppercase tracking-widest transition-all
                       bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white border border-emerald-100">
            Mark Ready
          </button>
        )}
        <button onClick={() => onComplete(order)}
          className={`py-2.5 rounded-xl font-black text-white text-xl transition-all hover:scale-105 active:scale-95 shadow-md
            ${order.ready ? 'flex-1 bg-green-500' : 'w-14 bg-slate-900'}`}>
          ✓
        </button>
      </div>

      {showEdit && (
        <EditOrderModal
          order={order}
          onSave={patch => { onEdit(order, patch); setShowEdit(false); }}
          onClose={() => setShowEdit(false)}
        />
      )}
    </div>
  );
};

/* FIX #10: checklist persists to localStorage, clears when new shift starts */
const ChecklistView = ({ settings, shift, menu, milks }) => {
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem(DEFAULTS.CHECKLIST_LS_KEY) || '{}'); }
    catch { return {}; }
  });
  const prevShiftActive = useRef(shift.active);

  useEffect(() => {
    // When shift transitions from inactive → active, wipe manual checks
    if (shift.active && !prevShiftActive.current) {
      setChecked({});
      try { localStorage.removeItem(DEFAULTS.CHECKLIST_LS_KEY); } catch {}
    }
    prevShiftActive.current = shift.active;
  }, [shift.active]);

  const toggle = id => {
    setChecked(p => {
      const next = {...p, [id]:!p[id]};
      try { localStorage.setItem(DEFAULTS.CHECKLIST_LS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const autoCheck = {
    menu:    menu.length > 0,
    milks:   milks.length > 0,
    soldout: false,
    pin:     (settings.pin||'') !== '' && settings.pin !== DEFAULTS.DEFAULT_PIN,
    guests:  Number(settings.guestCount) > 0,
    shift:   shift.active,
  };

  const items = DEFAULTS.CHECKLIST.map(item => ({
    ...item,
    done: autoCheck[item.id] || !!checked[item.id],
    auto: autoCheck[item.id],
  }));
  const allDone = items.every(i=>i.done);

  return (
    <div className="rounded-[2.5rem] p-8 shadow-soft border animate-in" style={V.surf}>
      <h2 className="display text-3xl mb-1" style={V.ink}>PRE-EVENT CHECKLIST</h2>
      <p className="text-[10px] font-bold uppercase tracking-widest mb-5" style={V.faint}>
        Persists between tab switches · clears when shift starts
      </p>
      <div className="space-y-2">
        {items.map(item => (
          <div key={item.id}
               onClick={() => !item.auto && toggle(item.id)}
               className={`flex items-center gap-4 p-4 rounded-2xl border transition-all
                 ${item.done ? 'border-green-200 bg-green-50' : 'cursor-pointer border hover:opacity-80'}`}
               style={item.done ? {} : {...V.surf2, borderColor:'var(--border)'}}>
            <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all
              ${item.done ? 'bg-green-500' : 'border-2'}`}
              style={item.done ? {} : {borderColor:'var(--border)'}}>
              {item.done && <span className="text-white text-sm check-pop">✓</span>}
            </div>
            <span className={`text-sm font-bold flex-1 ${item.done?'text-green-700':''}`}
                  style={item.done ? {} : V.ink}>
              {item.label}
            </span>
            {item.auto && item.done && (
              <span className="text-[8px] font-bold uppercase tracking-widest text-green-500">auto ✓</span>
            )}
          </div>
        ))}
      </div>
      {allDone && (
        <div className="mt-4 py-4 px-5 bg-green-50 border border-green-200 rounded-2xl text-center animate-in">
          <p className="text-green-700 font-bold text-sm">✓ All checks passed — ready to launch!</p>
        </div>
      )}
    </div>
  );
};

/* FIX #3: QuickAdd resets on unmount (navigation away), longer success with order # */
/* FIX #7: success screen shows for 2500ms and displays assigned order number */
const QuickAddView = ({ menu, milks, onPlace }) => {
  const [name,      setName]      = useState('');
  const [drink,     setDrink]     = useState(null);
  const [temp,      setTemp]      = useState(null);
  const [milk,      setMilk]      = useState(null);
  const [note,      setNote]      = useState('');
  const [placed,    setPlaced]    = useState(false);
  const [orderNum,  setOrderNum]  = useState(null);
  const timerRef = useRef(null);

  const reset = () => { setDrink(null); setTemp(null); setMilk(null); setNote(''); setName(''); };

  /* FIX #3: clear timer on unmount to avoid state update on unmounted component */
  useEffect(() => () => { clearTimeout(timerRef.current); }, []);

  const confirm = async () => {
    const num = await onPlace({
      customer: name.trim() || 'Walk-up',
      flavor: drink.name, price: drink.price||0, temp, milk, note: note.trim(),
    });
    setOrderNum(num);
    setPlaced(true);
    timerRef.current = setTimeout(() => { setPlaced(false); setOrderNum(null); reset(); }, DEFAULTS.QUICK_ADD_SUCCESS_MS);
  };

  const avail      = menu.filter(d=>!d.soldOut);
  const availMilks = milks.filter(m=>!m.soldOut);

  if (placed) return (
    <div className="rounded-[2.5rem] p-10 shadow-soft border text-center animate-pop" style={V.surf}>
      <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3">
        <span className="text-white text-2xl font-black">✓</span>
      </div>
      {orderNum && <p className="text-[10px] font-bold uppercase tracking-widest mb-1" style={V.faint}>Order #{orderNum}</p>}
      <p className="display text-3xl" style={V.ink}>ORDER PLACED</p>
      {drink && <p className="text-sm font-bold mt-2" style={V.mid}>{drink.name} · {temp} · {milk}</p>}
    </div>
  );

  return (
    <div className="rounded-[2.5rem] p-8 shadow-soft border animate-in" style={V.surf}>
      <h2 className="display text-3xl mb-5" style={V.ink}>WALK-UP ORDER</h2>
      <input value={name} onChange={e=>setName(e.target.value)}
        placeholder="Customer name (optional)"
        className="w-full px-5 py-3.5 rounded-2xl text-sm font-medium mb-5 outline-none border"
        style={V.input} />
      <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={V.faint}>Drink</p>
      <div className="grid grid-cols-2 gap-2 mb-4">
        {avail.map(d=>(
          <button key={d._key||d.name} onClick={()=>setDrink(d)}
            className={`py-3.5 px-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all text-left
              ${drink?._key===d._key ? 'bg-slate-900 text-white' : 'hover:opacity-70'}`}
            style={drink?._key===d._key ? {} : {...V.surf2,...V.ink}}>
            <span className="block">{d.name}</span>
            <span className="text-[10px] font-bold opacity-50">${Number(d.price).toFixed(2)}</span>
          </button>
        ))}
        {avail.length===0 && <p className="col-span-2 text-xs py-2" style={V.faint}>No drinks available</p>}
      </div>
      {drink && (
        <div className="animate-in mb-4">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={V.faint}>Temperature</p>
          <div className="flex gap-2">
            {['HOT','ICED'].map(t=>(
              <button key={t} onClick={()=>setTemp(t)}
                className={`flex-1 py-3.5 rounded-2xl font-black text-base transition-all
                  ${temp===t?(t==='HOT'?'bg-red-500 text-white':'bg-blue-500 text-white')
                             :(t==='HOT'?'bg-red-50 text-red-400':'bg-blue-50 text-blue-400')}`}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}
      {temp && (
        <div className="animate-in mb-4">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={V.faint}>Milk</p>
          <div className="grid grid-cols-2 gap-2">
            {availMilks.map(m=>(
              <button key={m._key||m.name} onClick={()=>setMilk(m.name)}
                className={`py-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all
                  ${milk===m.name?'bg-slate-900 text-white':'hover:opacity-70'}`}
                style={milk===m.name?{}: {...V.surf2,...V.ink}}>
                {m.name}
              </button>
            ))}
            {availMilks.length===0 && <p className="col-span-2 text-xs py-2" style={V.faint}>No milks available</p>}
          </div>
        </div>
      )}
      {milk && (
        <div className="animate-in space-y-3">
          <input value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Special request (optional)"
            className="w-full px-5 py-3.5 rounded-2xl text-sm font-medium outline-none border"
            style={V.input} />
          <button onClick={confirm}
            className="w-full btn-confirm text-white py-4 rounded-2xl font-black text-base uppercase tracking-widest">
            Place Order — ${Number(drink.price).toFixed(2)}
          </button>
        </div>
      )}
      {(drink||temp||milk) && (
        <button onClick={reset} className="w-full mt-3 py-2 text-[10px] font-bold uppercase tracking-widest" style={V.faint}>
          Clear
        </button>
      )}
    </div>
  );
};

  const warn   = settings.warnAt || DEFAULTS.QUEUE_WARN;
  const isBusy = queueCount >= warn;
  const accent = settings.accentColor || '#22c55e';

  return (
    <div className="animate-in pt-8 pb-28 min-h-screen" style={{background:'#f8f7f4'}}>
      <div onClick={onExitTap} style={{position:'fixed',top:0,right:0,width:120,height:120,zIndex:10000}} />

      <div className="text-center mb-8 px-4">
        {/* FIX #14: clamp on kiosk title too */}
        <h1 className="display leading-none" style={{color:'var(--ink)',letterSpacing:'.04em',
            fontSize:'clamp(3rem, 16vw, 9rem)'}}>
          {settings.eventName || DEFAULTS.APP_NAME}
        </h1>
      </div>

      {isBusy && (
        <div className="mx-4 mb-5 px-5 py-3 rounded-2xl font-bold text-sm text-center text-white animate-in"
             style={{background:`${accent}cc`}}>
          It's busy right now — allow about {Math.ceil(queueCount * 3)} minutes for your order
        </div>
      )}

      {/* FIX #8: onFocus scrolls to top so keyboard doesn't push grid off screen */}
      <div className="max-w-xl mx-auto px-4 mb-8">
        <input type="text" placeholder="WHAT'S YOUR NAME?"
          className="w-full bg-white px-6 py-5 rounded-[2rem] text-2xl font-black uppercase text-center outline-none name-pulse shadow-card"
          style={{color:'var(--ink)'}}
          value={customerName}
          onChange={e=>onNameChange(e.target.value)}
          onFocus={() => setTimeout(() => window.scrollTo({top:0, behavior:'smooth'}), 300)}
          maxLength={24} />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto px-4">
        {menu.map(drink=>(
          <div key={drink._key||drink.name}
               className={`bg-white rounded-[2.5rem] shadow-card border p-6 flex flex-col justify-between
                 ${drink.soldOut ? 'opacity-50' : 'transition-transform active:scale-[.98]'}`}
               style={{borderColor:'#ebebeb'}}>
            <div className="flex justify-between items-start mb-5">
              <h3 className="display text-3xl text-left leading-tight" style={{color:'var(--ink)'}}>{drink.name}</h3>
              <div className="text-right ml-3 flex-shrink-0">
                <span className="text-sm font-bold px-3 py-1 rounded-full" style={{background:'#f3f2ef',color:'var(--ink)'}}>
                  ${Number(drink.price).toFixed(2)}
                </span>
                {drink.soldOut && <p className="text-[8px] font-black text-red-400 uppercase tracking-widest mt-1">SOLD OUT</p>}
              </div>
            </div>
            <div className="flex gap-3">
              <button disabled={drink.soldOut} onClick={()=>onSelectDrink(drink,'HOT')}
                className="flex-1 py-6 rounded-[1.5rem] font-black text-xl text-white bg-red-500 disabled:bg-slate-200 disabled:text-slate-400 active:scale-95 transition-all shadow-md">
                HOT
              </button>
              <button disabled={drink.soldOut} onClick={()=>onSelectDrink(drink,'ICED')}
                className="flex-1 py-6 rounded-[1.5rem] font-black text-xl text-white bg-blue-500 disabled:bg-slate-200 disabled:text-slate-400 active:scale-95 transition-all shadow-md">
                ICED
              </button>
            </div>
          </div>
        ))}
        {menu.length===0 && (
          <div className="col-span-2 py-24 display text-4xl text-center" style={{color:'var(--ink-faint)'}}>
            NO DRINKS AVAILABLE
          </div>
        )}
      </div>
    </div>
  );
};

const MilkSelectView = ({ pendingOrder, milks, selectedMilk, specialRequest, onSelectMilk, onSpecialRequest, onConfirm, onCancel, accent }) => {
  const available   = milks.filter(m=>!m.soldOut);
  const chips       = DEFAULTS.QUICK_REQUESTS;
  const activeChips = specialRequest ? specialRequest.split(', ').filter(Boolean) : [];
  const toggleChip  = chip => {
    const next = activeChips.includes(chip) ? activeChips.filter(c=>c!==chip) : [...activeChips, chip];
    onSpecialRequest(next.join(', '));
  };
  return (
    <div className="fixed inset-0 overflow-y-auto no-scroll" style={{background:'#f8f7f4'}}>
      <div className="max-w-xl mx-auto px-4 py-10 text-center">
        <button onClick={onCancel} className="flex items-center gap-2 mb-8 font-bold text-sm hover:opacity-60 transition-all"
                style={{color:'var(--ink-faint)'}}>
          ← Back to menu
        </button>
        <span className={`inline-block text-sm font-black px-4 py-2 rounded-full mb-4
          ${pendingOrder.temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>
          {pendingOrder.temp}
        </span>
        <h2 className="display text-6xl md:text-8xl mb-8 leading-none" style={{color:'var(--ink)'}}>
          {pendingOrder.name}
        </h2>
        <div className="mb-8">
          <p className="font-black uppercase text-base underline decoration-2 underline-offset-8 mb-5"
             style={{color:'var(--ink)'}}>SELECT YOUR MILK</p>
          <div className="space-y-3">
            {available.map(m=>(
              <button key={m._key||m.name} onClick={()=>onSelectMilk(m.name)}
                className={`w-full py-6 rounded-[2rem] display text-3xl transition-all border-4
                  ${selectedMilk===m.name?'bg-slate-900 text-white border-slate-900 scale-[1.02]'
                                         :'bg-white border-slate-100 hover:border-slate-300'}`}
                style={selectedMilk===m.name?{}:{color:'var(--ink)'}}>
                {m.name}
              </button>
            ))}
            {available.length===0 && (
              <p className="py-6 font-bold uppercase text-sm" style={{color:'var(--ink-faint)'}}>No milk options available</p>
            )}
          </div>
        </div>
        {selectedMilk && (
          <div className="space-y-5 animate-in">
            <p className="font-black uppercase text-base underline decoration-2 underline-offset-8"
               style={{color:'var(--ink)'}}>SPECIAL REQUESTS</p>
            {chips.length > 0 && (
              <div className="flex flex-wrap gap-2 justify-center">
                {chips.map(c=>(
                  <button key={c} onClick={()=>toggleChip(c)}
                    className={`px-5 py-2.5 rounded-full text-sm font-bold uppercase tracking-widest transition-all border-2
                      ${activeChips.includes(c)?'bg-slate-900 text-white border-slate-900'
                                               :'bg-white border-slate-200 hover:border-slate-400'}`}
                    style={activeChips.includes(c)?{}:{color:'var(--ink)'}}>
                    {c}
                  </button>
                ))}
              </div>
            )}
            <input type="text" placeholder="Anything else? (optional)"
              value={specialRequest} onChange={e=>onSpecialRequest(e.target.value)}
              className="w-full bg-white px-6 py-5 rounded-[2rem] text-base font-medium border outline-none text-center"
              style={{borderColor:'#ebebeb',color:'var(--ink)'}} />
            <div className="pt-2">
              <p className="display text-5xl mb-6" style={{color:'var(--ink)'}}>
                TOTAL: ${Number(pendingOrder.price).toFixed(2)}
              </p>
              <button onClick={() => { try{navigator.vibrate&&navigator.vibrate(50);}catch(_){} onConfirm(); }}
                className="w-full btn-confirm text-white py-8 rounded-[2.5rem] display text-4xl shadow-lift">
                CONFIRM ORDER
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* FIX #15: staggered entrance animations — checkmark first, then order#, then title, then receipt */
const SuccessScreen = ({ orderNumber, customer, flavor, milk, temp }) => (
  <div className="fixed inset-0 flex flex-col items-center justify-center text-center px-6"
       style={{background:'#f8f7f4'}}>
    <div className="w-28 h-28 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-lift"
         style={{animation:'successFade .5s .0s both'}}>
      <span className="text-white text-5xl font-black" style={{animation:'checkPop .4s .15s both'}}>✓</span>
    </div>
    {orderNumber && (
      <p className="font-bold uppercase tracking-widest text-sm mb-1"
         style={{color:'var(--ink-faint)',animation:'successFade .4s .3s both',opacity:0}}>
        Order #{orderNumber}
      </p>
    )}
    <h1 className="display text-6xl md:text-8xl mb-4"
        style={{color:'var(--ink)',animation:'successFade .4s .45s both',opacity:0}}>
      ORDER PLACED
    </h1>
    <div className="bg-white rounded-3xl px-8 py-5 shadow-soft border mt-2 max-w-xs w-full"
         style={{borderColor:'#ebebeb',animation:'successFade .4s .6s both',opacity:0}}>
      <p className="font-black uppercase text-lg" style={{color:'var(--ink)'}}>{customer||'Guest'}</p>
      <p className="font-medium text-sm mt-1" style={{color:'var(--ink-mid)'}}>
        <span className={`text-[9px] font-black px-2 py-0.5 rounded-full mr-1.5 inline-block align-middle
          ${temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>{temp}</span>
        {flavor} · {milk}
      </p>
    </div>
    <p className="font-bold uppercase tracking-[.15em] text-sm mt-6"
       style={{color:'var(--ink-faint)',animation:'successFade .4s .75s both',opacity:0}}>
      Your coffee will be ready soon!
    </p>
  </div>
);

/* FIX #13: PinPad now uses CSS vars (V.surf) — dark mode works correctly */
const PinPad = ({ correctPin, onSuccess, onCancel }) => {
  const [entry, setEntry] = useState('');
  const [shake, setShake] = useState(false);
  const press = d => {
    const next = (entry+d).slice(0,4);
    setEntry(next);
    if (next.length===4) {
      if (next === String(correctPin||DEFAULTS.DEFAULT_PIN)) { onSuccess(); }
      else { setShake(true); setTimeout(()=>{ setEntry(''); setShake(false); },600); }
    }
  };
  const digits = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center"
         style={{background:'rgba(0,0,0,.72)',backdropFilter:'blur(14px)'}}>
      <div className={`rounded-[3rem] p-10 max-w-xs w-full text-center shadow-lift animate-pop border ${shake?'animate-shake':''}`}
           style={V.surf}>
        <h2 className="display text-4xl mb-6" style={V.ink}>ENTER PIN</h2>
        <div className="flex justify-center gap-4 mb-8">
          {[0,1,2,3].map(i=>(
            <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${i<entry.length?'pin-filled':''}`}
                 style={i<entry.length?{}:{borderColor:'var(--ink-faint)'}} />
          ))}
        </div>
        <div className="grid grid-cols-3 gap-3">
          {digits.map((d,i)=>(
            <button key={i}
              onClick={()=>{ if(d==='⌫') setEntry(e=>e.slice(0,-1)); else if(d!=='') press(String(d)); }}
              className={`py-5 rounded-2xl font-black text-2xl transition-all
                ${d===''?'pointer-events-none opacity-0':'hover:scale-105 active:scale-95'}`}
              style={{background:d===''?'transparent':'var(--surface-2)',
                      color:d==='⌫'?'#e84040':'var(--ink)'}}>
              {d}
            </button>
          ))}
        </div>
        <button onClick={onCancel} className="mt-6 text-[10px] font-bold uppercase tracking-widest" style={V.faint}>
          Cancel
        </button>
      </div>
    </div>
  );
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 7 — ROOT APP COMPONENT
   Wires data hook ↔ UI. No styling.
   ═══════════════════════════════════════════════════════════════════ */
const App = () => {
  const data = useAppData();

  const [baristaView,    setBaristaView]    = useState('queue');
  const [showShiftModal, setShowShiftModal] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [undoOrder,      setUndoOrder]      = useState(null);
  const undoTimerRef = useRef(null);

  const [pendingOrder,   setPendingOrder]   = useState(null);
  const [selectedMilk,   setSelectedMilk]   = useState(null);
  const [specialRequest, setSpecialRequest] = useState('');
  const [customerName,   setCustomerName]   = useState('');
  const [successData,    setSuccessData]    = useState(null);
  const [showAttract,    setShowAttract]    = useState(false);
  const [showPinPad,     setShowPinPad]     = useState(false);
  const idleRef  = useRef(null);
  const exitRef  = useRef({ count:0, last:0 });

  /* FIX #19: prevLen starts at -1; first subscription delivery is swallowed silently */
  const prevLen = useRef(-1);
  useEffect(() => {
    if (prevLen.current === -1) {
      prevLen.current = data.orders.length; // initialise without chiming
      return;
    }
    if (data.appMode === 'barista' && data.orders.length > prevLen.current) {
      data.playChime();
    }
    prevLen.current = data.orders.length;
  }, [data.orders.length, data.appMode]);

  /* Idle attract screen */
  const resetIdle = useCallback(() => {
    clearTimeout(idleRef.current); setShowAttract(false);
    if (data.appMode === 'kiosk') idleRef.current = setTimeout(()=>setShowAttract(true), DEFAULTS.IDLE_TIMEOUT_MS);
  }, [data.appMode]);

  useEffect(() => {
    if (data.appMode !== 'kiosk') { clearTimeout(idleRef.current); return; }
    resetIdle();
    const evs = ['touchstart','mousemove','keydown','click'];
    evs.forEach(e => window.addEventListener(e, resetIdle, {passive:true}));
    return () => { clearTimeout(idleRef.current); evs.forEach(e => window.removeEventListener(e, resetIdle)); };
  }, [data.appMode, resetIdle]);

  /* Kiosk handlers */
  const handleSelectDrink = (drink, temp) => {
    setPendingOrder({...drink, temp}); setSelectedMilk(null); setSpecialRequest('');
  };

  const handleConfirmOrder = async () => {
    const num = await data.placeOrder({
      customer: customerName.trim()||'Guest',
      flavor:   pendingOrder.name,
      price:    pendingOrder.price||0,
      temp:     pendingOrder.temp,
      milk:     selectedMilk,
      note:     specialRequest.trim(),
    });
    setSuccessData({ orderNumber:num, customer:customerName.trim()||'Guest',
                     flavor:pendingOrder.name, milk:selectedMilk, temp:pendingOrder.temp });
    setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); setCustomerName('');
    setTimeout(()=>{ setSuccessData(null); window.scrollTo({top:0}); }, DEFAULTS.SUCCESS_MS);
  };

  const handleCancelOrder = () => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); };

  const handleExitTap = () => {
    const now = Date.now();
    if (now - exitRef.current.last > DEFAULTS.KIOSK_EXIT_MS) exitRef.current.count = 0;
    exitRef.current.count++; exitRef.current.last = now;
    if (exitRef.current.count >= DEFAULTS.KIOSK_EXIT_TAPS) { setShowPinPad(true); exitRef.current.count = 0; }
  };

  const handlePinSuccess = () => { setShowPinPad(false); data.switchMode('barista'); setBaristaView('settings'); };

  /* Barista handlers */
  const handleComplete = order => {
    data.completeOrder(order);
    clearTimeout(undoTimerRef.current);
    setUndoOrder(order);
    undoTimerRef.current = setTimeout(()=>setUndoOrder(null), DEFAULTS.UNDO_MS);
  };
  const handleUndo = () => {
    if (undoOrder) { data.undoComplete(undoOrder); setUndoOrder(null); clearTimeout(undoTimerRef.current); }
  };

  /* FIX #6: Mark Ready triggers the distinct lower-pitched ready chime */
  const handleReady = useCallback(order => {
    data.markReady(order);
    data.playReadyChime();
  }, [data]);

  const handleEndShiftConfirm    = () => { data.endShift();      setShowShiftModal(false); };
  const handleClearHistoryConfirm= () => { data.clearHistory();  setShowClearModal(false); };

  /* PNG shift summary export */
  const handleGenerateSummaryCard = useCallback(() => {
    const s=data.shiftStats, name=data.settings.eventName||DEFAULTS.APP_NAME;
    const date=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const cells=[['Drinks Served',s.count],['Revenue',`$${s.revenue.toFixed(2)}`],
                 ['Top Drink',s.topDrink],['Avg Wait',`${s.avgWait}m`],['Peak Hour',s.busiestHour]];
    const card=document.getElementById('share-card');
    card.innerHTML=`
      <div style="background:#0c0c0c;color:#f0f0f0;padding:56px;font-family:'DM Sans',sans-serif;border-radius:24px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:.05em;line-height:1;margin-bottom:4px;">${name}</div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:#444;margin-bottom:48px;">${date}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;">
          ${cells.map(([l,v])=>`
            <div style="background:#181818;border-radius:14px;padding:18px;">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:#444;margin-bottom:8px;">${l}</div>
              <div style="font-size:26px;font-weight:900;font-style:italic;">${v}</div>
            </div>`).join('')}
        </div>
        <div style="border-top:1px solid #222;padding-top:18px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#333;">
          Powered by Nebulous Coffee Pro
        </div>
      </div>`;
    if (window.html2canvas) {
      window.html2canvas(card.firstElementChild,{backgroundColor:null,scale:2}).then(canvas=>{
        const a=Object.assign(document.createElement('a'),{href:canvas.toDataURL('image/png'),download:`nebulous_shift_${Date.now()}.png`});
        a.click();
      });
    } else {
      const w=window.open('','_blank');
      w.document.write(`<!DOCTYPE html><html><head>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
        <style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style>
        </head><body>${card.innerHTML}<script>window.onload=()=>window.print()<\/script></body></html>`);
    }
  }, [data.shiftStats, data.settings]);

  return (
    <Fragment>
      {/* FIX #17: show db error banner */}
      {data.dbError && <DbErrorBanner message={data.dbError} />}

      {/* ═══ BARISTA MODE ═══ */}
      {data.appMode === 'barista' && (
        <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen">
          <BaristaNav view={baristaView} setView={setBaristaView} queueCount={data.orders.length} online={data.online}/>

          {baristaView === 'queue' && (
            <QueueView orders={data.orders} settings={data.settings}
              onReady={handleReady}
              onComplete={handleComplete}
              onNote={data.addBaristaNote}
              onEdit={(order,patch)=>data.updateOrder(order,patch)} />
          )}
          {baristaView === 'add' && (
            <QuickAddView menu={data.menu} milks={data.milks} onPlace={data.placeOrder} />
          )}
          {baristaView === 'history' && (
            <HistoryView history={data.history} onClear={()=>setShowClearModal(true)} />
          )}
          {baristaView === 'stats' && (
            <StatsView shift={data.shift} shiftStats={data.shiftStats} settings={data.settings}
              onStartShift={data.startShift} onEndShiftRequest={()=>setShowShiftModal(true)}
              exportCSV={data.exportCSV} onGenerateSummaryCard={handleGenerateSummaryCard} />
          )}
          {baristaView === 'settings' && (
            <div className="space-y-5">
              <ChecklistView settings={data.settings} shift={data.shift} menu={data.menu} milks={data.milks} />
              <SettingsView
                menu={data.menu}          milks={data.milks}
                settings={data.settings} shift={data.shift} pause={data.pause}
                onAddDrink={data.addMenuItem}        onUpdateDrink={data.updateMenuItem}
                onDeleteDrink={data.deleteMenuItem}  onToggleDrinkSoldOut={data.toggleDrinkSoldOut}
                onMoveMenuUp={data.moveMenuItemUp}   onMoveMenuDown={data.moveMenuItemDown}
                onAddMilk={data.addMilkItem}         onUpdateMilk={data.updateMilkItem}
                onDeleteMilk={data.deleteMilkItem}   onToggleMilkSoldOut={data.toggleMilkSoldOut}
                onMoveMilkUp={data.moveMilkUp}       onMoveMilkDown={data.moveMilkDown}
                onResetSoldOut={data.resetSoldOut}   onUpdateSettings={data.updateSettings}
                onLaunchKiosk={()=>data.switchMode('kiosk')}
                onSetPause={data.setPause}           onClearPause={data.clearPause} />
            </div>
          )}

          {showShiftModal && <ShiftEndModal stats={data.shiftStats} onConfirm={handleEndShiftConfirm} onCancel={()=>setShowShiftModal(false)}/>}
          {showClearModal && <ClearHistoryModal onConfirm={handleClearHistoryConfirm} onCancel={()=>setShowClearModal(false)}/>}
          {undoOrder && <UndoToast order={undoOrder} onUndo={handleUndo}/>}
        </div>
      )}

      {/* ═══ KIOSK MODE ═══ */}
      {data.appMode === 'kiosk' && (
        <Fragment>
          {data.pause.active && <PauseScreen message={data.pause.message} onExitTap={handleExitTap}/>}
          {showAttract && !pendingOrder && !successData && !data.pause.active && (
            <AttractScreen eventName={data.settings.eventName} tagline={data.settings.tagline}
              onTap={()=>{ setShowAttract(false); resetIdle(); }}/>
          )}
          {!pendingOrder && !data.pause.active && (
            <KioskMenuView menu={data.menu} customerName={customerName}
              queueCount={data.orders.length} settings={data.settings}
              onNameChange={setCustomerName} onSelectDrink={handleSelectDrink} onExitTap={handleExitTap}/>
          )}
          {pendingOrder && !data.pause.active && (
            <MilkSelectView pendingOrder={pendingOrder} milks={data.milks}
              selectedMilk={selectedMilk} specialRequest={specialRequest}
              onSelectMilk={setSelectedMilk} onSpecialRequest={setSpecialRequest}
              onConfirm={handleConfirmOrder} onCancel={handleCancelOrder}
              accent={data.settings.accentColor}/>
          )}
          {successData && (
            <SuccessScreen orderNumber={successData.orderNumber} customer={successData.customer}
              flavor={successData.flavor} milk={successData.milk} temp={successData.temp}/>
          )}
          {showPinPad && (
            <PinPad correctPin={data.settings.pin||DEFAULTS.DEFAULT_PIN}
              onSuccess={handlePinSuccess} onCancel={()=>setShowPinPad(false)}/>
          )}
        </Fragment>
      )}
    </Fragment>
  );
};

/* FIX #20: wrap root in ErrorBoundary */
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
