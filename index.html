<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anu Day Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-in { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-user-select: none; touch-action: manipulation; }
        input { -webkit-user-select: text; }
        .hidden-trigger { position: fixed; top: 0; right: 0; width: 80px; height: 80px; z-index: 999; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [history, setHistory] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);
            const [secretTaps, setSecretTaps] = useState(0);

            useEffect(() => {
                db.ref('orders').on('value', snap => {
                    const data = snap.val() || {};
                    setOrders(Object.values(data).sort((a,b) => b.id - a.id));
                });
                db.ref('menu').on('value', snap => setMenuDrinks(snap.val() || []));
                db.ref('milks').on('value', snap => setMilks(snap.val() || []));
                db.ref('history').on('value', snap => setHistory(Object.values(snap.val() || {})));
            }, []);

            const stats = useMemo(() => {
                const today = new Date().setHours(0,0,0,0);
                const todaysOrders = history.filter(o => o.startTime > today);
                const totalRevenue = todaysOrders.reduce((sum, o) => sum + (Number(o.price) || 0), 0);
                const drinkCounts = todaysOrders.reduce((acc, o) => {
                    acc[o.flavor] = (acc[o.flavor] || 0) + 1;
                    return acc;
                }, {});
                const topDrink = Object.entries(drinkCounts).sort((a,b) => b[1] - a[1])[0];
                return { count: todaysOrders.length, revenue: totalRevenue, popular: topDrink ? topDrink[0] : 'N/A' };
            }, [history]);

            const addOrder = (drink, temp) => {
                if (!customerName.trim()) return alert("Please enter your name first!");
                setPendingOrder({ flavor: drink.name, price: drink.price, temp, customer: customerName });
            };

            const finalizeOrder = (milk) => {
                const newOrder = {
                    id: Date.now(),
                    customer: customerName,
                    flavor: pendingOrder.flavor,
                    price: pendingOrder.price || 0,
                    temp: pendingOrder.temp,
                    milk: milk,
                    startTime: Date.now(),
                    status: 'Active'
                };
                db.ref('orders/' + newOrder.id).set(newOrder);
                setPendingOrder(null);
                setCustomerName('');
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 3000);
            };

            const markDone = (order) => {
                db.ref('history/' + order.id).set({ ...order, status: 'Completed', completedAt: Date.now() });
                db.ref('orders/' + order.id).remove();
            };

            const handleSecretTap = () => {
                setSecretTaps(prev => {
                    if (prev + 1 >= 3) {
                        setAppMode('barista');
                        localStorage.setItem('app-mode', 'barista');
                        setView('settings');
                        return 0;
                    }
                    return prev + 1;
                });
                setTimeout(() => setSecretTaps(0), 2000);
            };

            if (showSuccess) return (
                <div className="flex flex-col items-center justify-center h-screen bg-orange-500 text-white animate-in">
                    <h1 className="text-7xl font-black mb-4 uppercase italic tracking-tighter">Order Sent!</h1>
                    <p className="text-2xl font-bold opacity-90 uppercase tracking-widest">See you at the counter</p>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 pb-24">
                    {appMode === 'kiosk' && <div className="hidden-trigger" onClick={handleSecretTap}></div>}

                    {appMode === 'barista' && (
                        <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-[2rem] shadow-sm border border-slate-200">
                            {['queue', 'history', 'stats', 'settings'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-400'}`}>
                                    {v}
                                </button>
                            ))}
                        </nav>
                    )}

                    {appMode === 'kiosk' && (
                        <div className="animate-in pt-10">
                            <h1 className="text-4xl text-center mb-10 font-black text-slate-800 uppercase italic tracking-tighter">Anu Day Coffee</h1>
                            <input type="text" placeholder="ENTER YOUR NAME..." className="w-full p-8 text-4xl rounded-[3rem] shadow-xl mb-10 border-none bg-white outline-none focus:ring-4 focus:ring-orange-200 text-center font-black uppercase" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                {(menuDrinks || []).filter(d => !d.soldOut).map((drink) => (
                                    <div key={drink.name} className="bg-white p-8 rounded-[4rem] shadow-md border border-slate-100 flex flex-col items-center">
                                        <div className="flex justify-between w-full mb-4 px-4">
                                            <h3 className="text-2xl font-black text-slate-700 uppercase tracking-tight">{drink.name}</h3>
                                            <span className="text-xl font-black text-orange-500">${Number(drink.price || 0).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-4 w-full">
                                            <button onClick={() => addOrder(drink, 'Hot')} className="flex-1 bg-orange-100 text-orange-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">HOT</button>
                                            <button onClick={() => addOrder(drink, 'Iced')} className="flex-1 bg-blue-100 text-blue-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* BARISTA VIEWS (QUEUE, STATS, SETTINGS) REMAIN THE SAME AS PREVIOUS STEP */}
                    {appMode === 'barista' && view === 'queue' && (
                        <div className="animate-in space-y-6">
                            <h2 className="text-2xl font-black text-slate-300 uppercase italic px-4">Live Orders</h2>
                            {orders.map(order => (
                                <div key={order.id} className="flex justify-between items-center p-8 rounded-[3.5rem] bg-white shadow-xl border-l-[20px] border-orange-500 animate-in">
                                    <div className="flex-1">
                                        <h2 className="text-4xl font-black text-slate-800">{order.customer}</h2>
                                        <p className="text-slate-500 font-extrabold text-lg uppercase">{order.temp} {order.flavor} • {order.milk}</p>
                                    </div>
                                    <button onClick={() => markDone(order)} className="bg-emerald-500 text-white w-24 h-24 rounded-[2.5rem] font-black text-5xl flex items-center justify-center shadow-lg active:scale-90 transition">✓</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'stats' && appMode === 'barista' && (
                        <div className="animate-in space-y-6">
                            <h2 className="text-2xl font-black text-slate-300 uppercase italic px-4">Performance</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm text-center">
                                    <p className="text-slate-400 font-black uppercase text-xs mb-2">Total Drinks</p>
                                    <p className="text-5xl font-black text-slate-800">{stats.count}</p>
                                </div>
                                <div className="bg-orange-500 p-8 rounded-[3rem] shadow-lg text-center text-white">
                                    <p className="opacity-70 font-black uppercase text-xs mb-2">Today's Revenue</p>
                                    <p className="text-5xl font-black">${stats.revenue.toFixed(2)}</p>
                                </div>
                                <div className="bg-white p-8 rounded-[3rem] shadow-sm text-center">
                                    <p className="text-slate-400 font-black uppercase text-xs mb-2">Best Seller</p>
                                    <p className="text-2xl font-black text-slate-800 uppercase">{stats.popular}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'settings' && appMode === 'barista' && (
                        <div className="animate-in space-y-8">
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-md">
                                <h2 className="text-2xl font-black mb-8 uppercase text-slate-800 tracking-tighter">Menu Management</h2>
                                <div className="space-y-4">
                                    {(menuDrinks || []).map((d, i) => (
                                        <div key={i} className="flex items-center gap-3 p-2 bg-slate-50 rounded-3xl">
                                            <input className="flex-1 bg-transparent p-4 font-black text-slate-700 uppercase outline-none" value={d.name} onChange={(e) => {
                                                const n = [...menuDrinks]; n[i].name = e.target.value; db.ref('menu').set(n);
                                            }} />
                                            <div className="flex items-center bg-white rounded-xl px-3 border border-slate-200">
                                                <span className="font-bold text-slate-400">$</span>
                                                <input type="number" step="0.01" className="w-16 p-3 font-bold outline-none" value={d.price} onChange={(e) => {
                                                    const n = [...menuDrinks]; n[i].price = e.target.value; db.ref('menu').set(n);
                                                }} />
                                            </div>
                                            <button onClick={() => {
                                                const n = [...menuDrinks]; n[i].soldOut = !n[i].soldOut; db.ref('menu').set(n);
                                            }} className={`px-4 py-4 rounded-2xl font-black text-[10px] uppercase ${d.soldOut ? 'bg-red-500 text-white' : 'bg-emerald-100 text-emerald-700'}`}>
                                                {d.soldOut ? 'SOLD OUT' : 'ACTIVE'}
                                            </button>
                                            <button onClick={() => {if(confirm("Delete?")){const n = [...menuDrinks]; n.splice(i,1); db.ref('menu').set(n);}}} className="p-4 text-slate-300 font-bold text-xl">✕</button>
                                        </div>
                                    ))}
                                    <button onClick={() => {
                                        const n = prompt("Drink Name:");
                                        if(n) db.ref('menu').set([...(menuDrinks || []), {name: n, price: 5.00, soldOut: false}]);
                                    }} className="w-full bg-orange-500 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-orange-100 mt-4">+ Add New Drink</button>
                                </div>
                            </div>

                            <div className="bg-slate-800 text-white p-10 rounded-[3rem]">
                                <h2 className="text-xl font-black uppercase mb-4 text-slate-400">Device Mode</h2>
                                <div className="flex gap-4">
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="flex-1 p-5 rounded-2xl font-black uppercase text-xs bg-slate-700">Set Kiosk</button>
                                    <button onClick={() => { setAppMode('barista'); localStorage.setItem('app-mode', 'barista'); }} className="flex-1 p-5 rounded-2xl font-black uppercase text-xs bg-emerald-500">Set Barista</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* KIOSK PRICE SUMMARY POPUP */}
                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-6 z-[100]">
                            <div className="bg-white w-full max-w-lg rounded-[4rem] p-10 text-center animate-in shadow-2xl">
                                <div className="mb-6">
                                    <p className="text-slate-400 font-black uppercase tracking-widest text-xs">Confirming Order For</p>
                                    <h2 className="text-3xl font-black text-slate-800 uppercase italic">{pendingOrder.customer}</h2>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2.5rem] mb-10 border border-slate-100">
                                    <p className="text-xl font-black text-slate-600 uppercase tracking-tighter">{pendingOrder.temp} {pendingOrder.flavor}</p>
                                    <p className="text-4xl font-black text-orange-500 mt-2">${Number(pendingOrder.price || 0).toFixed(2)}</p>
                                </div>
                                <h3 className="text-sm font-black text-slate-300 uppercase tracking-widest mb-6">Choose Your Milk</h3>
                                <div className="grid grid-cols-1 gap-4">
                                    {(milks || []).map(m => (
                                        <button key={m} onClick={() => finalizeOrder(m)} className="bg-white hover:bg-orange-50 p-8 rounded-[2.5rem] text-3xl font-black border-2 border-slate-100 text-slate-800 active:scale-95 transition uppercase">
                                            {m}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setPendingOrder(null)} className="mt-8 font-black text-slate-300 uppercase text-xs tracking-widest">Wait, Go Back</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
