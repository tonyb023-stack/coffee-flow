<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro - Modular</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; }
        .soft-shadow { box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /**
         * 1. THE SKIN (AESTHETIC LAYER)
         * Edit this object to change the look of the entire app.
         */
        const THEME_CONFIG = {
            colors: {
                bgMain: "#fcfdfe",
                card: "bg-white",
                accentPrimary: "bg-slate-900",
                textPrimary: "text-slate-900",
                textSecondary: "text-slate-400",
                hot: "border-red-500",
                iced: "border-blue-500",
                success: "bg-emerald-500",
                danger: "bg-red-500"
            },
            rounding: {
                nav: "rounded-3xl",
                card: "rounded-[2.5rem]",
                button: "rounded-2xl",
                input: "rounded-xl"
            },
            shadows: {
                soft: "soft-shadow border border-slate-100",
                heavy: "card-shadow shadow-2xl"
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);

            return (
                <div className="text-right ml-4">
                    <span className={`text-xl font-black ${THEME_CONFIG.colors.textPrimary} uppercase italic leading-none`}>{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active) setShowShiftModal(true);
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = [];
                if (timeFrame === 'shift') filtered = history.filter(o => o.completedAt > shiftStatus.startTime);
                else if (timeFrame === '24h') filtered = history.filter(o => o.completedAt > (now - 86400000));
                else if (timeFrame === 'week') filtered = history.filter(o => o.completedAt > (now - 604800000));
                else if (timeFrame === 'month') filtered = history.filter(o => o.completedAt > (now - 2592000000));

                let csv = "Customer,Flavor,Temp,Milk,Price,Wait Time,Date\n";
                filtered.forEach(o => { 
                    csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `neb_export_${timeFrame}_${new Date().toLocaleDateString()}.csv`);
                a.click();
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                return { revenue, topDrink, count: activeOrders.length, avgWait };
            }, [history, shiftStatus]);

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 min-h-screen" style={{backgroundColor: THEME_CONFIG.colors.bgMain}}>
                    {appMode === 'barista' && (
                        <>
                            <nav className={`grid grid-cols-4 gap-2 mb-8 ${THEME_CONFIG.colors.card} p-2 ${THEME_CONFIG.rounding.nav} ${THEME_CONFIG.shadows.soft}`}>
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 ${THEME_CONFIG.rounding.button} font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? `${THEME_CONFIG.colors.accentPrimary} text-white` : THEME_CONFIG.colors.textSecondary}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="grid grid-cols-1 gap-6 animate-in">
                                    {orders.map(o => (
                                        <div key={o.id} className={`${THEME_CONFIG.colors.card} p-8 ${THEME_CONFIG.rounding.card} border-l-[12px] ${THEME_CONFIG.shadows.soft} flex justify-between items-center transition-all ${o.temp === 'HOT' ? THEME_CONFIG.colors.hot : THEME_CONFIG.colors.iced}`}>
                                            <div className="flex-1">
                                                <h3 className={`text-3xl font-black uppercase italic tracking-tighter ${THEME_CONFIG.colors.textPrimary} mb-1`}>{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-500 font-bold uppercase text-lg tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className={`w-20 h-20 ${THEME_CONFIG.colors.accentPrimary} text-white rounded-[1.5rem] font-black text-3xl hover:scale-105 active:scale-95 transition-all shadow-xl`}>✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <div className="text-center py-20 text-slate-200 font-black uppercase italic text-4xl">No Orders</div>}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className={`${THEME_CONFIG.colors.card} ${THEME_CONFIG.rounding.card} p-10 ${THEME_CONFIG.shadows.soft} animate-in`}>
                                    <div className="flex justify-between mb-10 items-center">
                                        <h2 className={`font-black uppercase italic text-2xl tracking-tighter ${THEME_CONFIG.colors.textPrimary}`}>Order History</h2>
                                        <button onClick={() => { if(confirm("Clear history?")) db.ref('history').remove(); }} className="text-[10px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-5 py-2 rounded-full">Clear History</button>
                                    </div>
                                    <div className="space-y-6">
                                        {history.slice(0, 30).map(o => (
                                            <div key={o.id} className="flex justify-between items-center bg-slate-50/50 p-6 rounded-2xl border border-slate-100">
                                                <div className="flex-1">
                                                    <span className={`font-black uppercase italic text-lg ${THEME_CONFIG.colors.textPrimary}`}>{o.customer}</span>
                                                    <div className="flex gap-3 mt-1.5 pl-0">
                                                        <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className={`text-xs font-black ${THEME_CONFIG.colors.textPrimary} uppercase italic`}>{o.waitTime}m</span>
                                                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">MIN WAIT</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="grid grid-cols-1 gap-6 animate-in">
                                    <div className={`${THEME_CONFIG.colors.card} p-10 ${THEME_CONFIG.rounding.card} ${THEME_CONFIG.shadows.soft} text-center`}>
                                        <button onClick={toggleShift} className={`mb-10 px-12 py-5 rounded-full font-black uppercase tracking-widest text-sm transition-all ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                            {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                        </button>
                                        <div className="py-6 border-b border-slate-50">
                                            <h2 className="text-slate-400 font-black uppercase tracking-widest text-xs mb-4">Drinks Served</h2>
                                            <p className={`text-8xl font-black italic tracking-tighter ${THEME_CONFIG.colors.textPrimary}`}>{shiftStats.count}</p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 py-8">
                                            <div className="text-center"><p className="text-[9px] text-slate-300 font-bold uppercase mb-1">Revenue</p><p className={`text-lg font-black ${THEME_CONFIG.colors.textPrimary}`}>${shiftStats.revenue.toFixed(2)}</p></div>
                                            <div className="text-center"><p className="text-[9px] text-slate-300 font-bold uppercase mb-1">Top Drink</p><p className={`text-lg font-black ${THEME_CONFIG.colors.textPrimary} uppercase italic`}>{shiftStats.topDrink}</p></div>
                                            <div className="text-center"><p className="text-[9px] text-slate-300 font-bold uppercase mb-1">Avg Wait</p><p className={`text-lg font-black ${THEME_CONFIG.colors.textPrimary}`}>{shiftStats.avgWait}m</p></div>
                                        </div>
                                        <div className="mt-8 pt-8 border-t border-slate-50">
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                {['shift', '24h', 'week', 'month'].map(t => (
                                                    <button key={t} onClick={() => exportCSV(t)} className="bg-slate-50 hover:bg-slate-900 hover:text-white text-slate-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all">{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    {showShiftModal && (
                                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm">
                                            <div className={`${THEME_CONFIG.colors.card} ${THEME_CONFIG.rounding.card} p-10 max-w-sm w-full text-center shadow-2xl`}>
                                                <h2 className={`text-3xl font-black uppercase italic mb-6 ${THEME_CONFIG.colors.textPrimary}`}>End Shift?</h2>
                                                <div className="flex flex-col gap-3">
                                                    <button onClick={() => { db.ref('shift').set({ active: false, startTime: 0 }); setShowShiftModal(false); }} className="bg-red-500 text-white py-5 rounded-2xl font-black uppercase">Confirm</button>
                                                    <button onClick={() => setShowShiftModal(false)} className="bg-slate-100 text-slate-400 py-5 rounded-2xl font-black uppercase">Cancel</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8 animate-in">
                                    <div className={`${THEME_CONFIG.colors.card} p-8 ${THEME_CONFIG.rounding.card} ${THEME_CONFIG.shadows.soft}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className={`font-black uppercase italic ${THEME_CONFIG.colors.textPrimary}`}>Menu</h3>
                                            <button onClick={() => db.ref('menu').set([...menuDrinks, { name: "NEW DRINK", price: 5, soldOut: false }])} className="text-[10px] font-black uppercase bg-slate-900 text-white px-4 py-2 rounded-full">+ Add</button>
                                        </div>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-3 items-center bg-slate-50 p-3 rounded-2xl">
                                                    <input className={`flex-1 bg-white p-3 ${THEME_CONFIG.rounding.input} font-bold uppercase text-xs outline-none border border-slate-100`} value={d.name} onChange={e => { const n = [...menuDrinks]; n[i].name = e.target.value; db.ref('menu').set(n); }} />
                                                    <input className={`w-16 p-3 bg-white font-bold text-xs outline-none border border-slate-100 ${THEME_CONFIG.rounding.input}`} type="number" value={d.price} onChange={e => { const n = [...menuDrinks]; n[i].price = e.target.value; db.ref('menu').set(n); }} />
                                                    <button onClick={() => { const n = [...menuDrinks]; n[i].soldOut = !n[i].soldOut; db.ref('menu').set(n); }} className={`px-4 py-3 ${THEME_CONFIG.rounding.input} text-[10px] font-black uppercase ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-500'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => { if(confirm("Delete?")) db.ref('menu').set(menuDrinks.filter((_, idx) => idx !== i)); }} className="p-3 text-red-500 hover:text-red-700 font-bold">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className={`w-full ${THEME_CONFIG.colors.accentPrimary} text-white p-10 ${THEME_CONFIG.rounding.card} font-black uppercase text-2xl shadow-2xl italic tracking-tighter`}>Launch Kiosk</button>
                                </div>
                            )}
                        </>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-6 md:pt-12 pb-24 text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className={`text-5xl md:text-7xl font-black ${THEME_CONFIG.colors.textPrimary} tight-tracking uppercase italic mb-12`}>NEBULOUS</h1>
                            <div className="max-w-2xl mx-auto mb-12">
                                <div className={`${THEME_CONFIG.colors.card} p-6 ${THEME_CONFIG.rounding.card} ${THEME_CONFIG.shadows.heavy}`}>
                                    <input type="text" placeholder="WHO IS THIS FOR?" className="w-full bg-slate-50 p-5 rounded-[1.8rem] text-3xl font-black uppercase text-center outline-none placeholder:text-slate-200" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className={`${THEME_CONFIG.colors.card} ${THEME_CONFIG.rounding.card} ${THEME_CONFIG.shadows.heavy} p-6 flex flex-col justify-between`}>
                                        <div className="flex justify-between items-start mb-6">
                                            <h3 className={`text-2xl font-black ${THEME_CONFIG.colors.textPrimary} uppercase italic`}>{drink.name}</h3>
                                            <span className="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-6 rounded-[1.5rem] text-white font-black text-xl shadow-md">HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-6 rounded-[1.5rem] text-white font-black text-xl shadow-md">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4 md:p-8 overflow-y-auto">
                            <div className="max-w-xl w-full animate-in text-center py-8 md:py-16">
                                <div className="mb-12">
                                    <span className={`text-sm font-black px-4 py-2 rounded-full mb-4 inline-block ${pendingOrder.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{pendingOrder.temp}</span>
                                    <h2 className="text-4xl md:text-7xl font-black uppercase italic leading-tight">{pendingOrder.name}</h2>
                                </div>
                                <div className="space-y-16">
                                    <div className="grid grid-cols-1 gap-5">
                                        <p className="text-slate-900 font-black uppercase text-xl tracking-[0.15em]">Select Milk</p>
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 rounded-[2rem] text-2xl font-black uppercase italic border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                    {selectedMilk && (
                                        <div className="space-y-16 animate-in">
                                            <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-8 rounded-[2rem] text-xl font-bold uppercase border border-slate-100 outline-none text-center" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <button onClick={finalizeOrder} className={`w-full ${THEME_CONFIG.colors.success} text-white py-11 rounded-[3rem] font-black uppercase text-4xl shadow-lg`}>Confirm Order</button>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-black uppercase text-2xl mt-16">Cancel</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in p-4">
                            <div className="text-center">
                                <div className={`w-32 h-32 ${THEME_CONFIG.colors.success} rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl`}>
                                    <span className="text-white text-6xl font-black">✓</span>
                                </div>
                                <h1 className={`text-6xl font-black uppercase italic ${THEME_CONFIG.colors.textPrimary} mb-4`}>ORDER PLACED</h1>
                                <p className="text-slate-400 font-bold uppercase tracking-widest">Your coffee will be ready soon!</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
