<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .soft-shadow { box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const tick = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                tick(); const i = setInterval(tick, 30000); return () => clearInterval(i);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const tapRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'), history: db.ref('history'),
                    menu: db.ref('menu'), milks: db.ref('milks'), shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (o) => {
                const now = Date.now();
                db.ref(`history/${o.id}`).set({ ...o, completedAt: now, waitTime: Math.round((now - o.startTime)/60000), status: 'Completed' });
                db.ref(`orders/${o.id}`).remove();
            };

            const exportCSV = (type) => {
                const now = Date.now();
                let filtered = history;
                if (type === 'shift') filtered = history.filter(o => o.completedAt > shiftStatus.startTime);
                else if (type === '24h') filtered = history.filter(o => o.completedAt > (now - 86400000));
                else if (type === 'week') filtered = history.filter(o => o.completedAt > (now - 604800000));
                else if (type === 'month') filtered = history.filter(o => o.completedAt > (now - 2592000000));

                let csv = "Customer,Drink,Temp,Milk,Price,Wait Time,Date\n";
                filtered.forEach(o => csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`);
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `Nebulous_${type}_${new Date().toLocaleDateString()}.csv`; a.click();
            };

            const shiftStats = useMemo(() => {
                const active = history.filter(o => o.completedAt > shiftStatus.startTime);
                const rev = active.reduce((acc, o) => acc + Number(o.price || 0), 0);
                const counts = {}; 
                const hourCounts = {};
                active.forEach(o => {
                    counts[o.flavor] = (counts[o.flavor] || 0) + 1;
                    const hour = new Date(o.completedAt).getHours();
                    hourCounts[hour] = (hourCounts[hour] || 0) + 1;
                });
                const top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "N/A");
                const avg = active.length ? (active.reduce((a,o)=>a+(o.waitTime||0),0)/active.length).toFixed(1) : 0;
                const busiestRaw = Object.keys(hourCounts).reduce((a, b) => hourCounts[a] > hourCounts[b] ? a : b, null);
                const peak = busiestRaw !== null ? `${busiestRaw % 12 || 12}${busiestRaw >= 12 ? 'PM' : 'AM'}` : "N/A";
                return { rev, top, count: active.length, avg, peak };
            }, [history, shiftStatus]);

            const handleExitTap = () => {
                const now = Date.now();
                if (now - tapRef.current.last > 800) tapRef.current.count = 0;
                tapRef.current.count++; tapRef.current.last = now;
                if (tapRef.current.count >= 3) { setAppMode('barista'); setView('settings'); localStorage.setItem('app-mode', 'barista'); }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' ? (
                        <div className="animate-in">
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl soft-shadow border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>{v}</button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] soft-shadow flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div>
                                                <h3 className="text-3xl font-black uppercase italic text-slate-900 leading-none mb-2">{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-500 font-bold uppercase text-lg tracking-widest">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-16 h-16 bg-slate-900 text-white rounded-2xl font-black text-2xl">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <div className="text-center py-20 text-slate-200 font-black uppercase italic text-4xl">Queue Empty</div>}
                                </div>
                            )}

                            {view === 'history' && (
                                <div className="bg-white rounded-[3rem] p-10 soft-shadow border border-slate-50">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="font-black uppercase italic text-2xl">Order History</h2>
                                        <button onClick={() => {if(confirm("Clear History?")) db.ref('history').remove();}} className="text-[10px] font-black uppercase text-red-500">Clear</button>
                                    </div>
                                    <div className="space-y-4">
                                        {history.slice(0, 30).map(o => (
                                            <div key={o.id} className="flex justify-between items-center p-6 bg-slate-50/50 rounded-2xl border border-slate-100">
                                                <div>
                                                    <p className="font-black uppercase text-slate-900">{o.customer}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                        <p className="text-xs font-black text-emerald-500 uppercase leading-none">${Number(o.price).toFixed(2)}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-sm font-black text-slate-900 uppercase italic">{o.waitTime}m</p>
                                                    <p className="text-[9px] text-slate-300 font-bold uppercase">WAIT</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="grid grid-cols-1 gap-6">
                                    <div className="bg-white p-10 rounded-[3rem] soft-shadow text-center border border-slate-50">
                                        <button onClick={() => shiftStatus.active ? setShowShiftModal(true) : db.ref('shift').set({active:true, startTime:Date.now()})} className={`mb-10 px-10 py-4 rounded-full font-black uppercase tracking-widest text-sm ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                            {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                        </button>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-8 mb-10">
                                            <div><p className="text-[9px] text-slate-300 font-black uppercase mb-1">Drinks</p><p className="text-2xl font-black italic">{shiftStats.count}</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-black uppercase mb-1">Revenue</p><p className="text-2xl font-black italic">${shiftStats.rev.toFixed(2)}</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-black uppercase mb-1">Top Drink</p><p className="text-2xl font-black italic uppercase">{shiftStats.top}</p></div>
                                            <div><p className="text-[9px] text-slate-300 font-black uppercase mb-1">Avg Wait</p><p className="text-2xl font-black italic">{shiftStats.avg}m</p></div>
                                        </div>
                                        <div className="mb-10 text-center"><p className="text-[9px] text-slate-300 font-black uppercase mb-1">Peak Hour</p><p className="text-2xl font-black italic">{shiftStats.peak}</p></div>
                                        
                                        <div className="border-t border-slate-50 pt-8">
                                            <p className="text-[10px] text-slate-300 font-black uppercase mb-4">Export Reports</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                {['shift', '24h', 'week', 'month'].map(t => <button key={t} onClick={() => exportCSV(t)} className="bg-slate-50 py-3 rounded-xl font-black uppercase text-[10px] text-slate-400 hover:bg-slate-900 hover:text-white transition-all">CSV {t}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    {showShiftModal && (
                                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-6 modal-backdrop">
                                            <div className="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center">
                                                <h2 className="text-3xl font-black uppercase italic mb-6">End Shift?</h2>
                                                <button onClick={() => {db.ref('shift').set({active:false, startTime:0}); setShowShiftModal(false);}} className="w-full bg-red-500 text-white py-5 rounded-2xl font-black uppercase mb-3">End Shift</button>
                                                <button onClick={() => setShowShiftModal(false)} className="w-full bg-slate-50 text-slate-300 py-5 rounded-2xl font-black uppercase">Cancel</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-8 rounded-[3rem] soft-shadow border border-slate-50">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic text-slate-900">Menu Management</h3>
                                            <button onClick={() => db.ref('menu').set([...menuDrinks, {name:'NEW DRINK', price:5, soldOut:false}])} className="text-[10px] font-black uppercase bg-slate-900 text-white px-4 py-2 rounded-full">+ Add Drink</button>
                                        </div>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-3 bg-slate-50 p-3 rounded-2xl items-center">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs outline-none border border-slate-100" value={d.name} onChange={e => {const n=[...menuDrinks]; n[i].name=e.target.value; db.ref('menu').set(n);}} />
                                                    <div className="flex items-center bg-white px-3 rounded-xl border border-slate-100 w-24">
                                                        <span className="text-slate-400 font-bold text-xs pr-1">$</span>
                                                        <input className="w-full p-3 bg-transparent font-bold text-xs outline-none" type="number" value={d.price} onChange={e => {const n=[...menuDrinks]; n[i].price=e.target.value; db.ref('menu').set(n);}} />
                                                    </div>
                                                    <button onClick={() => {const n=[...menuDrinks]; n[i].soldOut=!n[i].soldOut; db.ref('menu').set(n);}} className={`px-4 py-3 rounded-xl font-black text-[10px] ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{d.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => {if(confirm("Delete item?")) db.ref('menu').set(menuDrinks.filter((_, idx) => idx !== i));}} className="p-3 rounded-xl bg-red-50 text-red-500">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-[3rem] soft-shadow border border-slate-50">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black uppercase italic text-slate-900">Milk Options</h3>
                                            <button onClick={() => db.ref('milks').set([...milks, {name:'NEW MILK', soldOut:false}])} className="text-[10px] font-black uppercase bg-slate-900 text-white px-4 py-2 rounded-full">+ Add Milk</button>
                                        </div>
                                        <div className="space-y-3">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-3 bg-slate-50 p-3 rounded-2xl items-center">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs outline-none border border-slate-100" value={m.name} onChange={e => {const n=[...milks]; n[i].name=e.target.value; db.ref('milks').set(n);}} />
                                                    <button onClick={() => {const n=[...milks]; n[i].soldOut=!n[i].soldOut; db.ref('milks').set(n);}} className={`px-4 py-3 rounded-xl font-black text-[10px] ${m.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-400'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                    <button onClick={() => {if(confirm("Delete option?")) db.ref('milks').set(milks.filter((_, idx) => idx !== i));}} className="p-3 rounded-xl bg-red-50 text-red-500">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full bg-slate-900 text-white p-10 rounded-[3rem] font-black uppercase text-2xl italic shadow-2xl transition-transform active:scale-95">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="animate-in pt-12 pb-24 text-center">
                            <div id="exit-zone" onClick={handleExitTap}></div>
                            <h1 className="text-6xl md:text-8xl font-black text-slate-900 uppercase italic mb-12 tracking-tighter">NEBULOUS</h1>
                            
                            <div className="max-w-xl mx-auto mb-10">
                                <input placeholder="WHO IS THIS FOR?" className="w-full bg-white p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] card-shadow text-2xl md:text-4xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="bg-white rounded-[2rem] md:rounded-[2.5rem] card-shadow p-6 flex flex-col justify-between">
                                        <div className="flex justify-between items-start mb-6">
                                            <h3 className="text-2xl md:text-3xl font-black text-slate-900 uppercase italic leading-tight text-left">{drink.name}</h3>
                                            <span className="text-sm font-bold text-slate-900 italic bg-slate-100 px-3 py-1 rounded-full shrink-0">${Number(drink.price).toFixed(2)}</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-6 md:py-8 rounded-[1.5rem] text-white font-black text-xl md:text-2xl shadow-md active:scale-95 transition-all">HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-6 md:py-8 rounded-[1.5rem] text-white font-black text-xl md:text-2xl shadow-md active:scale-95 transition-all">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {pendingOrder && (
                                <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                                    <div className="max-w-xl w-full animate-in text-center py-12">
                                        <div className="mb-12">
                                            <span className={`text-xs md:text-sm font-black px-4 py-2 rounded-full mb-4 inline-block ${pendingOrder.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{pendingOrder.temp}</span>
                                            <h2 className="text-4xl md:text-7xl font-black uppercase italic tracking-tighter leading-tight">{pendingOrder.name}</h2>
                                        </div>
                                        <div className="space-y-12 md:space-y-16">
                                            <div className="grid grid-cols-1 gap-4 md:gap-5">
                                                <p className="text-slate-900 font-black uppercase text-xl md:text-2xl tracking-[0.15em]">Select Your Milk</p>
                                                {milks.filter(m => !m.soldOut).map(m => (
                                                    <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 md:py-8 rounded-[1.5rem] md:rounded-[2.5rem] text-2xl md:text-3xl font-black uppercase italic border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900 card-shadow scale-[1.03]' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                                ))}
                                            </div>
                                            {selectedMilk && (
                                                <div className="space-y-12 md:space-y-16 animate-in">
                                                    <input placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-6 md:p-8 rounded-[1.5rem] md:rounded-[2.5rem] text-xl font-bold uppercase text-center outline-none border border-slate-100" value={specialRequest} onChange={e => setSpecialRequest(e.target.value)} />
                                                    <div className="pt-4">
                                                        <p className="text-black font-black text-3xl md:text-4xl mb-6 italic tracking-tighter">TOTAL: ${Number(pendingOrder.price).toFixed(2)}</p>
                                                        <button onClick={() => {
                                                            const id = Date.now();
                                                            db.ref(`orders/${id}`).set({id, customer: customerName||"Guest", flavor: pendingOrder.name, temp: pendingOrder.temp, milk: selectedMilk, note: specialRequest, startTime: id, price: pendingOrder.price});
                                                            setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                                                            setTimeout(() => setShowSuccess(false), 2000);
                                                        }} className="w-full confirm-btn text-white py-10 md:py-12 rounded-[2rem] md:rounded-[3rem] font-black uppercase text-3xl md:text-4xl shadow-2xl active:scale-95 transition-all">Confirm Order</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={() => {setPendingOrder(null); setSelectedMilk(null);}} className="mt-12 text-slate-300 font-black uppercase text-xl md:text-2xl transition-all active:text-slate-900">Cancel</button>
                                    </div>
                                </div>
                            )}

                            {showSuccess && (
                                <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in p-4">
                                    <div className="w-32 h-32 bg-emerald-500 rounded-full flex items-center justify-center mb-8 shadow-xl text-white text-6xl font-black">✓</div>
                                    <h1 className="text-5xl md:text-6xl font-black uppercase italic">ORDER PLACED</h1>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
