<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 100px; height: 100px; z-index: 10000; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- COMPONENTS ---
        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const tick = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                tick(); const i = setInterval(tick, 30000); return () => clearInterval(i);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            
            // Kiosk State
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const tripleTap = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'), history: db.ref('history'),
                    menu: db.ref('menu'), milks: db.ref('milks'), shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            // --- FUNCTIONS ---
            const completeOrder = (o) => {
                const now = Date.now();
                db.ref(`history/${o.id}`).set({ ...o, completedAt: now, waitTime: Math.round((now - o.startTime)/60000), status: 'Completed' });
                db.ref(`orders/${o.id}`).remove();
            };

            const downloadCSV = (type) => {
                let data = history;
                const now = Date.now();
                if (type === 'shift') data = history.filter(o => o.completedAt > shiftStatus.startTime);
                if (type === '24h') data = history.filter(o => o.completedAt > (now - 86400000));
                
                const csvRows = [["ID", "Customer", "Drink", "Milk", "Temp", "Wait(m)", "Completed"]];
                data.forEach(o => csvRows.push([o.id, o.customer, o.flavor, o.milk, o.temp, o.waitTime, new Date(o.completedAt).toLocaleString()]));
                const blob = new Blob([csvRows.map(e => e.join(",")).join("\n")], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `Nebulous_${type}_Report.csv`; a.click();
            };

            const handleExit = () => {
                const now = Date.now();
                if (now - tripleTap.current.last > 800) tripleTap.current.count = 0;
                tripleTap.current.count++; tripleTap.current.last = now;
                if (tripleTap.current.count >= 3) { setAppMode('barista'); setView('settings'); localStorage.setItem('app-mode', 'barista'); }
            };

            const shiftStats = useMemo(() => {
                const active = history.filter(o => o.completedAt > shiftStatus.startTime);
                const rev = active.reduce((acc, o) => acc + (Number(o.price) || 0), 0);
                const counts = {}; active.forEach(o => counts[o.flavor] = (counts[o.flavor] || 0) + 1);
                const top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "N/A");
                const avg = active.length ? (active.reduce((a,o)=>a+(o.waitTime||0),0)/active.length).toFixed(1) : 0;
                return { rev, top, count: active.length, avg };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' ? (
                        <div>
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl card-shadow border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>{v}</button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6 animate-in">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] card-shadow flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div>
                                                <h3 className="text-3xl font-black uppercase italic text-slate-900">{o.customer}</h3>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-500 font-bold uppercase text-lg">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-16 h-16 bg-slate-900 text-white rounded-2xl font-black text-2xl shadow-lg">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="space-y-6 animate-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-50">
                                            <p className="text-slate-300 font-black uppercase text-[10px] tracking-widest mb-2">Total Revenue</p>
                                            <h2 className="text-4xl font-black text-slate-900">${shiftStats.rev.toFixed(2)}</h2>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-50 text-center">
                                            <button onClick={() => shiftStatus.active ? db.ref('shift').set({active:false, startTime:0}) : db.ref('shift').set({active:true, startTime:Date.now()})} 
                                                className={`w-full h-full font-black uppercase italic text-xl ${shiftStatus.active ? 'text-red-500' : 'text-emerald-500'}`}>
                                                {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-50">
                                        <p className="text-slate-300 font-black uppercase text-[10px] mb-4">Export Data</p>
                                        <div className="grid grid-cols-3 gap-3">
                                            {['shift', '24h', 'Weekly'].map(t => (
                                                <button key={t} onClick={() => downloadCSV(t.toLowerCase())} className="bg-slate-50 py-4 rounded-2xl font-black uppercase text-[10px] text-slate-900 border border-slate-100">CSV {t}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-white p-8 rounded-[2.5rem] card-shadow">
                                        <h3 className="font-black uppercase italic mb-6">Menu & Inventory</h3>
                                        <div className="space-y-3">
                                            {menuDrinks.map((d, i) => (
                                                <div key={i} className="flex gap-3 bg-slate-50 p-3 rounded-2xl items-center">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs" value={d.name} onChange={e => {const n=[...menuDrinks]; n[i].name=e.target.value; db.ref('menu').set(n);}} />
                                                    <button onClick={() => {const n=[...menuDrinks]; n[i].soldOut=!n[i].soldOut; db.ref('menu').set(n);}} className={`px-4 py-3 rounded-xl font-black text-[10px] ${d.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200'}`}>SOLD OUT</button>
                                                </div>
                                            ))}
                                            <button onClick={() => db.ref('menu').set([...menuDrinks, {name:'NEW DRINK', price:5, soldOut:false}])} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl font-black uppercase text-[10px] text-slate-300">+ New Drink</button>
                                        </div>
                                    </div>
                                    <button onClick={() => { setAppMode('kiosk'); localStorage.setItem('app-mode', 'kiosk'); }} className="w-full bg-slate-900 text-white p-10 rounded-[3rem] font-black uppercase text-2xl italic shadow-2xl">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="animate-in pt-12 text-center pb-24">
                            <div id="exit-zone" onClick={handleExit}></div>
                            <h1 className="text-6xl md:text-8xl font-black text-slate-900 tight-tracking uppercase italic mb-16">NEBULOUS</h1>
                            
                            <div className="max-w-xl mx-auto mb-12 bg-white p-6 rounded-[2.5rem] card-shadow border border-slate-50">
                                <input placeholder="WHO IS THIS FOR?" className="w-full bg-slate-50 p-6 rounded-[2rem] text-3xl font-black uppercase text-center outline-none" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                    <div key={drink.name} className="bg-white rounded-[2.5rem] card-shadow p-6">
                                        <h3 className="text-2xl font-black uppercase italic mb-6 text-left">{drink.name}</h3>
                                        <div className="flex gap-3">
                                            <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-8 rounded-[1.5rem] text-white font-black text-2xl shadow-md">HOT</button>
                                            <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-8 rounded-[1.5rem] text-white font-black text-2xl shadow-md">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {pendingOrder && (
                                <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                                    <div className="max-w-xl w-full animate-in py-12">
                                        <h2 className="text-6xl font-black uppercase italic mb-12">Select Your Milk</h2>
                                        <div className="space-y-4 mb-12">
                                            {milks.filter(m => !m.soldOut).map(m => (
                                                <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`w-full py-8 rounded-[2.5rem] text-3xl font-black uppercase italic border-4 ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                            ))}
                                        </div>
                                        {selectedMilk && (
                                            <div className="space-y-12 animate-in">
                                                <input placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-8 rounded-[2.5rem] text-2xl font-black uppercase text-center border border-slate-100" value={specialRequest} onChange={e => setSpecialRequest(e.target.value)} />
                                                <button onClick={() => {
                                                    const id = Date.now();
                                                    db.ref(`orders/${id}`).set({id, customer: customerName||"Guest", flavor: pendingOrder.name, temp: pendingOrder.temp, milk: selectedMilk, note: specialRequest, startTime: id, price: pendingOrder.price});
                                                    setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                                                    setTimeout(() => setShowSuccess(false), 2000);
                                                }} className="w-full confirm-btn text-white py-12 rounded-[3rem] font-black uppercase text-4xl shadow-2xl">Confirm Order</button>
                                            </div>
                                        )}
                                        <button onClick={() => {setPendingOrder(null); setSelectedMilk(null);}} className="mt-12 text-slate-300 font-black uppercase text-2xl">Cancel</button>
                                    </div>
                                </div>
                            )}

                            {showSuccess && (
                                <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in">
                                    <div className="w-32 h-32 bg-emerald-500 rounded-full flex items-center justify-center mb-8 shadow-xl text-white text-6xl font-black">✓</div>
                                    <h1 className="text-6xl font-black uppercase italic">ORDER PLACED</h1>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
