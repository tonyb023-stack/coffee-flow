<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .soft-shadow { box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
        .wide-tracking { letter-spacing: 0.15em; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                const waitTime = Math.round((completedAt - order.startTime) / 60000);
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active) setShowShiftModal(true);
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const confirmEndShift = () => {
                db.ref('shift').set({ active: false, startTime: 0 });
                setShowShiftModal(false);
            };

            const clearHistory = () => { if(confirm("Clear all history?")) db.ref('history').remove(); };

            const updateMenuItem = (index, field, value) => {
                const newMenu = [...menuDrinks];
                newMenu[index][field] = value;
                db.ref('menu').set(newMenu);
            };

            const exportCSV = (timeFrame) => {
                const now = Date.now();
                let filtered = [];
                
                if (timeFrame === 'shift') {
                    filtered = history.filter(o => o.completedAt > shiftStatus.startTime);
                } else if (timeFrame === '24h') {
                    filtered = history.filter(o => o.completedAt > (now - 86400000));
                } else if (timeFrame === 'week') {
                    filtered = history.filter(o => o.completedAt > (now - 604800000));
                } else if (timeFrame === 'month') {
                    filtered = history.filter(o => o.completedAt > (now - 2592000000));
                }

                let csv = "Customer,Flavor,Temp,Milk,Price,Wait Time,Date\n";
                filtered.forEach(o => { 
                    csv += `${o.customer},${o.flavor},${o.temp},${o.milk},${o.price},${o.waitTime}m,${new Date(o.completedAt).toLocaleString()}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `neb_export_${timeFrame}_${new Date().toLocaleDateString()}.csv`);
                a.click();
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                const hourCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                    const hour = new Date(o.completedAt).getHours();
                    hourCounts[hour] = (hourCounts[hour] || 0) + 1;
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                const busiestHourRaw = Object.keys(hourCounts).reduce((a, b) => hourCounts[a] > hourCounts[b] ? a : b, null);
                const busiestHour = busiestHourRaw !== null ? `${busiestHourRaw % 12 || 12}${busiestHourRaw >= 12 ? 'PM' : 'AM'}` : "N/A";
                return { revenue, topDrink, count: activeOrders.length, avgWait, busiestHour };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <>
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl soft-shadow border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="grid grid-cols-1 gap-6 animate-in">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] soft-shadow flex justify-between items-center transition-all ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-black uppercase italic tracking-tighter text-slate-900 mb-1">{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>
                                                        {o.temp}
                                                    </span>
                                                    <p className="text-slate-500 font-bold uppercase text-lg tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                </div>
                                                {o.note && <div className="mt-3 inline-block bg-emerald-50 px-4 py-1 rounded-full"><p className="text-emerald-500 font-black text-xs italic uppercase">"{o.note}"</p></div>}
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-20 h-20 bg-slate-900 text-white rounded-[1.5rem] font-black text-3xl hover:scale-105 active:scale-95 transition-all shadow-xl">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <div className="text-center py-20 text-slate-200 font-black uppercase italic text-4xl">No Orders</div>}
                                </div>
                            )}

                            {view === 'stats' && (
                                <div className="grid grid-cols-1 gap-6 animate-in">
                                    <div className="bg-white p-10 rounded-[3rem] soft-shadow text-center border border-slate-50">
                                        <button onClick={toggleShift} className={`mb-10 px-12 py-5 rounded-full font-black uppercase tracking-widest text-sm shadow-sm transition-all ${shiftStatus.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                                            {shiftStatus.active ? 'End Shift' : 'Start Shift'}
                                        </button>
                                        <div className="py-6 border-b border-slate-50">
                                            <h2 className="text-slate-400 font-black uppercase tracking-widest text-xs mb-4">Drinks Served</h2>
                                            <p className="text-8xl font-black italic tracking-tighter text-slate-900">{shiftStats.count}</p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 py-8">
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest mb-1">Shift Revenue</p>
                                                <p className="text-lg font-black text-slate-900 uppercase italic tracking-tighter">${shiftStats.revenue.toFixed(2)}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest mb-1">Top Drink</p>
                                                <p className="text-lg font-black text-slate-900 uppercase italic tracking-tighter">{shiftStats.topDrink}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest mb-1">Avg Wait</p>
                                                <p className="text-lg font-black text-slate-900 uppercase italic tracking-tighter">{shiftStats.avgWait}m</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest mb-1">Peak Hour</p>
                                                <p className="text-lg font-black text-slate-900 uppercase italic tracking-tighter">{shiftStats.busiestHour}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-8 pt-8 border-t border-slate-50">
                                            <p className="text-[10px] text-slate-300 font-black uppercase tracking-[0.2em] mb-6">Download CSV Reports</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                <button onClick={() => exportCSV('shift')} className="bg-slate-50 hover:bg-slate-900 hover:text-white text-slate-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all">Last Shift</button>
                                                <button onClick={() => exportCSV('24h')} className="bg-slate-50 hover:bg-slate-900 hover:text-white text-slate-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all">24 Hours</button>
                                                <button onClick={() => exportCSV('week')} className="bg-slate-50 hover:bg-slate-900 hover:text-white text-slate-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all">Last Week</button>
                                                <button onClick={() => exportCSV('month')} className="bg-slate-50 hover:bg-slate-900 hover:text-white text-slate-400 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all">Last Month</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'history' && (
                                <div className="bg-white rounded-[3rem] p-10 soft-shadow animate-in border border-slate-50">
                                    <div className="flex justify-between mb-10 items-center">
                                        <h2 className="font-black uppercase italic text-2xl tracking-tighter text-slate-900">Order History</h2>
                                        <button onClick={clearHistory} className="text-[10px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-5 py-2 rounded-full">Clear History</button>
                                    </div>
                                    <div className="space-y-6">
                                        {history.slice(0, 30).map(o => (
                                            <div key={o.id} className="flex justify-between items-center bg-slate-50/50 p-6 rounded-2xl border border-slate-100">
                                                <div className="flex-1">
                                                    <span className="font-black uppercase italic text-lg text-slate-900 leading-none">{o.customer}</span>
                                                    <div className="flex items-center gap-3 mt-1">
                                                        <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>
                                                            {o.temp}
                                                        </span>
                                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">{o.flavor} • {o.milk}</p>
                                                        <p className="text-[10px] text-emerald-500 font-black uppercase">${Number(o.price).toFixed(2)}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-xs font-black text-slate-900 uppercase italic">{o.waitTime}m</span>
                                                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">MIN WAIT</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {/* ... Settings View ... */}
                        </>
                    )}
                    {/* ... Kiosk and Modal logic ... */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
