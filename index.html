<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anu Day Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-in { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-user-select: none; touch-action: manipulation; }
        input { -webkit-user-select: text; }
        .hidden-trigger { position: fixed; top: 0; right: 0; width: 60px; height: 60px; z-index: 999; cursor: default; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Your specific Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [history, setHistory] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);
            const [secretTaps, setSecretTaps] = useState(0);

            useEffect(() => {
                db.ref('orders').on('value', snap => {
                    const data = snap.val() || {};
                    setOrders(Object.values(data).sort((a,b) => b.id - a.id));
                });
                db.ref('menu').on('value', snap => setMenuDrinks(snap.val() || []));
                db.ref('milks').on('value', snap => setMilks(snap.val() || []));
                db.ref('history').on('value', snap => setHistory(Object.values(snap.val() || {})));
            }, []);

            const addOrder = (drink, temp) => {
                if (!customerName.trim()) return alert("Please enter a name");
                setPendingOrder({ flavor: drink.name, price: drink.price, temp, customer: customerName });
            };

            const finalizeOrder = (milk) => {
                const newOrder = {
                    id: Date.now(),
                    customer: customerName,
                    flavor: pendingOrder.flavor,
                    price: pendingOrder.price || 0,
                    temp: pendingOrder.temp,
                    milk: milk,
                    startTime: Date.now(),
                    status: 'Active',
                    timeLabel: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                db.ref('orders/' + newOrder.id).set(newOrder);
                setPendingOrder(null);
                setCustomerName('');
                if(appMode === 'kiosk') {
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 3000);
                }
            };

            const markDone = (order) => {
                const waitTime = Math.floor((Date.now() - order.startTime) / 1000);
                db.ref('history/' + order.id).set({ ...order, waitTime, status: 'Sold', doneAt: Date.now() });
                db.ref('orders/' + order.id).remove();
            };

            const toggleMode = (mode) => {
                setAppMode(mode);
                localStorage.setItem('app-mode', mode);
                setSecretTaps(0);
            };

            const handleSecretTap = () => {
                const newCount = secretTaps + 1;
                if (newCount >= 3) {
                    setView('settings');
                    toggleMode('barista');
                } else {
                    setSecretTaps(newCount);
                    setTimeout(() => setSecretTaps(0), 2000);
                }
            };

            if (showSuccess) return (
                <div className="flex flex-col items-center justify-center h-screen bg-orange-500 text-white animate-in">
                    <h1 className="text-7xl font-black mb-4">GOT IT!</h1>
                    <p className="text-2xl font-bold uppercase tracking-widest">We'll call your name soon.</p>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 pb-24">
                    {appMode === 'kiosk' && <div className="hidden-trigger" onClick={handleSecretTap}></div>}

                    {appMode === 'barista' && (
                        <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-[2rem] shadow-sm border border-slate-200">
                            {['queue', 'history', 'stats', 'settings'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest ${view === v ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-400'}`}>
                                    {v}
                                </button>
                            ))}
                        </nav>
                    )}

                    {(view === 'queue' || appMode === 'kiosk') && (
                        <div className="animate-in">
                            <h1 className={`${appMode === 'kiosk' ? 'text-4xl text-center mb-10' : 'hidden'} font-black text-slate-800 uppercase tracking-tighter`}>Anu Day Coffee</h1>
                            <input type="text" placeholder="Your Name..." className="w-full p-8 text-4xl rounded-[3rem] shadow-xl mb-10 border-none bg-white outline-none focus:ring-4 focus:ring-orange-200" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-12">
                                {menuDrinks.map((drink) => (
                                    <div key={drink.name} className="bg-white p-8 rounded-[4rem] shadow-md border border-slate-100 flex flex-col items-center">
                                        <h3 className="text-3xl font-black text-slate-700 mb-6 uppercase tracking-tight">{drink.name}</h3>
                                        <div className="flex gap-4 w-full">
                                            <button onClick={() => addOrder(drink, 'Hot')} className="flex-1 bg-orange-100 text-orange-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">HOT</button>
                                            <button onClick={() => addOrder(drink, 'Iced')} className="flex-1 bg-blue-100 text-blue-700 py-10 rounded-[2.5rem] font-black text-3xl active:scale-95 transition">ICED</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {appMode === 'barista' && (
                                <div className="space-y-4">
                                    <h2 className="text-2xl font-black text-slate-300 uppercase italic">Live Queue</h2>
                                    {orders.map(order => (
                                        <div key={order.id} className="flex justify-between items-center p-8 rounded-[3.5rem] bg-white shadow-xl border-l-[20px] border-orange-500 animate-in">
                                            <div className="flex-1">
                                                <h2 className="text-4xl font-black">{order.customer}</h2>
                                                <p className="text-slate-500 font-extrabold text-lg uppercase">{order.temp} {order.flavor} • {order.milk}</p>
                                            </div>
                                            <button onClick={() => markDone(order)} className="bg-emerald-500 text-white w-24 h-24 rounded-[2.5rem] font-black text-5xl flex items-center justify-center shadow-lg active:scale-90 transition">✓</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'settings' && appMode === 'barista' && (
                        <div className="animate-in space-y-8">
                            <div className="bg-slate-800 text-white p-10 rounded-[3rem] shadow-xl">
                                <h2 className="text-xl font-black uppercase mb-4 tracking-widest">App Perspective</h2>
                                <div className="flex gap-4">
                                    <button onClick={() => toggleMode('kiosk')} className="flex-1 p-5 rounded-2xl font-black uppercase text-xs bg-slate-700">Kiosk (Customer)</button>
                                    <button onClick={() => toggleMode('barista')} className="flex-1 p-5 rounded-2xl font-black uppercase text-xs bg-emerald-500">Barista (Worker)</button>
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-md">
                                <h2 className="text-2xl font-black mb-8 uppercase tracking-tighter">Menu Management</h2>
                                {menuDrinks.map((d, i) => (
                                    <div key={i} className="flex gap-2 mb-4">
                                        <input className="flex-1 bg-slate-50 p-4 rounded-2xl font-black text-slate-700 uppercase" value={d.name} onChange={(e) => {
                                            const n = [...menuDrinks]; n[i].name = e.target.value; db.ref('menu').set(n);
                                        }} />
                                        <input type="number" step="0.01" className="w-24 bg-slate-50 p-4 rounded-2xl font-mono font-bold text-center" value={d.price} onChange={(e) => {
                                            const n = [...menuDrinks]; n[i].price = parseFloat(e.target.value) || 0; db.ref('menu').set(n);
                                        }} />
                                        <button onClick={() => {if(confirm("Delete?")){const n = [...menuDrinks]; n.splice(i,1); db.ref('menu').set(n);}}} className="bg-red-50 text-red-500 px-4 rounded-2xl">✕</button>
                                    </div>
                                ))}
                                <button onClick={() => {
                                    const n = prompt("Drink Name:"); const p = prompt("Price:");
                                    if(n && p) db.ref('menu').set([...menuDrinks, {name: n, price: parseFloat(p)}]);
                                }} className="w-full mt-4 bg-slate-800 text-white p-5 rounded-3xl font-black uppercase text-xs">Add New Drink</button>
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-6 z-[100]">
                            <div className="bg-white w-full max-w-lg rounded-[4rem] p-12 shadow-2xl animate-in text-center">
                                <h2 className="text-4xl font-black mb-10 uppercase italic tracking-widest text-slate-300">Milk Option</h2>
                                <div className="grid grid-cols-1 gap-4">
                                    {milks.map(m => (
                                        <button key={m} onClick={() => finalizeOrder(m)} className="bg-slate-50 hover:bg-orange-50 p-10 rounded-[3rem] text-4xl font-black border-2 border-slate-100 text-slate-800 active:scale-95 transition">
                                            {m}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setPendingOrder(null)} className="mt-10 font-black text-slate-300 uppercase tracking-widest text-sm">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
