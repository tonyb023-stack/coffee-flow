<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .soft-shadow { box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista');
                    setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const updateMilkItem = (index, field, value) => {
                const newMilks = [...milks];
                newMilks[index][field] = value;
                db.ref('milks').set(newMilks);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' ? (
                        <div className="animate-in">
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl soft-shadow border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="space-y-6">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] soft-shadow flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div>
                                                <h3 className="text-3xl font-black uppercase italic tracking-tighter text-slate-900">{o.customer}</h3>
                                                <p className="text-slate-500 font-bold uppercase tracking-widest">{o.flavor} • {o.milk}</p>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button className="w-16 h-16 bg-slate-900 text-white rounded-2xl font-black text-2xl shadow-lg">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-8">
                                    {/* PROTECTED MILK MANAGEMENT */}
                                    <div className="bg-white p-8 rounded-[3rem] soft-shadow border border-slate-50">
                                        <h3 className="font-black uppercase italic text-slate-900 mb-6">Milk Management</h3>
                                        <div className="space-y-3">
                                            {milks.map((m, i) => (
                                                <div key={i} className="flex gap-3 items-center bg-slate-50 p-3 rounded-2xl">
                                                    <input className="flex-1 bg-white p-3 rounded-xl font-bold uppercase text-xs border border-slate-100 outline-none" value={m.name} onChange={e => updateMilkItem(i, 'name', e.target.value)} />
                                                    <button onClick={() => updateMilkItem(i, 'soldOut', !m.soldOut)} className={`px-4 py-3 rounded-xl text-[10px] font-black uppercase ${m.soldOut ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-500'}`}>{m.soldOut ? 'OUT' : 'IN'}</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setAppMode('kiosk')} className="w-full bg-slate-900 text-white p-8 rounded-[2rem] font-black uppercase text-xl italic tracking-tighter">Launch Kiosk Mode</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="animate-in text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            {!pendingOrder ? (
                                <>
                                    <h1 className="text-6xl font-black text-slate-900 uppercase italic mb-12">NEBULOUS COFFEE</h1>
                                    <input type="text" placeholder="WHO IS THIS FOR?" className="w-full bg-white p-6 rounded-[2rem] text-3xl font-black uppercase text-center soft-shadow mb-12 outline-none" value={customerName} onChange={e => setCustomerName(e.target.value)} />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                            <div key={drink.name} className="bg-white rounded-[2rem] p-6 soft-shadow flex flex-col gap-4">
                                                <h3 className="text-2xl font-black uppercase italic">{drink.name}</h3>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-4 rounded-xl text-white font-black">HOT</button>
                                                    <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-4 rounded-xl text-white font-black">ICED</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-8 overflow-y-auto">
                                    <div className="max-w-xl w-full">
                                        <h2 className="text-5xl font-black uppercase italic mb-12">{pendingOrder.name}</h2>
                                        
                                        {/* PROTECTED LABEL */}
                                        <p className="text-slate-900 font-black uppercase text-xl mb-6 tracking-widest">Select Your Milk Option</p>
                                        
                                        <div className="grid gap-3 mb-12">
                                            {milks.filter(m => !m.soldOut).map(m => (
                                                <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-6 rounded-[2rem] text-2xl font-black uppercase border-4 transition-all ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-50'}`}>{m.name}</button>
                                            ))}
                                        </div>
                                        {selectedMilk && (
                                            <div className="space-y-4">
                                                <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-6 rounded-[2rem] text-center font-bold uppercase" value={specialRequest} onChange={e => setSpecialRequest(e.target.value)} />
                                                <button onClick={finalizeOrder} className="confirm-btn w-full py-8 rounded-[2rem] text-white font-black text-3xl uppercase italic shadow-2xl">PLACE ORDER</button>
                                                <button onClick={() => {setPendingOrder(null); setSelectedMilk(null);}} className="text-slate-300 font-black uppercase text-xs tracking-widest pt-4">GO BACK</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    {showSuccess && <div className="fixed inset-0 z-[200] bg-emerald-500 flex items-center justify-center text-white text-5xl font-black italic uppercase animate-in">ORDERED!</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
