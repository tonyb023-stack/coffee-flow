<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebulous Coffee Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease; }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .confirm-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.4); }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        #exit-zone { position: fixed; top: 0; right: 0; width: 120px; height: 120px; z-index: 10000; cursor: pointer; background: transparent; }
        .tight-tracking { letter-spacing: -0.05em; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const THEME = {
            pageBg: "#fcfdfe",
            card: "bg-white border border-slate-50 shadow-2xl shadow-slate-200/50",
            radius: "rounded-[2.5rem]",
            innerRadius: "rounded-2xl",
            accentBg: "bg-slate-900",
            accentText: "text-white",
            textMain: "text-slate-900",
            textMuted: "text-slate-400",
            hotBtn: "bg-red-500 text-white shadow-lg shadow-red-100",
            coldBtn: "bg-blue-500 text-white shadow-lg shadow-blue-100",
            confirmBtn: "bg-emerald-500 text-white shadow-xl shadow-emerald-100",
            // High Contrast Kiosk UI
            stepBadge: "bg-slate-900 text-white text-[10px] font-black uppercase px-4 py-1.5 rounded-full tracking-widest",
            kioskInputContainer: "bg-white border-4 border-slate-900 shadow-2xl transition-all duration-500",
            inputPulse: "ring-8 ring-slate-200 animate-pulse" 
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA",
            authDomain: "coffee-order-tracker.firebaseapp.com",
            projectId: "coffee-order-tracker",
            storageBucket: "coffee-order-tracker.firebasestorage.app",
            messagingSenderId: "650691026035",
            appId: "1:650691026035:web:96e8bee8d3a5bb5d205e06",
            measurementId: "G-7K3GCP3XL5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const OrderTimer = ({ startTime }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const calculate = () => setElapsed(Math.round((Date.now() - startTime) / 60000));
                calculate();
                const interval = setInterval(calculate, 30000);
                return () => clearInterval(interval);
            }, [startTime]);
            return (
                <div className="text-right ml-4">
                    <span className="text-xl font-black text-slate-900 uppercase italic leading-none">{elapsed}m</span>
                    <p className="text-[9px] text-slate-300 font-bold uppercase tracking-widest">WAITING</p>
                </div>
            );
        };

        const BaristaApp = () => {
            const [view, setView] = useState('queue');
            const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');
            const [orders, setOrders] = useState([]);
            const [history, setHistory] = useState([]);
            const [menuDrinks, setMenuDrinks] = useState([]);
            const [milks, setMilks] = useState([]);
            const [shiftStatus, setShiftStatus] = useState({ active: false, startTime: 0 });
            const [showShiftModal, setShowShiftModal] = useState(false);
            const [customerName, setCustomerName] = useState('');
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedMilk, setSelectedMilk] = useState(null);
            const [specialRequest, setSpecialRequest] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const clickRef = useRef({ count: 0, last: 0 });

            useEffect(() => {
                const refs = {
                    orders: db.ref('orders'),
                    history: db.ref('history'),
                    menu: db.ref('menu'),
                    milks: db.ref('milks'),
                    shift: db.ref('shift')
                };
                refs.orders.on('value', s => setOrders(Object.values(s.val() || {}).sort((a,b) => a.id - b.id)));
                refs.history.on('value', s => setHistory(Object.values(s.val() || {}).sort((a,b) => b.completedAt - a.completedAt)));
                refs.menu.on('value', s => setMenuDrinks(s.val() || []));
                refs.milks.on('value', s => setMilks(s.val() || []));
                refs.shift.on('value', s => setShiftStatus(s.val() || { active: false, startTime: 0 }));
                return () => Object.values(refs).forEach(r => r.off());
            }, []);

            const completeOrder = (order) => {
                const completedAt = Date.now();
                db.ref(`history/${order.id}`).set({ ...order, completedAt, waitTime: Math.round((completedAt - order.startTime) / 60000), status: 'Completed' });
                db.ref(`orders/${order.id}`).remove();
            };

            const toggleShift = () => {
                if (shiftStatus.active) setShowShiftModal(true);
                else db.ref('shift').set({ active: true, startTime: Date.now() });
            };

            const confirmEndShift = () => {
                db.ref('shift').set({ active: false, startTime: 0 });
                setShowShiftModal(false);
            };

            const finalizeOrder = () => {
                const id = Date.now();
                db.ref(`orders/${id}`).set({
                    id, customer: customerName || "Guest", flavor: pendingOrder.name,
                    price: pendingOrder.price || 0, temp: pendingOrder.temp, milk: selectedMilk,
                    note: specialRequest, startTime: id, status: 'Active'
                });
                setPendingOrder(null); setSelectedMilk(null); setCustomerName(''); setSpecialRequest(''); setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            const handleExitLogic = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 800) clickRef.current.count = 0;
                clickRef.current.count += 1;
                clickRef.current.last = now;
                if (clickRef.current.count >= 3) {
                    setAppMode('barista'); setView('settings');
                    localStorage.setItem('app-mode', 'barista');
                    clickRef.current.count = 0;
                }
            };

            const shiftStats = useMemo(() => {
                const activeOrders = history.filter(o => o.completedAt > shiftStatus.startTime);
                const revenue = activeOrders.reduce((acc, o) => acc + Number(o.price), 0);
                const drinkCounts = {};
                let totalWait = 0;
                activeOrders.forEach(o => {
                    drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
                    totalWait += (o.waitTime || 0);
                });
                const topDrink = Object.keys(drinkCounts).reduce((a, b) => drinkCounts[a] > drinkCounts[b] ? a : b, "N/A");
                const avgWait = activeOrders.length > 0 ? (totalWait / activeOrders.length).toFixed(1) : 0;
                return { revenue, topDrink, count: activeOrders.length, avgWait };
            }, [history, shiftStatus]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {appMode === 'barista' && (
                        <>
                            <nav className="grid grid-cols-4 gap-2 mb-8 bg-white p-2 rounded-3xl shadow-sm border border-slate-100">
                                {['queue', 'history', 'stats', 'settings'].map(v => (
                                    <button key={v} onClick={() => setView(v)} className={`py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === v ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>

                            {view === 'queue' && (
                                <div className="grid grid-cols-1 gap-6 animate-in">
                                    {orders.map(o => (
                                        <div key={o.id} className={`bg-white p-8 rounded-[2.5rem] border-l-[12px] shadow-sm flex justify-between items-center ${o.temp === 'HOT' ? 'border-red-500' : 'border-blue-500'}`}>
                                            <div className="flex-1">
                                                <h3 className="text-3xl font-black uppercase italic tracking-tighter text-slate-900 mb-1">{o.customer}</h3>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full ${o.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{o.temp}</span>
                                                    <p className="text-slate-500 font-bold uppercase text-lg tracking-widest leading-none">{o.flavor} • {o.milk}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <OrderTimer startTime={o.startTime} />
                                                <button onClick={() => completeOrder(o)} className="w-20 h-20 bg-slate-900 text-white rounded-[1.5rem] font-black text-3xl shadow-xl">✓</button>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.length === 0 && <div className="text-center py-20 text-slate-200 font-black uppercase italic text-4xl">No Orders</div>}
                                </div>
                            )}
                            {/* Additional Barista Views (History, Stats, Settings) go here following original structure */}
                        </>
                    )}

                    {appMode === 'kiosk' && !pendingOrder && (
                        <div className="animate-in pt-6 md:pt-12 pb-24 text-center">
                            <div id="exit-zone" onClick={handleExitLogic}></div>
                            <h1 className="text-5xl md:text-7xl font-black text-slate-900 tight-tracking uppercase italic leading-none mb-12 tracking-tighter">NEBULOUS</h1>
                            
                            {/* Step 1: High Contrast Name Input */}
                            <div className="max-w-2xl mx-auto mb-16 px-4">
                                <div className="flex flex-col items-center gap-3">
                                    <span className={THEME.stepBadge}>Step 1: Start Here</span>
                                    <div className={`w-full p-2 rounded-[2.5rem] ${THEME.kioskInputContainer} ${!customerName ? THEME.inputPulse : 'ring-0'}`}>
                                        <input 
                                            type="text" 
                                            placeholder="ENTER YOUR NAME" 
                                            className="w-full bg-slate-50 p-6 rounded-[2rem] text-3xl font-black uppercase text-center outline-none text-slate-900 placeholder-slate-400 focus:bg-white transition-all" 
                                            value={customerName} 
                                            onChange={(e) => setCustomerName(e.target.value)} 
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Step 2: Drinks List */}
                            <div className={`transition-all duration-700 ${customerName ? 'opacity-100 scale-100' : 'opacity-40 grayscale pointer-events-none scale-95'}`}>
                                <div className="flex flex-col items-center gap-3 mb-8">
                                    <span className={THEME.stepBadge}>Step 2: Choose Your Drink</span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto px-2">
                                    {menuDrinks.filter(d => !d.soldOut).map(drink => (
                                        <div key={drink.name} className="bg-white rounded-[2rem] card-shadow border border-slate-50 p-6 flex flex-col justify-between">
                                            <div className="flex justify-between items-start mb-6">
                                                <h3 className="text-xl md:text-2xl font-black text-slate-900 uppercase italic tight-tracking text-left leading-tight">{drink.name}</h3>
                                                <span className="text-xs md:text-sm font-bold text-slate-900 bg-slate-100 px-3 py-1 rounded-full shrink-0">${Number(drink.price).toFixed(2)}</span>
                                            </div>
                                            <div className="flex gap-2 md:gap-3">
                                                <button onClick={() => setPendingOrder({...drink, temp:'HOT'})} className="bg-red-500 flex-1 py-4 md:py-6 rounded-[1.2rem] text-white font-black text-lg md:text-xl shadow-md">HOT</button>
                                                <button onClick={() => setPendingOrder({...drink, temp:'ICED'})} className="bg-blue-500 flex-1 py-4 md:py-6 rounded-[1.2rem] text-white font-black text-lg md:text-xl shadow-md">ICED</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingOrder && (
                        <div className="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4 md:p-8 overflow-y-auto">
                            <div className="max-w-xl w-full animate-in text-center py-8">
                                <span className={`text-xs font-black px-4 py-2 rounded-full mb-4 inline-block ${pendingOrder.temp === 'HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>{pendingOrder.temp}</span>
                                <h2 className="text-4xl md:text-7xl font-black uppercase italic mb-12 tracking-tighter leading-none">{pendingOrder.name}</h2>
                                <div className="space-y-8">
                                    <div className="grid grid-cols-1 gap-3">
                                        <p className="text-slate-900 font-black uppercase text-xl underline decoration-2 underline-offset-8">SELECT YOUR MILK</p>
                                        {milks.filter(m => !m.soldOut).map(m => (
                                            <button key={m.name} onClick={() => setSelectedMilk(m.name)} className={`py-4 md:py-8 rounded-[1.5rem] md:rounded-[2.8rem] text-xl md:text-3xl font-black uppercase italic duration-300 border-4 ${selectedMilk === m.name ? 'bg-slate-900 text-white border-slate-900 scale-[1.03]' : 'bg-white text-slate-900 border-slate-50'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                    {selectedMilk && (
                                        <div className="space-y-8 animate-in">
                                            <input type="text" placeholder="SPECIAL REQUESTS?" className="w-full bg-slate-50 p-5 md:p-8 rounded-[1.5rem] md:rounded-[2.8rem] text-lg font-bold uppercase border border-slate-100 outline-none text-center" value={specialRequest} onChange={(e) => setSpecialRequest(e.target.value)} />
                                            <div className="pt-4">
                                                <p className="text-black font-black text-2xl md:text-4xl mb-4 italic tracking-tighter">TOTAL: ${Number(pendingOrder.price).toFixed(2)}</p>
                                                <button onClick={finalizeOrder} className="w-full confirm-btn text-white py-6 md:py-11 rounded-[1.5rem] md:rounded-[3rem] font-black uppercase text-2xl md:text-4xl shadow-lg">Confirm Order</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); }} className="text-slate-300 font-black uppercase text-lg mt-8">Cancel & Start Over</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center animate-in p-4 text-center">
                            <div className="w-24 h-24 md:w-32 md:h-32 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                                <span className="text-white text-4xl md:text-6xl font-black">✓</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black uppercase italic text-slate-900 mb-4 tracking-tighter leading-none">ORDER PLACED</h1>
                            <p className="text-slate-400 font-bold uppercase tracking-widest">Your coffee will be ready soon!</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BaristaApp />);
    </script>
</body>
</html>
