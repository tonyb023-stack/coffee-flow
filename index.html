<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nebulous Coffee Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: Bebas Neue (display) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script>
    /* ── Dark mode flash prevention ─────────────────────────────────
       Reads darkMode from localStorage synchronously before first paint
       so there is never a white flash on load in dark mode.
    ───────────────────────────────────────────────────────────────── */
    (function() {
      try {
        if (localStorage.getItem('neb-dark') === 'true') {
          document.documentElement.classList.add('dark-pending');
        }
      } catch(e) {}
    })();
  </script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       STYLE SECTION — Safe to edit freely. All visual rules live here.
       ═══════════════════════════════════════════════════════════════ */

    :root {
      --bg:            #f8f7f4;
      --surface:       #ffffff;
      --surface-2:     #f3f2ef;
      --border:        #ebebeb;
      --ink:           #0f0f0f;
      --ink-mid:       #6b6b6b;
      --ink-faint:     #c4c4c4;
      --red:           #e84040;
      --blue:          #3b82f6;
      --green:         #22c55e;
      --amber:         #f59e0b;
      --accent:        #22c55e;   /* overridden by event accent colour */
    }

    /* Pre-paint dark class applied by inline script above */
    html.dark-pending body,
    body.dark {
      --bg:        #0c0c0c;
      --surface:   #181818;
      --surface-2: #242424;
      --border:    #2e2e2e;
      --ink:       #f0f0f0;
      --ink-mid:   #9a9a9a;
      --ink-faint: #444444;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }

    /* ── Animations ─────────────────────────────────── */
    @keyframes slideUp   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes popIn     { 0%{opacity:0;transform:scale(0.88)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes pulseRing { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.35)} 70%{box-shadow:0 0 0 14px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    @keyframes namePulse { 0%,100%{border-color:rgba(15,15,15,.9);box-shadow:0 0 0 0 rgba(15,15,15,.08)} 50%{border-color:rgba(15,15,15,.3);box-shadow:0 0 0 10px rgba(15,15,15,.04)} }
    @keyframes undoShrink{ from{width:100%} to{width:0%} }
    @keyframes attractFloat{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shake     { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    @keyframes barGrow   { from{width:0} to{width:var(--bar-w)} }
    @keyframes checkPop  { 0%{transform:scale(0) rotate(-20deg)} 60%{transform:scale(1.2) rotate(4deg)} 100%{transform:scale(1) rotate(0)} }

    .animate-in   { animation: slideUp  0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
    .animate-pop  { animation: popIn   0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .animate-fade { animation: fadeIn  0.25s ease forwards; }
    .animate-shake{ animation: shake   0.4s ease forwards; }

    /* ── Shadows ─────────────────────────────────────── */
    .shadow-soft { box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04); }
    .shadow-card { box-shadow:0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04); }
    .shadow-lift { box-shadow:0 20px 60px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06); }

    /* ── Buttons ─────────────────────────────────────── */
    .btn-confirm {
      background: linear-gradient(135deg,#22c55e 0%,#16a34a 100%);
      box-shadow: 0 12px 32px -4px rgba(34,197,94,.45);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-confirm:active { transform:scale(0.97); box-shadow:none; }

    /* ── Kiosk name pulse ────────────────────────────── */
    .name-pulse { border:2.5px solid var(--ink); animation:namePulse 3s infinite ease-in-out; }

    /* ── Connection dot ──────────────────────────────── */
    .conn-online  { background:#22c55e; animation:pulseRing 2s infinite; }
    .conn-offline { background:#e84040; }

    /* ── Undo progress bar ───────────────────────────── */
    .undo-bar { animation:undoShrink 5s linear forwards; }

    /* ── Attract screen ──────────────────────────────── */
    .attract-bg {
      background: radial-gradient(ellipse at 50% 55%,rgba(34,197,94,.14) 0%,transparent 65%),
                  radial-gradient(ellipse at 15% 15%,rgba(59,130,246,.09) 0%,transparent 55%),
                  #0c0c0c;
    }

    /* ── Queue card states ───────────────────────────── */
    /* Left border always reflects drink temp (hot=red, iced=blue).
       Priority states add a coloured box-shadow ring around the whole card
       without touching or overriding the left border colour. */
    .card-hot   { border-left-color: #e84040; }
    .card-iced  { border-left-color: #3b82f6; }
    .card-warn  { box-shadow: 0 0 0 2px #f59e0b, 0 2px 12px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04); }
    .card-late  { box-shadow: 0 0 0 2px #e84040, 0 2px 12px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04); }
    .card-ready { box-shadow: 0 0 0 2px #22c55e, 0 2px 12px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04); }

    /* ── Kiosk pause overlay ─────────────────────────── */
    .pause-bg {
      background: radial-gradient(ellipse at 50% 50%,rgba(245,158,11,.12) 0%,transparent 70%), #0c0c0c;
    }

    /* ── Stats bar chart ─────────────────────────────── */
    .stat-bar { transition: width .8s cubic-bezier(.16,1,.3,1); }

    /* ── Checklist checkmark ─────────────────────────── */
    .check-pop { animation: checkPop .3s cubic-bezier(.16,1,.3,1) forwards; }

    /* ── Scrollbar hide ──────────────────────────────── */
    .no-scroll::-webkit-scrollbar { display:none; }
    .no-scroll { -ms-overflow-style:none; scrollbar-width:none; }

    /* ── PIN dots ────────────────────────────────────── */
    .pin-filled { background: var(--ink); transform:scale(1.15); }

    /* ── Share card (shift summary export) ──────────────*/
    #share-card {
      width: 600px;
      background: #0c0c0c;
      color: #f0f0f0;
      padding: 48px;
      font-family: 'DM Sans', sans-serif;
      position: fixed;
      left: -9999px;
      top: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>
<!-- Hidden share card for PNG export -->
<div id="share-card"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

/* ═══════════════════════════════════════════════════════════════════
   SECTION 1 — CONSTANTS
   ═══════════════════════════════════════════════════════════════════ */
const DEFAULTS = {
  APP_NAME:         'NEBULOUS',
  TAGLINE:          'Specialty Coffee',
  KIOSK_EXIT_TAPS:  3,
  KIOSK_EXIT_MS:    800,
  SUCCESS_MS:       2800,
  IDLE_TIMEOUT_MS:  45_000,
  ORDER_WARN_MINS:  8,
  ORDER_LATE_MINS:  12,
  HISTORY_PAGE:     30,
  UNDO_MS:          5_000,
  QUEUE_WARN:       6,
  DEFAULT_PIN:      '1234',
  QUICK_REQUESTS:   ['Half Sweet', 'Less Ice'],
  HISTORY_TTL_DAYS: 30,
  CHECKLIST: [
    { id:'menu',    label:'Menu drinks are set & priced' },
    { id:'milks',   label:'Milk options are set' },
    { id:'soldout', label:'Sold-out items toggled' },
    { id:'pin',     label:'Exit PIN is configured' },
    { id:'guests',  label:'Expected guest count entered' },
    { id:'shift',   label:'Shift has been started' },
  ],
};

/* ═══════════════════════════════════════════════════════════════════
   SECTION 2 — FIREBASE SERVICE LAYER
   To swap backend: rewrite only this section.
   ═══════════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyDDDp160eqcOLhW90xoSd9xxHQuJr8k7sA',
  authDomain:        'coffee-order-tracker.firebaseapp.com',
  databaseURL:       'https://coffee-order-tracker-default-rtdb.firebaseio.com',
  projectId:         'coffee-order-tracker',
  storageBucket:     'coffee-order-tracker.firebasestorage.app',
  messagingSenderId: '650691026035',
  appId:             '1:650691026035:web:96e8bee8d3a5bb5d205e06',
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const DB   = firebase.database();
const AUTH = firebase.auth();

const DbService = {

  /* ── Auth (anonymous — prevents strangers writing to DB) ── */
  signInAnonymously() {
    return AUTH.signInAnonymously().catch(() => {});
  },

  /* ── Connection ─────────────────────────────── */
  subscribeConnection(cb) {
    const ref = DB.ref('.info/connected');
    ref.on('value', s => cb(s.val() === true));
    return () => ref.off();
  },

  /* ── Settings ───────────────────────────────── */
  subscribeSettings(cb) {
    const ref = DB.ref('settings');
    ref.on('value', s => cb(s.val() || {}));
    return () => ref.off();
  },
  setSettings: patch => DB.ref('settings').update(patch),

  /* ── Orders ─────────────────────────────────── */
  subscribeOrders(cb) {
    const ref = DB.ref('orders');
    ref.on('value', s => {
      const raw = s.val() || {};
      cb(Object.entries(raw)
        .map(([k, v]) => ({ ...v, _key: k }))
        .sort((a, b) => a.startTime - b.startTime));
    });
    return () => ref.off();
  },

  async placeOrder(data) {
    // Reset counter to 1 if shift boundary crossed; otherwise increment
    const res = await DB.ref('orderCounter').transaction(n => (n || 0) + 1);
    const num = res.snapshot.val();
    const ref = DB.ref('orders').push();
    await ref.set({ ...data, _key: ref.key, orderNumber: num, startTime: Date.now(), status: 'Active', ready: false });
    return num;
  },

  resetOrderCounter: () => DB.ref('orderCounter').set(0),

  markReady: order => DB.ref(`orders/${order._key}/ready`).set(true),

  updateOrder(order, patch) {
    return DB.ref(`orders/${order._key}`).update(patch);
  },

  completeOrder(order) {
    const completedAt = Date.now();
    const waitTime = Math.round((completedAt - order.startTime) / 60000);
    DB.ref(`history/${order._key}`).set({ ...order, completedAt, waitTime, status: 'Completed' });
    DB.ref(`orders/${order._key}`).remove();
  },

  undoComplete(order) {
    const { completedAt, waitTime, status, ...active } = order;
    DB.ref(`orders/${order._key}`).set({ ...active, status: 'Active', ready: false });
    DB.ref(`history/${order._key}`).remove();
  },

  addBaristaNote: (key, note) => DB.ref(`history/${key}/baristaNote`).set(note),

  /* ── History ────────────────────────────────── */
  subscribeHistory(cb) {
    const ref = DB.ref('history');
    ref.on('value', s => {
      const raw = s.val() || {};
      cb(Object.values(raw).sort((a, b) => b.completedAt - a.completedAt));
    });
    return () => ref.off();
  },

  clearHistory: () => DB.ref('history').remove(),

  pruneHistory() {
    // Delete history entries older than TTL
    const cutoff = Date.now() - (DEFAULTS.HISTORY_TTL_DAYS * 86_400_000);
    DB.ref('history').orderByChild('completedAt').endAt(cutoff).once('value', snap => {
      const updates = {};
      snap.forEach(child => { updates[child.key] = null; });
      if (Object.keys(updates).length) DB.ref('history').update(updates);
    });
  },

  /* ── Menu (keyed object, not array) ─────────── */
  subscribeMenu(cb) {
    const ref = DB.ref('menu');
    ref.on('value', s => {
      const raw = s.val() || {};
      // Support both legacy array and new keyed format
      if (Array.isArray(raw)) { cb(raw.map((d,i)=>({...d,_key:String(i)}))); return; }
      cb(Object.entries(raw).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.order||0)-(b.order||0)));
    });
    return () => ref.off();
  },
  addMenuItem: item => DB.ref('menu').push({ ...item, order: Date.now() }),
  updateMenuItem: (key, patch) => DB.ref(`menu/${key}`).update(patch),
  deleteMenuItem: key => DB.ref(`menu/${key}`).remove(),

  /* ── Milks (keyed object) ───────────────────── */
  subscribeMilks(cb) {
    const ref = DB.ref('milks');
    ref.on('value', s => {
      const raw = s.val() || {};
      if (Array.isArray(raw)) { cb(raw.map((m,i)=>({...m,_key:String(i)}))); return; }
      cb(Object.entries(raw).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.order||0)-(b.order||0)));
    });
    return () => ref.off();
  },
  addMilkItem: item => DB.ref('milks').push({ ...item, order: Date.now() }),
  updateMilkItem: (key, patch) => DB.ref(`milks/${key}`).update(patch),
  deleteMilkItem: key => DB.ref(`milks/${key}`).remove(),

  /* ── Shift ───────────────────────────────────── */
  subscribeShift(cb) {
    const ref = DB.ref('shift');
    ref.on('value', s => cb(s.val() || { active: false, startTime: 0 }));
    return () => ref.off();
  },
  startShift: () => DB.ref('shift').set({ active: true, startTime: Date.now() }),
  endShift:   () => DB.ref('shift').set({ active: false, startTime: 0 }),

  /* ── Pause ───────────────────────────────────── */
  subscribePause(cb) {
    const ref = DB.ref('pause');
    ref.on('value', s => cb(s.val() || { active: false, message: '' }));
    return () => ref.off();
  },
  setPause:   (msg) => DB.ref('pause').set({ active: true,  message: msg || 'Back soon!' }),
  clearPause: ()    => DB.ref('pause').set({ active: false, message: '' }),
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 3 — DATA & LOGIC HOOK
   All state + business logic. Zero JSX.
   ═══════════════════════════════════════════════════════════════════ */
const useAppData = () => {
  const [online,   setOnline]   = useState(true);
  const [authed,   setAuthed]   = useState(false);
  const [settings, setSettings] = useState({
    eventName: '', tagline: '', accentColor: '#22c55e',
    pin: DEFAULTS.DEFAULT_PIN, guestCount: 0,
    darkMode: false, warnAt: DEFAULTS.QUEUE_WARN,
    pauseActive: false, pauseMessage: '',
  });
  const [orders,  setOrders]  = useState([]);
  const [history, setHistory] = useState([]);
  const [menu,    setMenu]    = useState([]);
  const [milks,   setMilks]   = useState([]);
  const [shift,   setShift]   = useState({ active: false, startTime: 0 });
  const [pause,   setPause]   = useState({ active: false, message: '' });
  const [appMode, setAppMode] = useState(() => localStorage.getItem('app-mode') || 'barista');

  // Anonymous auth on mount
  useEffect(() => {
    DbService.signInAnonymously();
    AUTH.onAuthStateChanged(user => setAuthed(!!user));
  }, []);

  // All Firebase subscriptions
  useEffect(() => {
    const unsubs = [
      DbService.subscribeConnection(setOnline),
      DbService.subscribeSettings(s => setSettings(prev => ({ ...prev, ...s }))),
      DbService.subscribeOrders(setOrders),
      DbService.subscribeHistory(setHistory),
      DbService.subscribeMenu(setMenu),
      DbService.subscribeMilks(setMilks),
      DbService.subscribeShift(setShift),
      DbService.subscribePause(setPause),
    ];
    // Prune old history on load
    DbService.pruneHistory();
    return () => unsubs.forEach(fn => fn());
  }, []);

  // Dark mode: sync to body class AND localStorage (prevents flash)
  useEffect(() => {
    const dark = !!settings.darkMode;
    document.body.classList.toggle('dark', dark);
    document.documentElement.classList.remove('dark-pending');
    try { localStorage.setItem('neb-dark', dark ? 'true' : 'false'); } catch(e) {}
  }, [settings.darkMode]);

  const switchMode = useCallback(mode => {
    setAppMode(mode);
    localStorage.setItem('app-mode', mode);
  }, []);

  const updateSettings = useCallback(patch => {
    DbService.setSettings(patch);
  }, []);

  // Shift statistics (memoised — only recalculates when history or shift changes)
  const shiftStats = useMemo(() => {
    const active = shift.startTime > 0
      ? history.filter(o => o.completedAt > shift.startTime)
      : [];
    const revenue      = active.reduce((a, o) => a + Number(o.price || 0), 0);
    const drinkCounts  = {};
    const hourCounts   = {};
    let totalWait = 0;
    active.forEach(o => {
      drinkCounts[o.flavor] = (drinkCounts[o.flavor] || 0) + 1;
      totalWait += (o.waitTime || 0);
      const h = new Date(o.completedAt).getHours();
      hourCounts[h] = (hourCounts[h] || 0) + 1;
    });
    const kd = Object.keys(drinkCounts), kh = Object.keys(hourCounts);
    const topDrink    = kd.length ? kd.reduce((a,b) => drinkCounts[a]>drinkCounts[b]?a:b) : 'N/A';
    const avgWait     = active.length ? (totalWait / active.length).toFixed(1) : '0';
    const peakH       = kh.length ? kh.reduce((a,b) => hourCounts[a]>hourCounts[b]?a:b) : null;
    const busiestHour = peakH !== null ? `${peakH%12||12}${Number(peakH)>=12?'PM':'AM'}` : 'N/A';
    return { revenue, topDrink, count: active.length, avgWait, busiestHour, drinkCounts, hourCounts, orders: active };
  }, [history, shift]);

  // CSV export with proper escaping
  const exportCSV = useCallback(frame => {
    const now  = Date.now();
    const cuts = { shift: shift.startTime, '24h': now-86400000, week: now-604800000, month: now-2592000000 };
    const rows = history.filter(o => o.completedAt > (cuts[frame] || 0));
    const esc  = v => `"${String(v??'').replace(/"/g,'""')}"`;
    let csv = 'Order#,Customer,Flavor,Temp,Milk,Special Request,Price,Wait,Note,Date\n';
    rows.forEach(o => {
      csv += [o.orderNumber||'', esc(o.customer), esc(o.flavor), o.temp,
              esc(o.milk), esc(o.note), o.price, `${o.waitTime}m`,
              esc(o.baristaNote), new Date(o.completedAt).toLocaleString()].join(',') + '\n';
    });
    const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a   = Object.assign(document.createElement('a'),{href:url,download:`neb_${frame}_${Date.now()}.csv`});
    a.click(); URL.revokeObjectURL(url);
  }, [history, shift]);

  // Sound + haptics on new order
  const playChime = useCallback(() => {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const play = (freq, start, dur, vol=0.28) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, ctx.currentTime+start);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+start+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
        osc.start(ctx.currentTime+start);
        osc.stop(ctx.currentTime+start+dur+0.05);
      };
      play(880, 0, 0.22); play(1100, 0.17, 0.22); play(1320, 0.34, 0.38);
    } catch(_) {}
    try { navigator.vibrate && navigator.vibrate([80,40,80]); } catch(_) {}
  }, []);

  // Start shift also resets order counter
  const startShift = useCallback(() => {
    DbService.startShift();
    DbService.resetOrderCounter();
  }, []);

  // Menu helpers (now keyed — no more array overwrite race condition)
  const addMenuItem        = ()           => DbService.addMenuItem({ name:'', price:5, soldOut:false });
  const updateMenuItem     = (key, patch) => DbService.updateMenuItem(key, patch);
  const deleteMenuItem     = key          => DbService.deleteMenuItem(key);
  const toggleDrinkSoldOut = item         => DbService.updateMenuItem(item._key, { soldOut: !item.soldOut });

  // Milk helpers
  const addMilkItem        = ()           => DbService.addMilkItem({ name:'', soldOut:false });
  const updateMilkItem     = (key, patch) => DbService.updateMilkItem(key, patch);
  const deleteMilkItem     = key          => DbService.deleteMilkItem(key);
  const toggleMilkSoldOut  = item         => DbService.updateMilkItem(item._key, { soldOut: !item.soldOut });

  // Reset all sold-out flags (called at shift start)
  const resetSoldOut = useCallback(() => {
    menu.forEach(d => { if (d.soldOut) DbService.updateMenuItem(d._key, { soldOut: false }); });
    milks.forEach(m => { if (m.soldOut) DbService.updateMilkItem(m._key, { soldOut: false }); });
  }, [menu, milks]);

  return {
    online, authed, settings, orders, history, menu, milks, shift, pause, appMode, shiftStats,
    switchMode, updateSettings, exportCSV, playChime, startShift,
    placeOrder:        DbService.placeOrder,
    markReady:         DbService.markReady,
    updateOrder:       DbService.updateOrder,
    completeOrder:     DbService.completeOrder,
    undoComplete:      DbService.undoComplete,
    addBaristaNote:    DbService.addBaristaNote,
    clearHistory:      DbService.clearHistory,
    endShift:          DbService.endShift,
    setPause:          DbService.setPause,
    clearPause:        DbService.clearPause,
    addMenuItem, updateMenuItem, deleteMenuItem, toggleDrinkSoldOut,
    addMilkItem, updateMilkItem, deleteMilkItem, toggleMilkSoldOut,
    resetSoldOut,
  };
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 4 — SHARED UI PRIMITIVES
   Safe to restyle. No logic, no DB calls.
   ═══════════════════════════════════════════════════════════════════ */

const S = { // inline style helpers using CSS vars
  bg:    { background: 'var(--bg)' },
  surf:  { background: 'var(--surface)', borderColor: 'var(--border)' },
  surf2: { background: 'var(--surface-2)' },
  ink:   { color: 'var(--ink)' },
  mid:   { color: 'var(--ink-mid)' },
  faint: { color: 'var(--ink-faint)' },
};

const ConnectionDot = ({ online }) => (
  <div className="flex items-center gap-1.5 flex-shrink-0">
    <span className={`w-2 h-2 rounded-full block ${online ? 'conn-online' : 'conn-offline'}`} />
    <span className="text-[9px] font-bold uppercase tracking-widest" style={S.faint}>
      {online ? 'Live' : 'Offline'}
    </span>
  </div>
);

const OrderTimer = ({ startTime }) => {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const calc = () => setElapsed(Math.round((Date.now()-startTime)/60000));
    calc();
    const id = setInterval(calc, 60000);
    return () => clearInterval(id);
  }, [startTime]);
  const late = elapsed >= DEFAULTS.ORDER_LATE_MINS;
  const warn = elapsed >= DEFAULTS.ORDER_WARN_MINS;
  return (
    <div className="text-right flex-shrink-0">
      <span className={`display text-2xl block leading-none ${late?'text-red-500':warn?'text-amber-500':''}`}
            style={late||warn ? {} : S.ink}>
        {elapsed}m
      </span>
      <span className="text-[8px] font-bold uppercase tracking-widest" style={S.faint}>WAIT</span>
    </div>
  );
};

const Modal = ({ children, onClose }) => (
  <div className="fixed inset-0 z-[600] flex items-center justify-center p-5"
       style={{background:'rgba(0,0,0,.6)',backdropFilter:'blur(12px)'}}
       onClick={e => { if(e.target===e.currentTarget && onClose) onClose(); }}>
    <div className="rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-lift animate-pop border"
         style={S.surf}>
      {children}
    </div>
  </div>
);

const Badge = ({ count }) => count > 0 ? (
  <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[8px] font-black
                   min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center z-10">
    {count > 9 ? '9+' : count}
  </span>
) : null;

// Small horizontal bar chart row
const MiniBar = ({ label, value, max, color='#22c55e' }) => {
  const pct = max > 0 ? Math.round((value/max)*100) : 0;
  return (
    <div className="flex items-center gap-3 text-xs">
      <span className="w-28 font-bold truncate text-right flex-shrink-0" style={S.mid}>{label}</span>
      <div className="flex-1 rounded-full overflow-hidden h-2" style={S.surf2}>
        <div className="h-full rounded-full stat-bar" style={{width:`${pct}%`, background:color}} />
      </div>
      <span className="w-6 font-black text-right flex-shrink-0" style={S.ink}>{value}</span>
    </div>
  );
};

/* ── Nav ────────────────────────────────────────── */

    { id:'add',      label:'Add Order' },
    { id:'history',  label:'History' },
    { id:'stats',    label:'Stats' },
    { id:'settings', label:'Settings' },
  ];
  return (
    <nav className="flex items-center gap-2 p-2 rounded-2xl shadow-soft border mb-6 mt-3 overflow-visible"
         style={S.surf}>
      <div className="flex gap-1 flex-1 overflow-x-auto overflow-y-visible no-scroll">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setView(t.id)}
            className={`relative overflow-visible flex-shrink-0 px-3 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all whitespace-nowrap
              ${view===t.id ? 'bg-slate-900 text-white' : 'hover:bg-slate-100'}`}

/* ── Single order card ─────────────────────────── */
const QueueCard = ({ order, onReady, onComplete, onNote, onEdit }) => {
  const [showNote,  setShowNote]  = useState(false);
  const [noteVal,   setNoteVal]   = useState(order.baristaNote || '');
  const [showEdit,  setShowEdit]  = useState(false);

  const elapsed    = Math.round((Date.now() - order.startTime) / 60000);
  const isLate     = elapsed >= DEFAULTS.ORDER_LATE_MINS;
  const isWarn     = elapsed >= DEFAULTS.ORDER_WARN_MINS && !isLate;
  const cardClass  = order.ready ? 'card-ready' : isLate ? 'card-late' : isWarn ? 'card-warn'
                   : order.temp === 'HOT' ? 'card-hot' : 'card-iced';

  const saveNote = () => { onNote(order._key, noteVal); setShowNote(false); };

  return (
    <div className={`rounded-[2rem] border border-l-[10px] shadow-soft p-5 transition-all ${cardClass}`}
         style={S.surf}>

      {/* Header row */}
      <div className="flex items-start justify-between gap-3 mb-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            <span className="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
              #{order.orderNumber ?? '—'}
            </span>
            {order.ready && (
              <span className="text-[8px] font-black px-2 py-0.5 rounded-full bg-green-100 text-green-600">
                READY ✓
              </span>
            )}
            {isLate && !order.ready && (
              <span className="text-[8px] font-black px-2 py-0.5 rounded-full bg-red-100 text-red-500">
                LATE
              </span>
            )}
          </div>
          <h3 className="display text-3xl leading-none" style={S.ink}>{order.customer}</h3>
          <p className="text-sm font-black truncate mt-0.5" style={S.ink}>
            <span className={`text-[8px] font-black px-2 py-0.5 rounded-full mr-1.5 inline-block align-middle
              ${order.temp==='HOT' ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-500'}`}>
              {order.temp}
            </span>
            {order.flavor} · {order.milk}
          </p>
          {order.note && (
            <span className="inline-block mt-1.5 bg-emerald-50 text-emerald-600 text-[10px] font-bold
                             uppercase tracking-widest px-3 py-0.5 rounded-full">
              ✎ {order.note}
            </span>
          )}
        </div>
        <OrderTimer startTime={order.startTime} />
      </div>

      {/* Barista note */}
      {showNote ? (
        <div className="flex gap-2 mt-2 animate-in">
          <input autoFocus value={noteVal} onChange={e=>setNoteVal(e.target.value)}
            placeholder="Add barista note…"
            className="flex-1 px-4 py-2 rounded-xl text-xs font-medium border outline-none"
            style={{...S.surf2, borderColor:'var(--border)', color:'var(--ink)'}}
            onKeyDown={e=>e.key==='Enter'&&saveNote()} />
          <button onClick={saveNote}
            className="bg-slate-900 text-white px-4 rounded-xl text-xs font-bold">Save</button>
          <button onClick={()=>setShowNote(false)}
            className="px-3 rounded-xl text-xs" style={S.faint}>✕</button>
        </div>
      ) : (
        <button onClick={()=>setShowNote(true)}
          className="text-[9px] font-bold uppercase tracking-widest mt-1.5 block" style={S.faint}>
          {order.baristaNote ? `📝 ${order.baristaNote}` : '+ add note'}
        </button>
      )}

      {/* Action buttons */}
      <div className="flex gap-2 mt-3">
        <button onClick={() => setShowEdit(true)}
          className="px-3 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest border transition-all hover:bg-slate-100"
          style={{borderColor:'var(--border)', ...S.faint}}>
          Edit
        </button>
        {!order.ready && (
          <button onClick={() => onReady(order)}
            className="flex-1 py-3 rounded-xl text-sm font-bold uppercase tracking-widest transition-all
                       bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white border border-emerald-100">
            Mark Ready
          </button>
        )}
        <button onClick={() => onComplete(order)}
          className={`py-3 rounded-xl font-black text-white text-xl transition-all
                      hover:scale-105 active:scale-95 shadow-md
            ${order.ready ? 'flex-1 bg-green-500' : 'w-14 bg-slate-900'}`}>
          ✓
        </button>
      </div>

      {/* Inline edit modal */}
      {showEdit && (
        <EditOrderModal
          order={order}
          onSave={patch => { onEdit(order, patch); setShowEdit(false); }}
          onClose={() => setShowEdit(false)}
        />
      )}
    </div>
  );
};

              <div className="flex gap-2 items-center mb-1 flex-wrap">
                <span className="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
                  #{o.orderNumber??'—'}
                </span>
              </div>
              <span className="display text-xl" style={S.ink}>{o.customer}</span>
              <p className="text-xs font-medium truncate mt-0.5" style={S.mid}>

                <p className="text-[10px] font-medium mt-0.5" style={S.faint}>📝 {o.baristaNote}</p>

        <button onClick={() => setPage(p=>p+1)}

          style={{...S.surf2, ...S.mid}}>

/* ── Stats view ────────────────────────────────── */
const StatsView = ({ shift, shiftStats, settings, onStartShift, onEndShiftRequest, exportCSV, onGenerateSummaryCard }) => {
  const pct = settings.guestCount > 0
    ? Math.min(100, Math.round((shiftStats.count / settings.guestCount) * 100))
    : null;

  // Build hourly chart data
  const hours = Object.entries(shiftStats.hourCounts || {})
    .map(([h,c]) => ({ label:`${h%12||12}${Number(h)>=12?'p':'a'}`, count:c }))
    .sort((a,b) => parseInt(a.label)-parseInt(b.label));
  const maxHour = Math.max(1, ...hours.map(h=>h.count));

  // Build drink chart data
  const drinks = Object.entries(shiftStats.drinkCounts || {})
    .map(([name,count]) => ({name, count}))
    .sort((a,b)=>b.count-a.count)
    .slice(0,6);
  const maxDrink = Math.max(1, ...drinks.map(d=>d.count));

  const cells = [
    { label:'Revenue',   val:`$${shiftStats.revenue.toFixed(2)}` },
    { label:'Top Drink', val:shiftStats.topDrink, italic:true },
    { label:'Avg Wait',  val:`${shiftStats.avgWait}m` },
    { label:'Peak Hour', val:shiftStats.busiestHour, italic:true },
  ];

  return (
    <div className="space-y-4 animate-in">
      <div className="rounded-[2.5rem] p-8 shadow-soft border" style={S.surf}>

        {/* Shift toggle */}
        <div className="text-center mb-6">
          <button onClick={shift.active ? onEndShiftRequest : onStartShift}
            className={`px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all shadow-sm
              ${shift.active ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
            {shift.active ? '● End Shift' : 'Start Shift'}
          </button>
          {shift.active && (
            <p className="text-[9px] font-bold uppercase tracking-widest mt-3 text-emerald-500">
              Started {new Date(shift.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
            </p>
          )}
        </div>

        {/* Big number */}
        <div className="py-5 border-t border-b text-center" style={{borderColor:'var(--border)'}}>
          <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={S.faint}>Drinks Served</p>
          <p className="display text-8xl" style={S.ink}>{shiftStats.count}</p>
        </div>

        {/* Guest pacing */}
        {pct !== null && (
          <div className="mt-5">
            <div className="flex justify-between text-[9px] font-bold uppercase tracking-widest mb-1.5"
                 style={S.faint}>
              <span>Event Pacing</span>
              <span>{shiftStats.count} / {settings.guestCount} ({pct}%)</span>
            </div>
            <div className="w-full rounded-full h-2 overflow-hidden" style={S.surf2}>
              <div className="h-full rounded-full bg-emerald-500 transition-all duration-700"
                   style={{width:`${pct}%`}} />
            </div>
          </div>
        )}

        {/* Stat cells */}
        <div className="grid grid-cols-2 gap-4 py-6">
          {cells.map(({label,val,italic})=>(
            <div key={label} className="text-center">
              <p className="text-[9px] font-bold uppercase tracking-widest mb-1" style={S.faint}>{label}</p>
              <p className={`text-lg font-black ${italic?'italic':''}`} style={S.ink}>{val}</p>
            </div>
          ))}
        </div>

        {/* Drinks chart */}
        {drinks.length > 0 && (
          <div className="py-5 border-t space-y-2" style={{borderColor:'var(--border)'}}>
            <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={S.faint}>Drinks This Shift</p>
            {drinks.map(d=>(
              <MiniBar key={d.name} label={d.name} value={d.count} max={maxDrink} color="#22c55e" />
            ))}
          </div>
        )}

        {/* Hourly chart */}
        {hours.length > 0 && (
          <div className="py-5 border-t space-y-2" style={{borderColor:'var(--border)'}}>
            <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={S.faint}>Orders by Hour</p>
            {hours.map(h=>(
              <MiniBar key={h.label} label={h.label} value={h.count} max={maxHour} color="#3b82f6" />
            ))}
          </div>
        )}

        {/* Export + summary card */}
        <div className="pt-5 border-t" style={{borderColor:'var(--border)'}}>
          <p className="text-[9px] font-bold uppercase tracking-widest mb-3" style={S.faint}>Export CSV</p>
          <div className="grid grid-cols-4 gap-2 mb-4">
            {['shift','24h','week','month'].map(t=>(
              <button key={t} onClick={()=>exportCSV(t)}
                className="py-3 rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all hover:opacity-70"
                style={{...S.surf2, ...S.mid}}>
                {t}
              </button>
            ))}
          </div>
          <button onClick={onGenerateSummaryCard}
            className="w-full py-3 rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all
                       bg-slate-900 text-white hover:opacity-80">
            ↓ Download Shift Summary Card
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── Pre-event checklist ───────────────────────── */
const ChecklistView = ({ settings, shift, menu, milks }) => {
  const [checked, setChecked] = useState({});

  const toggle = id => setChecked(p=>({...p,[id]:!p[id]}));

  const autoCheck = {
    menu:    menu.length > 0,
    milks:   milks.length > 0,
    soldout: true, // always manual
    pin:     (settings.pin||'') !== '' && settings.pin !== DEFAULTS.DEFAULT_PIN,
    guests:  Number(settings.guestCount) > 0,
    shift:   shift.active,
  };

  const items = DEFAULTS.CHECKLIST.map(item => ({
    ...item,
    done: autoCheck[item.id] || !!checked[item.id],
    auto: autoCheck[item.id],
  }));

  const allDone = items.every(i=>i.done);

  return (
    <div className="rounded-[2.5rem] p-8 shadow-soft border animate-in" style={S.surf}>
      <h2 className="display text-3xl mb-1" style={S.ink}>PRE-EVENT CHECKLIST</h2>
      <p className="text-[10px] font-bold uppercase tracking-widest mb-6" style={S.faint}>
        Verify before launching kiosk
      </p>

      <div className="space-y-3">
        {items.map(item => (
          <div key={item.id}
               onClick={() => !item.auto && toggle(item.id)}
               className={`flex items-center gap-4 p-4 rounded-2xl border transition-all
                 ${item.done ? 'border-green-200 bg-green-50' : 'border cursor-pointer hover:opacity-80'}`}
               style={item.done ? {} : {borderColor:'var(--border)', ...S.surf2}}>
            <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all
              ${item.done ? 'bg-green-500' : 'border-2'}`}
              style={item.done ? {} : {borderColor:'var(--border)'}}>
              {item.done && <span className="text-white text-sm check-pop">✓</span>}
            </div>
            <span className={`text-sm font-bold ${item.done?'text-green-700':''}`}
                  style={item.done ? {} : S.ink}>
              {item.label}
            </span>
            {item.auto && (
              <span className="ml-auto text-[8px] font-bold uppercase tracking-widest text-green-500">
                auto
              </span>
            )}
          </div>
        ))}
      </div>

      {allDone && (
        <div className="mt-5 py-4 px-5 bg-green-50 border border-green-200 rounded-2xl text-center animate-in">
          <p className="text-green-700 font-bold text-sm">✓ All checks passed — ready to launch!</p>
        </div>
      )}
    </div>
  );
};

/* ── Quick add (barista walk-up) ───────────────── */
const QuickAddView = ({ menu, milks, onPlace }) => {
  const [name,   setName]   = useState('');
  const [drink,  setDrink]  = useState(null);
  const [temp,   setTemp]   = useState(null);
  const [milk,   setMilk]   = useState(null);
  const [note,   setNote]   = useState('');
  const [placed, setPlaced] = useState(false);

  const reset = () => { setDrink(null); setTemp(null); setMilk(null); setNote(''); setName(''); };

  const confirm = async () => {
    await onPlace({
      customer: name.trim() || 'Walk-up',
      flavor:   drink.name, price: drink.price || 0,
      temp, milk, note: note.trim(),
    });
    setPlaced(true);
    setTimeout(() => { setPlaced(false); reset(); }, 1500);
  };

  const avail      = menu.filter(d=>!d.soldOut);
  const availMilks = milks.filter(m=>!m.soldOut);

  if (placed) return (
    <div className="rounded-[2.5rem] p-10 shadow-soft border text-center animate-pop" style={S.surf}>
      <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3">
        <span className="text-white text-2xl font-black">✓</span>
      </div>
      <p className="display text-3xl" style={S.ink}>ORDER PLACED</p>
    </div>
  );

  return (
    <div className="rounded-[2.5rem] p-8 shadow-soft border animate-in" style={S.surf}>
      <h2 className="display text-3xl mb-5" style={S.ink}>WALK-UP ORDER</h2>

      <input value={name} onChange={e=>setName(e.target.value)}
        placeholder="Customer name (optional)"
        className="w-full px-5 py-3.5 rounded-2xl text-sm font-medium mb-5 outline-none border"
        style={{...S.surf2, borderColor:'var(--border)', color:'var(--ink)'}} />

      <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={S.faint}>Drink</p>
      <div className="grid grid-cols-2 gap-2 mb-4">
        {avail.map(d=>(
          <button key={d._key||d.name} onClick={()=>setDrink(d)}
            className={`py-3.5 px-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all text-left
              ${drink?._key===d._key||drink?.name===d.name ? 'bg-slate-900 text-white' : 'hover:opacity-80'}`}
            style={drink?._key===d._key||drink?.name===d.name ? {} : {...S.surf2, ...S.ink}}>
            {d.name}
          </button>
        ))}
        {avail.length===0 && <p className="col-span-2 text-xs py-2" style={S.faint}>No drinks available</p>}
      </div>

      {drink && (
        <div className="animate-in mb-4">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={S.faint}>Temperature</p>
          <div className="flex gap-2">
            {['HOT','ICED'].map(t=>(
              <button key={t} onClick={()=>setTemp(t)}
                className={`flex-1 py-3.5 rounded-2xl font-black text-base transition-all
                  ${temp===t?(t==='HOT'?'bg-red-500 text-white':'bg-blue-500 text-white')
                             :(t==='HOT'?'bg-red-50 text-red-400':'bg-blue-50 text-blue-400')}`}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}

      {temp && (
        <div className="animate-in mb-4">
          <p className="text-[9px] font-bold uppercase tracking-widest mb-2" style={S.faint}>Milk</p>
          <div className="grid grid-cols-2 gap-2">
            {availMilks.map(m=>(
              <button key={m._key||m.name} onClick={()=>setMilk(m.name)}
                className={`py-3 rounded-2xl text-sm font-bold uppercase tracking-wide transition-all
                  ${milk===m.name?'bg-slate-900 text-white':'hover:opacity-80'}`}
                style={milk===m.name?{}: {...S.surf2, ...S.ink}}>
                {m.name}
              </button>
            ))}
            {availMilks.length===0 && <p className="col-span-2 text-xs py-2" style={S.faint}>No milks available</p>}
          </div>
        </div>
      )}

      {milk && (
        <div className="animate-in space-y-3">
          <input value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Special request (optional)"
            className="w-full px-5 py-3.5 rounded-2xl text-sm font-medium outline-none border"
            style={{...S.surf2, borderColor:'var(--border)', color:'var(--ink)'}} />
          <button onClick={confirm}
            className="w-full btn-confirm text-white py-4 rounded-2xl font-black text-base uppercase tracking-widest">
            Place Order — ${Number(drink.price).toFixed(2)}
          </button>
        </div>
      )}

      {(drink||temp||milk) && (
        <button onClick={reset}
          className="w-full mt-3 py-2 text-[10px] font-bold uppercase tracking-widest" style={S.faint}>
          Clear
        </button>
      )}
    </div>
  );
};

/* ── Settings view ─────────────────────────────── */

/* ── Milk + special request modal ──────────────── */
const MilkSelectView = ({
  pendingOrder, milks,
  selectedMilk, specialRequest,
  onSelectMilk, onSpecialRequest,
  onConfirm, onCancel,
  accent,
}) => {
  const available  = milks.filter(m=>!m.soldOut);
  const chips      = DEFAULTS.QUICK_REQUESTS;
  const activeChips = specialRequest ? specialRequest.split(', ').filter(Boolean) : [];

  const toggleChip = chip => {
    const curr   = activeChips;
    const exists = curr.includes(chip);
    const next   = exists ? curr.filter(c=>c!==chip) : [...curr, chip];
    onSpecialRequest(next.join(', '));
  };

  return (
    <div className="fixed inset-0 overflow-y-auto no-scroll" style={{background:'#f8f7f4'}}>
      <div className="max-w-xl mx-auto px-4 py-10 text-center">

        {/* Back button — prominent at top */}
        <button onClick={onCancel}
          className="flex items-center gap-2 mb-8 font-bold text-sm transition-all hover:opacity-60"
          style={{color:'var(--ink-faint)'}}>
          ← Back to menu
        </button>

        <span className={`inline-block text-sm font-black px-4 py-2 rounded-full mb-4
          ${pendingOrder.temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>
          {pendingOrder.temp}
        </span>

        <h2 className="display text-6xl md:text-8xl mb-8 leading-none" style={{color:'var(--ink)'}}>
          {pendingOrder.name}
        </h2>

        {/* Milk */}
        <div className="mb-8">
          <p className="font-black uppercase text-base underline decoration-2 underline-offset-8 mb-5"
             style={{color:'var(--ink)'}}>SELECT YOUR MILK</p>
          <div className="space-y-3">
            {available.map(m=>(
              <button key={m._key||m.name} onClick={()=>onSelectMilk(m.name)}
                className={`w-full py-6 rounded-[2rem] display text-3xl transition-all border-4
                  ${selectedMilk===m.name
                    ?'bg-slate-900 text-white border-slate-900 scale-[1.02]'
                    :'bg-white border-slate-100 hover:border-slate-300'}`}
                style={selectedMilk===m.name?{}: {color:'var(--ink)'}}>
                {m.name}
              </button>
            ))}
            {available.length===0 && (
              <p className="py-6 font-bold uppercase text-sm" style={{color:'var(--ink-faint)'}}>
                No milk options available
              </p>
            )}
          </div>
        </div>

        {/* Special requests */}
        {selectedMilk && (
          <div className="space-y-5 animate-in">
            <p className="font-black uppercase text-base underline decoration-2 underline-offset-8"
               style={{color:'var(--ink)'}}>SPECIAL REQUESTS</p>

            {chips.length > 0 && (
              <div className="flex flex-wrap gap-2 justify-center">
                {chips.map(c=>(
                  <button key={c} onClick={()=>toggleChip(c)}
                    className={`px-5 py-2.5 rounded-full text-sm font-bold uppercase tracking-widest transition-all border-2
                      ${activeChips.includes(c)
                        ?'bg-slate-900 text-white border-slate-900'
                        :'bg-white border-slate-200 hover:border-slate-400'}`}
                    style={activeChips.includes(c)?{}:{color:'var(--ink)'}}>
                    {c}
                  </button>
                ))}
              </div>
            )}

            <input type="text"
              placeholder="Anything else? (optional)"
              value={specialRequest}
              onChange={e=>onSpecialRequest(e.target.value)}
              className="w-full bg-white px-6 py-5 rounded-[2rem] text-base font-medium border outline-none text-center"
              style={{borderColor:'#ebebeb', color:'var(--ink)'}} />

            <div className="pt-2">
              <p className="display text-5xl mb-6" style={{color:'var(--ink)'}}>
                TOTAL: ${Number(pendingOrder.price).toFixed(2)}
              </p>
              <button onClick={() => { try{navigator.vibrate&&navigator.vibrate(50);}catch(_){} onConfirm(); }}
                className="w-full btn-confirm text-white py-8 rounded-[2.5rem] display text-4xl shadow-lift">
                CONFIRM ORDER
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── Success screen (shows order summary) ──────── */
const SuccessScreen = ({ orderNumber, customer, flavor, milk, temp }) => (
  <div className="fixed inset-0 flex flex-col items-center justify-center animate-pop text-center px-6"
       style={{background:'#f8f7f4'}}>
    <div className="w-28 h-28 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-lift">
      <span className="text-white text-5xl font-black" style={{animation:'checkPop .4s .1s both'}}>✓</span>
    </div>
    {orderNumber && (
      <p className="font-bold uppercase tracking-widest text-sm mb-1" style={{color:'var(--ink-faint)'}}>
        Order #{orderNumber}
      </p>
    )}
    <h1 className="display text-6xl md:text-8xl mb-4" style={{color:'var(--ink)'}}>ORDER PLACED</h1>

    {/* Order summary receipt */}
    <div className="bg-white rounded-3xl px-8 py-5 shadow-soft border mt-2 max-w-xs w-full"
         style={{borderColor:'#ebebeb'}}>
      <p className="font-black uppercase text-lg" style={{color:'var(--ink)'}}>{customer || 'Guest'}</p>
      <p className="font-medium text-sm mt-1" style={{color:'var(--ink-mid)'}}>
        <span className={`text-[9px] font-black px-2 py-0.5 rounded-full mr-1.5 inline-block align-middle
          ${temp==='HOT'?'bg-red-100 text-red-500':'bg-blue-100 text-blue-500'}`}>{temp}</span>
        {flavor} · {milk}
      </p>
    </div>

    <p className="font-bold uppercase tracking-[0.15em] text-sm mt-6" style={{color:'var(--ink-faint)'}}>
      Your coffee will be ready soon!
    </p>
  </div>
);

/* ── PIN pad ────────────────────────────────────── */
const PinPad = ({ correctPin, onSuccess, onCancel }) => {
  const [entry, setEntry] = useState('');
  const [shake, setShake] = useState(false);

  const press = d => {
    const next = (entry + d).slice(0, 4);
    setEntry(next);
    if (next.length === 4) {
      if (next === String(correctPin || DEFAULTS.DEFAULT_PIN)) {
        onSuccess();
      } else {
        setShake(true);
        setTimeout(() => { setEntry(''); setShake(false); }, 600);
      }
    }
  };

  const digits = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center"
         style={{background:'rgba(0,0,0,.72)',backdropFilter:'blur(14px)'}}>
      <div className={`bg-white rounded-[3rem] p-10 max-w-xs w-full text-center shadow-lift animate-pop border
                       ${shake?'animate-shake':''}`}
           style={{borderColor:'var(--border)'}}>
        <h2 className="display text-4xl mb-6" style={S.ink}>ENTER PIN</h2>
        <div className="flex justify-center gap-4 mb-8">
          {[0,1,2,3].map(i=>(
            <div key={i}
              className={`w-4 h-4 rounded-full border-2 transition-all duration-150
                ${i < entry.length ? 'pin-filled border-slate-900' : 'border-slate-300'}`} />
          ))}
        </div>
        <div className="grid grid-cols-3 gap-3">
          {digits.map((d, i) => (
            <button key={i}
              onClick={() => { if(d==='⌫') setEntry(e=>e.slice(0,-1)); else if(d!=='') press(String(d)); }}
              className={`py-5 rounded-2xl font-black text-2xl transition-all
                ${d===''?'pointer-events-none opacity-0':'hover:scale-105 active:scale-95'}
                ${d==='⌫'?'bg-red-50 text-red-400':'bg-slate-50 text-slate-900'}`}>
              {d}
            </button>
          ))}
        </div>
        <button onClick={onCancel}
          className="mt-6 text-[10px] font-bold uppercase tracking-widest" style={S.faint}>
          Cancel
        </button>
      </div>
    </div>
  );
};


/* ═══════════════════════════════════════════════════════════════════
   SECTION 7 — MODAL DIALOGS
   Barista-side confirmations. Safe to restyle.
   ═══════════════════════════════════════════════════════════════════ */

const ShiftEndModal = ({ stats, onConfirm, onCancel }) => (
  <Modal onClose={onCancel}>
    <h2 className="display text-4xl mb-2" style={S.ink}>END SHIFT?</h2>
    <div className="py-4 my-4 border-t border-b space-y-2" style={{borderColor:'var(--border)'}}>
      <p className="text-sm font-bold" style={S.mid}>🍵 {stats.count} drinks served</p>
      <p className="text-sm font-bold" style={S.mid}>💵 ${stats.revenue.toFixed(2)} revenue</p>
      <p className="text-sm font-bold" style={S.mid}>⏱ {stats.avgWait}m avg wait</p>
    </div>
    <div className="flex flex-col gap-3">
      <button onClick={onConfirm}
        className="bg-red-500 text-white py-4 rounded-2xl font-black uppercase text-sm hover:bg-red-600 transition-all">
        Confirm End Shift
      </button>
      <button onClick={onCancel}
        className="py-4 rounded-2xl font-black uppercase text-sm transition-all"
        style={{...S.surf2, ...S.mid}}>
        Cancel
      </button>
    </div>
  </Modal>
);

const ClearHistoryModal = ({ onConfirm, onCancel }) => (
  <Modal onClose={onCancel}>
    <h2 className="display text-4xl mb-2" style={S.ink}>CLEAR HISTORY?</h2>
    <p className="text-sm font-medium mb-5" style={S.mid}>This cannot be undone.</p>
    <div className="flex flex-col gap-3">
      <button onClick={onConfirm} className="bg-red-500 text-white py-4 rounded-2xl font-black uppercase text-sm">
        Yes, Clear All
      </button>
      <button onClick={onCancel} className="py-4 rounded-2xl font-black uppercase text-sm"
        style={{...S.surf2, ...S.mid}}>Cancel</button>
    </div>
  </Modal>
);


/* ═══════════════════════════════════════════════════════════════════
   SECTION 8 — UNDO TOAST
   ═══════════════════════════════════════════════════════════════════ */
const UndoToast = ({ order, onUndo }) => (
  <div className="fixed bottom-6 left-1/2 z-[700] animate-in" style={{transform:'translateX(-50%)',minWidth:280}}>
    <div className="bg-slate-900 text-white rounded-2xl px-5 py-4 shadow-lift flex items-center gap-4">
      <div className="flex-1">
        <p className="text-xs font-bold uppercase tracking-widest opacity-50">Order complete</p>
        <p className="text-sm font-bold">{order.customer} — #{order.orderNumber}</p>
      </div>
      <button onClick={onUndo}
        className="bg-white text-slate-900 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest
                   hover:scale-105 transition-all flex-shrink-0">
        UNDO
      </button>
    </div>
    <div className="h-1 bg-white/20 rounded-full mt-1.5 overflow-hidden">
      <div className="h-full bg-white/50 rounded-full undo-bar" />
    </div>
  </div>
);


/* ═══════════════════════════════════════════════════════════════════
   SECTION 9 — ROOT APP COMPONENT
   Wires data hook ↔ UI. No styling. Only connections.
   ═══════════════════════════════════════════════════════════════════ */
const App = () => {
  const data = useAppData();

  /* ── Barista state ──────────────────────────── */
  const [baristaView,    setBaristaView]    = useState('queue');
  const [showShiftModal, setShowShiftModal] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [undoOrder,      setUndoOrder]      = useState(null);
  const undoTimerRef = useRef(null);

  /* ── Kiosk state ────────────────────────────── */
  const [pendingOrder,    setPendingOrder]    = useState(null);
  const [selectedMilk,    setSelectedMilk]    = useState(null);
  const [specialRequest,  setSpecialRequest]  = useState('');
  const [customerName,    setCustomerName]    = useState('');
  const [successData,     setSuccessData]     = useState(null);
  const [showAttract,     setShowAttract]     = useState(false);
  const [showPinPad,      setShowPinPad]      = useState(false);

  const idleRef  = useRef(null);
  const exitRef  = useRef({ count:0, last:0 });
  const prevLen  = useRef(0);

  /* ── Chime on new order ─────────────────────── */
  useEffect(() => {
    if (data.appMode === 'barista' && data.orders.length > prevLen.current) data.playChime();
    prevLen.current = data.orders.length;
  }, [data.orders.length, data.appMode]);

  /* ── Idle timer ─────────────────────────────── */
  const resetIdle = useCallback(() => {
    clearTimeout(idleRef.current);
    setShowAttract(false);
    if (data.appMode === 'kiosk') {
      idleRef.current = setTimeout(() => setShowAttract(true), DEFAULTS.IDLE_TIMEOUT_MS);
    }
  }, [data.appMode]);

  useEffect(() => {
    if (data.appMode !== 'kiosk') { clearTimeout(idleRef.current); return; }
    resetIdle();
    const evts = ['touchstart','mousemove','keydown','click'];
    evts.forEach(e => window.addEventListener(e, resetIdle, { passive:true }));
    return () => { clearTimeout(idleRef.current); evts.forEach(e => window.removeEventListener(e, resetIdle)); };
  }, [data.appMode, resetIdle]);

  /* ── Kiosk handlers ─────────────────────────── */
  const handleSelectDrink = (drink, temp) => {
    setPendingOrder({...drink, temp});
    setSelectedMilk(null);
    setSpecialRequest('');
  };

  const handleConfirmOrder = async () => {
    const trimmedName = customerName.trim() || 'Guest';
    const num = await data.placeOrder({
      customer: trimmedName,
      flavor:   pendingOrder.name,
      price:    pendingOrder.price || 0,
      temp:     pendingOrder.temp,
      milk:     selectedMilk,
      note:     specialRequest.trim(),
    });
    const sd = {
      orderNumber: num,
      customer:    trimmedName,
      flavor:      pendingOrder.name,
      milk:        selectedMilk,
      temp:        pendingOrder.temp,
    };
    setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); setCustomerName('');
    setSuccessData(sd);
    setTimeout(() => { setSuccessData(null); window.scrollTo({top:0}); }, DEFAULTS.SUCCESS_MS);
  };

  const handleCancelOrder = () => { setPendingOrder(null); setSelectedMilk(null); setSpecialRequest(''); };

  const handleExitTap = () => {
    const now = Date.now();
    if (now - exitRef.current.last > DEFAULTS.KIOSK_EXIT_MS) exitRef.current.count = 0;
    exitRef.current.count++;
    exitRef.current.last = now;
    if (exitRef.current.count >= DEFAULTS.KIOSK_EXIT_TAPS) { setShowPinPad(true); exitRef.current.count = 0; }
  };

  const handlePinSuccess = () => {
    setShowPinPad(false);
    data.switchMode('barista');
    setBaristaView('settings');
  };

  /* ── Barista handlers ───────────────────────── */
  const handleComplete = order => {
    data.completeOrder(order);
    clearTimeout(undoTimerRef.current);
    setUndoOrder(order);
    undoTimerRef.current = setTimeout(() => setUndoOrder(null), DEFAULTS.UNDO_MS);
  };

  const handleUndo = () => {
    if (undoOrder) { data.undoComplete(undoOrder); setUndoOrder(null); clearTimeout(undoTimerRef.current); }
  };

  const handleEndShiftConfirm = () => { data.endShift(); setShowShiftModal(false); };
  const handleClearHistoryConfirm = () => { data.clearHistory(); setShowClearModal(false); };
  const handleQuickAdd = orderData => data.placeOrder(orderData);

  /* ── Shift summary PNG export ───────────────── */
  const handleGenerateSummaryCard = useCallback(() => {
    const { count, revenue, topDrink, avgWait, busiestHour } = data.shiftStats;
    const name   = data.settings.eventName || DEFAULTS.APP_NAME;
    const date   = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const card   = document.getElementById('share-card');
    card.innerHTML = `
      <div style="font-family:'DM Sans',sans-serif;background:#0c0c0c;color:#f0f0f0;padding:48px;width:600px;border-radius:32px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:0.05em;line-height:1;margin-bottom:4px;">${name}</div>
        <div style="color:#666;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:40px;">${date} · Shift Summary</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:120px;color:#22c55e;line-height:1;margin-bottom:8px;">${count}</div>
        <div style="color:#666;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:40px;">Drinks Served</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;border-top:1px solid #222;padding-top:32px;">
          ${[['Revenue',`$${revenue.toFixed(2)}`],['Top Drink',topDrink],['Avg Wait',`${avgWait}m`],['Peak Hour',busiestHour]].map(([l,v])=>`
            <div>
              <div style="color:#444;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:6px;">${l}</div>
              <div style="font-size:24px;font-weight:900;font-style:italic;">${v}</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:40px;border-top:1px solid #222;padding-top:24px;color:#333;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;">
          Powered by Nebulous Coffee Pro
        </div>
      </div>`;

    // Use html2canvas if available, else fallback to alert
    if (window.html2canvas) {
      window.html2canvas(card.firstChild, { backgroundColor: null, scale: 2 }).then(canvas => {
        const a = Object.assign(document.createElement('a'),{
          href: canvas.toDataURL('image/png'),
          download: `nebulous_shift_${Date.now()}.png`
        });
        a.click();
      });
    } else {
      // Fallback: open printable version
      const w = window.open('','_blank');
      w.document.write(`<!DOCTYPE html><html><head>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
        <style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;} @media print{body{background:white;}}</style>
        </head><body>${card.innerHTML}<script>window.onload=()=>{window.print();}<\/script></body></html>`);
    }
  }, [data.shiftStats, data.settings]);

  /* ── Render ─────────────────────────────────── */
  return (
    <Fragment>

      {/* ═══════════════════════════════════════
          BARISTA MODE
          ═══════════════════════════════════════ */}
      {data.appMode === 'barista' && (
        <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen">
          <BaristaNav
            view={baristaView}
            setView={setBaristaView}
            queueCount={data.orders.length}
            online={data.online}
          />

          {baristaView === 'queue' && (
            <QueueView
              orders={data.orders}
              settings={data.settings}
              onReady={data.markReady}
              onComplete={handleComplete}
              onNote={data.addBaristaNote}
              onEdit={(order, patch) => data.updateOrder(order, patch)}
            />
          )}
          {baristaView === 'add' && (
            <QuickAddView
              menu={data.menu}
              milks={data.milks}
              onPlace={handleQuickAdd}
            />
          )}
          {baristaView === 'history' && (
            <HistoryView
              history={data.history}
              onClear={() => setShowClearModal(true)}
            />
          )}
          {baristaView === 'stats' && (
            <StatsView
              shift={data.shift}
              shiftStats={data.shiftStats}
              settings={data.settings}
              onStartShift={data.startShift}
              onEndShiftRequest={() => setShowShiftModal(true)}
              exportCSV={data.exportCSV}
              onGenerateSummaryCard={handleGenerateSummaryCard}
            />
          )}
          {baristaView === 'settings' && (
            <div className="space-y-5">
              <ChecklistView
                settings={data.settings}
                shift={data.shift}
                menu={data.menu}
                milks={data.milks}
              />
              <SettingsView
                menu={data.menu}
                milks={data.milks}
                settings={data.settings}
                shift={data.shift}
                pause={data.pause}
                onAddDrink={data.addMenuItem}
                onUpdateDrink={data.updateMenuItem}
                onDeleteDrink={data.deleteMenuItem}
                onToggleDrinkSoldOut={data.toggleDrinkSoldOut}
                onAddMilk={data.addMilkItem}
                onUpdateMilk={data.updateMilkItem}
                onDeleteMilk={data.deleteMilkItem}
                onToggleMilkSoldOut={data.toggleMilkSoldOut}
                onResetSoldOut={data.resetSoldOut}
                onUpdateSettings={data.updateSettings}
                onLaunchKiosk={() => data.switchMode('kiosk')}
                onSetPause={data.setPause}
                onClearPause={data.clearPause}
              />
            </div>
          )}

          {/* Modals */}
          {showShiftModal && (
            <ShiftEndModal
              stats={data.shiftStats}
              onConfirm={handleEndShiftConfirm}
              onCancel={() => setShowShiftModal(false)}
            />
          )}
          {showClearModal && (
            <ClearHistoryModal
              onConfirm={handleClearHistoryConfirm}
              onCancel={() => setShowClearModal(false)}
            />
          )}

          {undoOrder && <UndoToast order={undoOrder} onUndo={handleUndo} />}
        </div>
      )}

      {/* ═══════════════════════════════════════
          KIOSK MODE
          ═══════════════════════════════════════ */}
      {data.appMode === 'kiosk' && (
        <Fragment>
          {/* Pause overlay */}
          {data.pause.active && <PauseScreen message={data.pause.message} onExitTap={handleExitTap} />}

          {/* Attract screen */}
          {showAttract && !pendingOrder && !successData && !data.pause.active && (
            <AttractScreen
              eventName={data.settings.eventName}
              tagline={data.settings.tagline}
              onTap={() => { setShowAttract(false); resetIdle(); }}
            />
          )}

          {/* Main menu */}
          {!pendingOrder && !data.pause.active && (
            <KioskMenuView
              menu={data.menu}
              customerName={customerName}
              queueCount={data.orders.length}
              settings={data.settings}
              onNameChange={setCustomerName}
              onSelectDrink={handleSelectDrink}
              onExitTap={handleExitTap}
            />
          )}

          {/* Milk + confirm */}
          {pendingOrder && !data.pause.active && (
            <MilkSelectView
              pendingOrder={pendingOrder}
              milks={data.milks}
              selectedMilk={selectedMilk}
              specialRequest={specialRequest}
              onSelectMilk={setSelectedMilk}
              onSpecialRequest={setSpecialRequest}
              onConfirm={handleConfirmOrder}
              onCancel={handleCancelOrder}
              accent={data.settings.accentColor}
            />
          )}

          {/* Success */}
          {successData && (
            <SuccessScreen
              orderNumber={successData.orderNumber}
              customer={successData.customer}
              flavor={successData.flavor}
              milk={successData.milk}
              temp={successData.temp}
            />
          )}

          {/* PIN pad */}
          {showPinPad && (
            <PinPad
              correctPin={data.settings.pin || DEFAULTS.DEFAULT_PIN}
              onSuccess={handlePinSuccess}
              onCancel={() => setShowPinPad(false)}
            />
          )}
        </Fragment>
      )}

    </Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
